<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>商业思想学习手册</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== CSS 变量系统 ===== */
:root {
  --bg: #F5F0E8;
  --bg-card: #FFFCF7;
  --accent: #C17B2E;
  --accent-light: rgba(193,123,46,0.08);
  --text: #2C2417;
  --text-secondary: #6B5D4F;
  --text-muted: #9B8E7E;
  --border: #E8E2D8;
  --border-light: #F0ECE5;
  --shadow: rgba(44,36,23,0.08);
  --theme-1: #B8860B;
  --theme-2: #2D6A4F;
  --theme-3: #7B4B94;
  --theme-4: #2563EB;
  --theme-5: #C0582A;
  --theme-6: #0F766E;
  --theme-7: #9F1239;
  --theme-8: #4338CA;
}

/* 深色模式变量 */
[data-theme="dark"] {
  --bg: #1A1714;
  --bg-card: #2C2722;
  --accent: #D4A04A;
  --accent-light: rgba(212,160,74,0.1);
  --text: #E8E2D8;
  --text-secondary: #A89E90;
  --text-muted: #7A7068;
  --border: #3D3730;
  --border-light: #332E28;
  --shadow: rgba(0,0,0,0.3);
}

/* ===== 全局重置 ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== 阅读进度条 ===== */
#progress-bar {
  position: fixed; top: 0; left: 0;
  height: 3px; background: var(--accent);
  z-index: 9999; transition: width 100ms;
  border-radius: 0 2px 2px 0;
}

/* ===== Hero 区域 ===== */
.hero {
  padding: 32px 20px 28px;
  text-align: center;
  max-height: 40vh;
  background: linear-gradient(180deg, var(--bg) 0%, var(--border-light) 100%);
}
.hero-title {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.hero-subtitle {
  font-size: 0.88rem;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.5;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
}
.hero-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero-stat-num {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1.2;
}
.hero-stat-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== Sticky 搜索栏 ===== */
.sticky-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 12px 16px 0;
  border-bottom: 1px solid var(--border);
}
.search-container {
  position: relative;
  margin-bottom: 10px;
}
.search-input {
  width: 100%;
  padding: 11px 14px 11px 40px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 0.9rem;
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  font-family: 'Noto Sans SC', sans-serif;
  transition: border-color 200ms, box-shadow 200ms;
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(193,123,46,0.15);
}
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none; font-size: 1rem;
}
.search-count {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  font-size: 0.75rem; color: var(--accent); font-weight: 500;
  display: none;
}
.search-count.visible { display: block; }

/* ===== 双视图 Tab ===== */
.view-tabs {
  display: flex;
  gap: 0;
}
.view-tab {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  border: none;
  background: transparent;
  font-size: 0.9rem;
  cursor: pointer;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: all 200ms;
  min-height: 44px;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
}
.view-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

/* ===== 内容区域 ===== */
#content {
  padding: 12px 16px 100px;
  max-width: 720px;
  margin: 0 auto;
}

/* ===== 分组行（主题/人物可展开） ===== */
.group-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: box-shadow 200ms, background 200ms;
  min-height: 52px;
  user-select: none;
}
.group-row:hover { box-shadow: 0 2px 8px var(--shadow); }
.group-row:active { background: var(--accent-light); }

/* 主题分组 — 彩色圆点 */
.group-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 12px;
}
.group-dot-1 { background: var(--theme-1); }
.group-dot-2 { background: var(--theme-2); }
.group-dot-3 { background: var(--theme-3); }
.group-dot-4 { background: var(--theme-4); }
.group-dot-5 { background: var(--theme-5); }
.group-dot-6 { background: var(--theme-6); }
.group-dot-7 { background: var(--theme-7); }
.group-dot-8 { background: var(--theme-8); }

/* 人物分组 — 彩色首字母圆圈 */
.group-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-right: 12px;
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: #fff;
}

.group-info {
  flex: 1;
  min-width: 0;
}
.group-name {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.group-en {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-muted);
}
.group-desc {
  font-size: 0.75rem;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.group-count {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-left: 8px;
  flex-shrink: 0;
  font-weight: 500;
}
.group-arrow {
  margin-left: 8px;
  font-size: 0.7rem;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: transform 300ms ease;
}
.group-row.expanded .group-arrow {
  transform: rotate(180deg);
}

/* 分组展开内容 */
.group-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 300ms ease;
}
.group-content.expanded {
  max-height: 70vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.group-content-inner {
  padding: 4px 0 12px;
}
/* 展开区域底部渐隐提示（暗示可滚动） */
.group-content.expanded::after {
  content: '';
  position: sticky;
  bottom: 0;
  display: block;
  height: 40px;
  background: linear-gradient(transparent, var(--bg));
  pointer-events: none;
}

/* 子分类标题 */
.sub-section-title {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  padding: 8px 4px 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sub-section-title::before {
  content: '';
  width: 3px; height: 14px;
  border-radius: 2px;
  background: var(--accent);
}

/* ===== 深度卡片 ===== */
.card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px var(--shadow);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  transition: box-shadow 200ms;
}
.card.theme-border-1 { border-left-color: var(--theme-1); }
.card.theme-border-2 { border-left-color: var(--theme-2); }
.card.theme-border-3 { border-left-color: var(--theme-3); }
.card.theme-border-4 { border-left-color: var(--theme-4); }
.card.theme-border-5 { border-left-color: var(--theme-5); }
.card.theme-border-6 { border-left-color: var(--theme-6); }
.card.theme-border-7 { border-left-color: var(--theme-7); }
.card.theme-border-8 { border-left-color: var(--theme-8); }

.card:active { box-shadow: 0 2px 8px var(--shadow); }
.card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 6px; gap: 8px;
}
.card-title {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 0.95rem; font-weight: 700;
  color: var(--text); flex: 1; line-height: 1.4;
}
.card-person-badge {
  font-size: 0.72rem;
  color: #fff;
  background: var(--accent);
  padding: 2px 10px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 500;
}
.card-core {
  font-size: 0.87rem; color: var(--text-secondary);
  line-height: 1.65; margin-bottom: 8px;
}
.card-expand-hint {
  font-size: 0.78rem; color: var(--accent);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
  min-height: 44px; padding: 8px 0;
}
.card-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 300ms ease;
}
.card.expanded .card-detail { max-height: 3000px; }
.card.expanded .card-expand-hint .arrow { transform: rotate(180deg); }
.card-detail-inner {
  padding-top: 12px; border-top: 1px solid var(--border);
  margin-top: 4px;
}
.card-detail-inner p {
  font-size: 0.85rem; color: var(--text-secondary);
  margin-bottom: 10px; line-height: 1.7;
}
.card-detail-inner .quote-block {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 0.85rem; font-style: italic;
  color: var(--text-muted); padding: 12px 16px;
  border-left: 3px solid var(--accent);
  background: var(--accent-light);
  border-radius: 0 8px 8px 0; margin-bottom: 10px;
  line-height: 1.7;
}
.card-detail-inner .en-quote {
  font-family: 'DM Mono', 'Menlo', monospace;
  font-size: 0.8rem; color: var(--text-muted);
  padding: 8px 14px; background: var(--accent-light);
  border-radius: 6px; margin-bottom: 10px;
}
.card-source {
  font-size: 0.75rem; color: var(--text-muted);
  text-align: right;
}
.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
}
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.person-tag {
  font-size: 0.72rem; padding: 2px 8px;
  border-radius: 10px; cursor: pointer;
  background: rgba(193,123,46,0.1); color: var(--accent);
  border: none; min-height: 28px;
  display: flex; align-items: center;
  transition: background 200ms;
}
.person-tag:hover { background: rgba(193,123,46,0.2); }
.card-actions { display: flex; gap: 2px; }
.card-action-btn {
  width: 36px; height: 36px; border: none;
  background: transparent; cursor: pointer;
  border-radius: 8px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; min-width: 44px; min-height: 44px;
  transition: background 200ms;
}
.card-action-btn:hover { background: var(--border); }
.card-action-btn.favorited { color: #e74c3c; }

/* ===== 金句卡片 ===== */
.quote-card {
  position: relative;
  background: var(--bg-card);
  border-radius: 12px;
  padding: 16px 16px 12px 20px;
  margin-bottom: 8px;
  box-shadow: 0 1px 3px var(--shadow);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
}
.quote-card.theme-border-1 { border-left-color: var(--theme-1); }
.quote-card.theme-border-2 { border-left-color: var(--theme-2); }
.quote-card.theme-border-3 { border-left-color: var(--theme-3); }
.quote-card.theme-border-4 { border-left-color: var(--theme-4); }
.quote-card.theme-border-5 { border-left-color: var(--theme-5); }
.quote-card.theme-border-6 { border-left-color: var(--theme-6); }
.quote-card.theme-border-7 { border-left-color: var(--theme-7); }
.quote-card.theme-border-8 { border-left-color: var(--theme-8); }

/* 引号装饰 */
.quote-card::before {
  content: '\201C';
  position: absolute;
  top: 6px; left: 10px;
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 2rem;
  color: var(--accent);
  opacity: 0.2;
  line-height: 1;
}
.quote-text {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 0.9rem; line-height: 1.7;
  color: var(--text); margin-bottom: 8px;
  padding-left: 4px;
}
.quote-footer {
  display: flex; justify-content: space-between; align-items: center;
}
.quote-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.quote-person {
  font-size: 0.78rem; color: var(--text-secondary);
  font-weight: 600; cursor: pointer;
}
.quote-person:hover { color: var(--accent); }
.quote-tag {
  font-size: 0.68rem; padding: 1px 8px;
  border-radius: 8px; color: #fff;
}
.tag-1 { background: var(--theme-1); }
.tag-2 { background: var(--theme-2); }
.tag-3 { background: var(--theme-3); }
.tag-4 { background: var(--theme-4); }
.tag-5 { background: var(--theme-5); }
.tag-6 { background: var(--theme-6); }
.tag-7 { background: var(--theme-7); }
.tag-8 { background: var(--theme-8); }

/* ===== 弹出面板 ===== */
.panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 200; display: none; opacity: 0;
  transition: opacity 200ms;
}
.panel-overlay.visible { display: block; opacity: 1; }
.panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card); border-radius: 16px 16px 0 0;
  max-height: 75vh; overflow-y: auto;
  z-index: 201; transform: translateY(100%);
  transition: transform 300ms ease;
  padding: 20px 16px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
}
.panel.visible { transform: translateY(0); }
.panel-title {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 1rem; font-weight: 700;
  margin-bottom: 16px; text-align: center;
  color: var(--text);
}
.panel-close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px; border: none;
  background: var(--border); border-radius: 50%;
  cursor: pointer; color: var(--text-secondary);
  font-size: 1rem; min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  transition: background 200ms;
}
.panel-close:hover { background: var(--text-muted); color: #fff; }

/* 人物标签云（收藏面板内的人物筛选） */
.person-cloud {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
}
.person-cloud-tag {
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); cursor: pointer;
  font-size: 0.82rem; transition: all 200ms;
  min-height: 36px;
}
.person-cloud-tag:hover, .person-cloud-tag.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.person-count { font-size: 0.7rem; opacity: 0.7; margin-left: 4px; }

.fav-empty {
  text-align: center; color: var(--text-muted);
  padding: 40px 0; font-size: 0.9rem;
}

/* ===== 顶部工具栏 ===== */
.toolbar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 4px;
  padding: 8px 16px 0;
}
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: none; background: transparent;
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; min-height: 44px; min-width: 44px;
  transition: background 200ms;
}
.icon-btn:hover { background: var(--border); }
.icon-btn.active { color: var(--accent); }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 10px 24px; border-radius: 20px;
  font-size: 0.82rem; z-index: 300;
  opacity: 0; transition: opacity 300ms;
  pointer-events: none; white-space: nowrap;
}
.toast.visible { opacity: 1; }

/* ===== 回到顶部 ===== */
#back-to-top {
  position: fixed; bottom: 24px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent); color: #fff;
  border: none; cursor: pointer; z-index: 99;
  display: none; align-items: center; justify-content: center;
  font-size: 1.2rem; box-shadow: 0 2px 12px var(--shadow);
  transition: opacity 200ms, transform 200ms;
}
#back-to-top.visible { display: flex; }
#back-to-top:hover { transform: scale(1.1); }

/* ===== 搜索高亮 ===== */
mark {
  background: rgba(193,123,46,0.25); color: inherit;
  border-radius: 2px; padding: 0 1px;
}

/* ===== 空状态 ===== */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; }

/* ===== 人物筛选提示 ===== */
.filter-banner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; margin-bottom: 10px;
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: 10px;
  font-size: 0.82rem; color: var(--accent);
}
.filter-banner button {
  border: none; background: transparent;
  color: var(--accent); cursor: pointer;
  font-size: 0.82rem; font-weight: 600;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}

/* ===== 响应式 ===== */
@media (min-width: 768px) {
  .hero { padding: 40px 20px 32px; }
  .hero-title { font-size: 2.2rem; }
  .hero-stats { gap: 48px; }
  .hero-stat-num { font-size: 2rem; }
  #content { max-width: 720px; }
  .sticky-bar { max-width: 100%; }
}

@media (max-width: 374px) {
  .hero-stats { gap: 20px; }
  .hero-stat-num { font-size: 1.3rem; }
  .hero-title { font-size: 1.5rem; }
}
</style>
</head>
<body>

<!-- 阅读进度条 -->
<div id="progress-bar" style="width:0"></div>

<!-- 顶部工具栏（收藏 + 深色模式） -->
<div class="toolbar">
  <button class="icon-btn" id="fav-toggle" aria-label="收藏夹" onclick="openPanel('fav')">&#9733;</button>
  <button class="icon-btn" id="dark-toggle" aria-label="深色模式" onclick="toggleDark()">&#9790;</button>
</div>

<!-- Hero 区域 -->
<section class="hero">
  <h1 class="hero-title">商业思想学习手册</h1>
  <p class="hero-subtitle">30 位思想者的核心洞察 —— 按主题或人物浏览</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <span class="hero-stat-num" id="hero-person-count">29</span>
      <span class="hero-stat-label">位人物</span>
    </div>
    <div class="hero-stat">
      <span class="hero-stat-num">527</span>
      <span class="hero-stat-label">条内容</span>
    </div>
    <div class="hero-stat">
      <span class="hero-stat-num">8</span>
      <span class="hero-stat-label">大主题</span>

<script>
/* ===== 数据 ===== */
const QUOTES = [{"type": "quote", "text": "华丽的文字不仅掩盖思想，还能掩盖思想的缺失。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q1"}, {"type": "quote", "text": "当你看到某个东西利用新技术给了人们以前想要但得不到的东西，你大概率在看一个赢家。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q2"}, {"type": "quote", "text": "独立思考有三个要素：对真相的严格态度、抵制被告知该想什么的惯性、以及旺盛的好奇心。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q3"}, {"type": "quote", "text": "不流行的想法，往往更有可能通往有趣的地方。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q4"}, {"type": "quote", "text": "反过来想，总是反过来想。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q5"}, {"type": "quote", "text": "承认无知是智慧的开始。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q6"}, {"type": "quote", "text": "保持理性是一种道德律令。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q7"}, {"type": "quote", "text": "大韩航空的多次空难事故，原因是副驾驶不敢纠正机长的错误决定——权威倾向强到宁可坠机也不敢开口。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q8"}, {"type": "quote", "text": "在博弈论的囚徒困境实验中，\"以牙还牙\"策略表现最佳。一个人永远不会忘记他埋下斧头的地方。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q9"}, {"type": "quote", "text": "联邦快递的夜班分拣员按小时计薪时总是拖延，改为按班次完成量计薪后，问题立刻消失。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q10"}, {"type": "quote", "text": "90%的司机认为自己的驾驶水平高于平均。甚至犯罪分子也会为自己的行为找到合理化理由。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q11"}, {"type": "quote", "text": "沟通就是把自己的人设强加给对方的过程。", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q12"}, {"type": "quote", "text": "一个 APP 只做一件事情，一个大而全的 APP 意味着全面的平庸。", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q13"}, {"type": "quote", "text": "我所说的，都是错的。", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q14"}, {"type": "quote", "text": "简单是很美的。简单的东西才最好用，简单的目标是一个最高的目标。", "person": "张小龙", "person_full": "张小龙", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q15"}, {"type": "quote", "text": "流通正在取代内容本身，mp3 取代唱片，微博取代书本。", "person": "张小龙", "person_full": "张小龙", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q16"}, {"type": "quote", "text": "认知，几乎是人和人之间唯一的本质差别。技能的差别是可量化的，认知的差别是本质的、不可量化的。", "person": "傅盛", "person_full": "傅盛", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q17"}, {"type": "quote", "text": "95%的人都处在不知道自己不知道的状态。", "person": "傅盛", "person_full": "傅盛", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q18"}, {"type": "quote", "text": "以大多数人满足感延迟程度之低，根本轮不到拼天赋。", "person": "张一鸣", "person_full": "张一鸣", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q19"}, {"type": "quote", "text": "最佳状态是保持在轻度喜悦和轻度沮丧之间。", "person": "张一鸣", "person_full": "张一鸣", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q20"}, {"type": "quote", "text": "参考别人，但不要跟随别人。跟随也是一种偷懒的方式。", "person": "张一鸣", "person_full": "张一鸣", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q21"}, {"type": "quote", "text": "做正确的事，而不是容易的事。容易走的路往往是下坡路。", "person": "张一鸣", "person_full": "张一鸣", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q22"}, {"type": "quote", "text": "关注事物的本质，持续看到事物的本质，就不容易焦虑。", "person": "张一鸣", "person_full": "张一鸣", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q23"}, {"type": "quote", "text": "消费升级不是让上海人去过巴黎人的生活，而是让安徽安庆的人有厨纸用，有好水果吃。", "person": "黄峥", "person_full": "黄峥", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q24"}, {"type": "quote", "text": "人的思想很容易被污染。常识是显而易见的，但偏见和利益蒙蔽了我们。", "person": "黄峥", "person_full": "黄峥", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q25"}, {"type": "quote", "text": "做对的事情比把事情做对更重要。多数人忙于后者，忽略了前者。", "person": "段永平", "person_full": "段永平", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q26"}, {"type": "quote", "text": "所谓敢为天下后，就是等看清了再做。不是不做，而是想清楚了再做。", "person": "段永平", "person_full": "段永平", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q27"}, {"type": "quote", "text": "很多人太注意所谓成功人士都干了啥，就是不注意他们不干啥。往往不干什么，才是决定成功的最重要因素。", "person": "段永平", "person_full": "段永平", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q28"}, {"type": "quote", "text": "加速计算不是一个选项，而是唯一的前进道路。通用计算已经触及能耗的天花板。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q29"}, {"type": "quote", "text": "推理就是思考，而思考很困难。思考远比阅读要难得多。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q30"}, {"type": "quote", "text": "第一性原理的思考方式是用物理学的角度看待世界——一层层拨开表象，看到本质。", "person": "马斯克", "person_full": "马斯克", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q31"}, {"type": "quote", "text": "物理学定律是不可变更的金科玉律。至于别人怎么做的、此前的惯常做法是怎样的，这些都只能当做参考建议。", "person": "马斯克", "person_full": "马斯克", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q32"}, {"type": "quote", "text": "别告诉我你怎么想，告诉我你的仓位是什么。永远不要相信没有切肤之痛的人。", "person": "塔勒布", "person_full": "塔勒布", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q33"}, {"type": "quote", "text": "人为压制波动性的问题在于：当系统终于崩溃时，会以更加猛烈的方式崩塌。", "person": "塔勒布", "person_full": "塔勒布", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q34"}, {"type": "quote", "text": "所有人都知道预防比治疗更重要，但预防只能得到很少的奖赏。", "person": "塔勒布", "person_full": "塔勒布", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q35"}, {"type": "quote", "text": "自由只意味着你是自己意见的所有者，它与财富无关，与个人勇气相关。", "person": "塔勒布", "person_full": "塔勒布", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q36"}, {"type": "quote", "text": "打算做新业务，必须删除原有业务。", "person": "德鲁克", "person_full": "德鲁克", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q37"}, {"type": "quote", "text": "我每天对着镜子问：如果今天是最后一天，我还会做原计划的事吗？", "person": "乔布斯", "person_full": "乔布斯", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q38"}, {"type": "quote", "text": "靠第七个最好的主意发家的人很少，靠最好的生意发家的人很多。要是你真能看懂生意，拥有的生意不应超过六个。", "person": "巴菲特", "person_full": "巴菲特", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q39"}, {"type": "quote", "text": "效率被过度高估；偷懒被过度贬低。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q40"}, {"type": "quote", "text": "当复制品极度丰富，它们便变得毫无价值。当复制品极度丰富，那些无法被复制的东西反而稀缺而珍贵。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q41"}, {"type": "quote", "text": "1970年之前，物理基础设施项目的完成速度远快于今天。之后发生了某种根本性的变化——不是技术退步了，而是制度和流程变得臃肿了。", "person": "Patrick Collison", "person_full": "Patrick Collison", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q42"}, {"type": "quote", "text": "有两种错误很常见，一是被已不存在的障碍继续束缚，二是继续追求已拥有的东西。", "person": "王兴", "person_full": "王兴", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q43"}, {"type": "quote", "text": "一流是做事，二流是评价别人，三流是评价别人的评价。", "person": "王兴", "person_full": "王兴", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q44"}, {"type": "quote", "text": "幸福是一种默认状态。当你去掉了对缺失事物的感知，剩下的就是幸福。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q45"}, {"type": "quote", "text": "对我而言最可怕的两件事：不知道自己不知道，和不能实事求是。", "person": "李想", "person_full": "李想", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q46"}, {"type": "quote", "text": "自信的最核心原因是对自己的认知，你知道自己想要什么，知道自己能放弃什么，你就自信了。", "person": "李想", "person_full": "李想", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q47"}, {"type": "quote", "text": "不行动的认知，就是伪认知。你以为重要和你真的认为重要，往往不是一回事。", "person": "傅盛", "person_full": "傅盛（刘强东）", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q48"}, {"type": "quote", "text": "我说的这一切都很可能是错的——诚实面对不确定性，是负责任规划的前提。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "认知与思维", "theme": "认知与决策", "theme_id": 1, "id": "q49"}, {"type": "quote", "text": "聪明是一种天赋，善良是一种选择。天赋易得——毕竟它们与生俱来，而选择难做。", "person": "贝索斯", "person_full": "贝索斯", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q50"}, {"type": "quote", "text": "在你们80岁时某个追忆往昔的时刻，最为充实、最有意义的那段讲述，会被你们作出的一系列决定所填满。最后，是选择塑造了我们的人生。", "person": "贝索斯", "person_full": "贝索斯", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q51"}, {"type": "quote", "text": "大多数决策有70%信息就应该做出；等到90%，大多数情况下你已经慢了。", "person": "贝索斯", "person_full": "贝索斯", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q52"}, {"type": "quote", "text": "决策分两类：单向门不可逆需极谨慎；双向门可撤回应快速行动。", "person": "贝索斯", "person_full": "贝索斯", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q53"}, {"type": "quote", "text": "用遗憾最小化框架做决策：80岁时回顾，不会后悔失败，只会后悔未曾尝试。", "person": "贝索斯", "person_full": "贝索斯", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q54"}, {"type": "quote", "text": "记住自己即将死去，是我用过最重要的工具。面对死亡，几乎每件事都消失了，只有最真实重要的东西才会留下。", "person": "乔布斯", "person_full": "乔布斯", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q55"}, {"type": "quote", "text": "战略的略是忽略，不敢忽略本质是分不清优先级。", "person": "傅盛", "person_full": "傅盛", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q56"}, {"type": "quote", "text": "战略就是在格局认知下找到破局点，制定路线图，投入资源。", "person": "傅盛", "person_full": "傅盛", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q57"}, {"type": "quote", "text": "秘诀不是做了什么，而是不做什么。", "person": "段永平", "person_full": "段永平", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q58"}, {"type": "quote", "text": "一辈子做20个投资决策就够了。", "person": "段永平", "person_full": "段永平", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q59"}, {"type": "quote", "text": "杠杆是判断力的倍增器。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q60"}, {"type": "quote", "text": "做判断时需要的不是睿智，而是面对事实时是否还有勇气用理性和常识来判断。", "person": "黄峥", "person_full": "黄峥", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q61"}, {"type": "quote", "text": "最重要的是理解一个决策的可逆程度。无法挽回的决定需要极其谨慎。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q62"}, {"type": "quote", "text": "好机会的一个重要特征是她往往会带来更多更好的机会。", "person": "王兴", "person_full": "王兴", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q63"}, {"type": "quote", "text": "战略上打持久战，战术上打歼灭战。", "person": "王兴", "person_full": "王兴", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q64"}, {"type": "quote", "text": "战略的核心就是取舍。", "person": "李想", "person_full": "李想", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q65"}, {"type": "quote", "text": "如果分析得足够好，决策会自己呈现。", "person": "王慧文", "person_full": "王慧文", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q66"}, {"type": "quote", "text": "决策是一种判断，是若干方案中的选择。决策必须有反面意见——它保护决策者不沦为组织的奴隶。", "person": "德鲁克", "person_full": "德鲁克", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q67"}, {"type": "quote", "text": "没有反对意见，就不做决策。", "person": "德鲁克", "person_full": "德鲁克", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q68"}, {"type": "quote", "text": "战略性的撤退、牺牲、决定放弃什么，是成功最核心的关键。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q69"}, {"type": "quote", "text": "真正的好机会不会在额头上大书好机会三个字。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "决策与判断", "theme": "认知与决策", "theme_id": 1, "id": "q70"}, {"type": "quote", "text": "反脆弱超越了韧性与强健。强健的系统抵御冲击、维持原状；反脆弱的系统则在冲击中变得更好。", "person": "塔勒布", "person_full": "塔勒布", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q71"}, {"type": "quote", "text": "脆弱的事物喜欢安宁的环境，强韧的事物不太在意环境，反脆弱的事物则从混乱中成长。", "person": "塔勒布", "person_full": "塔勒布", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q72"}, {"type": "quote", "text": "如果你的90%资金以现金形式持有，而剩下10%投资于风险极高的证券，那么你的损失不可能超过10%，而你的收益是没有上限的。", "person": "塔勒布", "person_full": "塔勒布", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q73"}, {"type": "quote", "text": "风会熄灭蜡烛，却能使火越烧越旺。对不确定性也一样：你要利用它们，而不是躲避。", "person": "塔勒布", "person_full": "塔勒布", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q74"}, {"type": "quote", "text": "如果失败的代价过于沉重，那么成功概率有多高根本无关紧要。", "person": "塔勒布", "person_full": "塔勒布", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q75"}, {"type": "quote", "text": "在黑天鹅世界里，优化是不可能的，你能做到的最好只是减少脆弱、增加稳健。", "person": "塔勒布", "person_full": "塔勒布", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q76"}, {"type": "quote", "text": "现在就去冒险吧，在你拥有那些义务之前。随着年龄增长，你的义务会增加。", "person": "马斯克", "person_full": "马斯克", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q77"}, {"type": "quote", "text": "失败是一种选择。如果事情没有失败，那你就没有足够的创新。", "person": "马斯克", "person_full": "马斯克", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q78"}, {"type": "quote", "text": "接受失败，但不接受放弃。", "person": "马斯克", "person_full": "马斯克", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q79"}, {"type": "quote", "text": "如果有10%的机会获得100倍回报，应该每次都下注。", "person": "贝索斯", "person_full": "贝索斯", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q80"}, {"type": "quote", "text": "年轻人不要试图追求安全感，特别是年轻的时候。如果你觉得安全了，很可能暗藏危机。", "person": "张一鸣", "person_full": "张一鸣", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q81"}, {"type": "quote", "text": "距离破产，还剩30天——这是我每天醒来脑中的声音，坚持了30年。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q82"}, {"type": "quote", "text": "如果我能回到30年前，我不确定自己还有勇气再创办NVIDIA。因为我低估了这段旅程的艰难。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q83"}, {"type": "quote", "text": "原子并没有比以前更重。现代基础设施建设变慢，是制度问题，不是技术问题。", "person": "Patrick Collison", "person_full": "Patrick Collison", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q84"}, {"type": "quote", "text": "为了得到对自己不重要的东西，甘愿拿对自己重要的东西去冒险，这简直是疯了。一生只需富一次。", "person": "巴菲特", "person_full": "巴菲特", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q85"}, {"type": "quote", "text": "你的声誉是你可以拥有的最重要的资产，因为你可以在它之上建立杠杆。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "风险与反脆弱", "theme": "认知与决策", "theme_id": 1, "id": "q86"}, {"type": "quote", "text": "有用的写作，是把论点推到尽可能强，恰好不越过虚假的边界。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q87"}, {"type": "quote", "text": "口语化的语言是思想的运动服。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q88"}, {"type": "quote", "text": "表达复杂的想法不需要复杂的句子。某个深奥领域的专家彼此讨论专业问题时，他们用的句式并不比讨论午饭吃什么更复杂。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q89"}, {"type": "quote", "text": "把想法写成文字是一场严格的测试。一篇文章最终包含的想法，有一半是你在写作过程中才想到的。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q90"}, {"type": "quote", "text": "如果把想法写下来总是能让它们变得更精确、更完整，那么一个从不写作的人，关于任何非平凡的事情都没有完全成型的想法。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q91"}, {"type": "quote", "text": "有一种思考，只有通过写作才能完成。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q92"}, {"type": "quote", "text": "不会写就不会想，不会读就不会写。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q93"}, {"type": "quote", "text": "好写作的大部分在于好想法。如果你知道自己在说什么，你可以用最朴素的文字来表达，别人就会觉得你文风好。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q94"}, {"type": "quote", "text": "面对足够大的听众，你不需要笑话、戏剧、个人故事或有力的表达。你只需要告诉他们想听的……低频音比高频音更容易穿墙。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q95"}, {"type": "quote", "text": "N条清单最大的弱点是几乎没有发现的空间。好的文章写作，其要义在于写作过程本身，而不是主题。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q96"}, {"type": "quote", "text": "人已经懒到，你不把文章推送到我桌面上，并且打开好了，字体合适，长度合适，有朋友的推荐语，我就不会阅读了。", "person": "张小龙", "person_full": "张小龙", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q97"}, {"type": "quote", "text": "Nike的广告从来不聊产品。他们赞美伟大的竞技体育和运动员。他们表达的是：他们是谁，他们代表什么。", "person": "乔布斯", "person_full": "乔布斯", "tag": "写作与表达", "theme": "写作与表达", "theme_id": 2, "id": "q98"}, {"type": "quote", "text": "我这辈子遇到的聪明人没有不每天阅读的——一个都没有。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q99"}, {"type": "quote", "text": "好奇心驱动的学习比功利性学习走得更远。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q100"}, {"type": "quote", "text": "聪明的人会把不常用但必需的技能作为对自己的一种责任来持续练习。学习不仅是获取知识，更是持续应用——不用就等于没学过。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q101"}, {"type": "quote", "text": "经典的复印机实验：说\"我能先复印吗？因为我要复印\"（理由毫无信息量）的成功率，显著高于不给理由的情况。在教育中给学生解释\"为什么要学这个\"比单纯要求他们学更有效。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q102"}, {"type": "quote", "text": "如果社会可以培训你获得某种技能，它终将培训出别人来替代你。专属知识往往是那些你觉得像玩、别人觉得像工作的东西。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q103"}, {"type": "quote", "text": "阅读不是为了获取信息，而是为了训练思维模型。读基础学科的经典著作，而非畅销书。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q104"}, {"type": "quote", "text": "一个领导者的本质就是做正确的决定。有足够大的信息输入，足够高的反思频度，你才会有足够的信息输出。", "person": "傅盛", "person_full": "傅盛", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q105"}, {"type": "quote", "text": "人人都是产品经理，产品即自己的一生。信息有不同保质期，年轻时应获取一生适用的信息。", "person": "王兴", "person_full": "王兴", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q106"}, {"type": "quote", "text": "放纵好奇心只会增加它，而不会满足它。问题引向更多问题。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q107"}, {"type": "quote", "text": "不断学习，不成熟也没关系，重要的是保持学习的心态。", "person": "张一鸣", "person_full": "张一鸣", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q108"}, {"type": "quote", "text": "短期内很多事情是由运气决定的，但长期来看，概率和运气背后是你的能力、学习速度和努力程度。", "person": "张一鸣", "person_full": "张一鸣", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q109"}, {"type": "quote", "text": "一个人的学习能力，才是他的核心竞争力。", "person": "德鲁克", "person_full": "德鲁克", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q110"}, {"type": "quote", "text": "不带任何目的，学起东西来，反而特别轻松，也特别快。", "person": "雷军", "person_full": "雷军", "tag": "学习与阅读", "theme": "写作与表达", "theme_id": 2, "id": "q111"}, {"type": "quote", "text": "驱动这个世界的不是贪婪，而是嫉妒。人们几乎从不承认自己的行为是嫉妒驱动的。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q112"}, {"type": "quote", "text": "成瘾者在生活严重恶化的情况下仍然坚持认为\"我能控制\"\"没那么严重\"——这不是意志力问题，而是心理否认在运作。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q113"}, {"type": "quote", "text": "心理学教科书逐条讲偏误，却几乎不教你它们如何组合。但生活中最重要的后果——开放式拍卖中的疯狂出价、邪教的洗脑——全都是多种倾向同时发力的结果。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q114"}, {"type": "quote", "text": "很多人人生中一半的问题是这个原因造成的——没有延迟满足感，延迟满足感本质是克服人性弱点。", "person": "张一鸣", "person_full": "张一鸣", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q115"}, {"type": "quote", "text": "社交的本质是找到同类。", "person": "张小龙", "person_full": "张小龙", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q116"}, {"type": "quote", "text": "我们总是高估了用户的智商，低估了用户的情商。", "person": "张小龙", "person_full": "张小龙", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q117"}, {"type": "quote", "text": "保持紧迫感。不是因为恐惧，而是因为机会窗口转瞬即逝。我每天都像公司快要倒闭一样工作。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q118"}, {"type": "quote", "text": "意义感主要来自人际关系与连结，而非经济劳动本身。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q119"}, {"type": "quote", "text": "好好耕耘12个爱你的人，远比1200万人喜欢你重要得多。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q120"}, {"type": "quote", "text": "本杰明·富兰克林发现，让别人帮自己一个小忙，比直接讨好对方更容易赢得好感——因为帮过你的人为了保持行为一致性，会说服自己喜欢你。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "人性与心理", "theme": "人性与心理", "theme_id": 3, "id": "q121"}, {"type": "quote", "text": "一个产品，要加多少的功能，才能成为一个垃圾产品啊！", "person": "张小龙", "person_full": "张小龙", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q122"}, {"type": "quote", "text": "需要说明书的产品不是好产品。", "person": "张小龙", "person_full": "张小龙", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q123"}, {"type": "quote", "text": "我们从来不关注用户在微信里停留的时长，那不是我们的目标。", "person": "张小龙", "person_full": "张小龙", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q124"}, {"type": "quote", "text": "产品一定程度上是为了满足人性中的贪嗔痴，这是用户的痛点。能把握住之后，产品经理应该超越其上，用产品帮助人们得以解脱。", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q125"}, {"type": "quote", "text": "想清楚自己究竟要做什么，不去迎合上司，不去讨好用户，不去取悦自己。想不清楚一个功能点之前，宁可不做。", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q126"}, {"type": "quote", "text": "产品经理永远都应该是文艺青年，而非理性青年。", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q127"}, {"type": "quote", "text": "产品经理需要\"一秒傻瓜，一秒专业\"——通过不断使用和改进来打磨产品。", "person": "马化腾", "person_full": "马化腾", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q128"}, {"type": "quote", "text": "不强迫用户。不为1%的需求骚扰99%的用户。在产品设计上：让功能存在于无形之中。", "person": "马化腾", "person_full": "马化腾", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q129"}, {"type": "quote", "text": "打造100个人热爱的产品，而非100万人勉强喜欢的产品。", "person": "Brian Chesky", "person_full": "Brian Chesky", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q130"}, {"type": "quote", "text": "基本没有用户会直接说出自己的需求，大部分人提的是 Demand 或者 Requirement，极少有人提的是 Needs。", "person": "王慧文", "person_full": "王慧文", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q131"}, {"type": "quote", "text": "所有伟大需求都面临两个质疑：一是\"这不可能实现\"，二是\"根本没这个需求\"。遇到更讲道理的人，还会问第三个问题：为什么是现在？", "person": "王慧文", "person_full": "王慧文", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q132"}, {"type": "quote", "text": "杠杆有三种形式：劳动力、资本、以及零边际成本复制的产品（代码和媒体）。代码和媒体是无需许可的杠杆。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q133"}, {"type": "quote", "text": "你无法等待用户来找你，你必须主动出去找他们。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q134"}, {"type": "quote", "text": "我从没见过哪家创业公司因为太努力取悦早期用户而走进死胡同。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q135"}, {"type": "quote", "text": "如果把零售业务客户体验分成三要素——价格、品质和服务，低价是'1'，品质和服务是两个'0'，失去了低价优势，其他一切竞争优势都会归零。", "person": "刘强东", "person_full": "刘强东", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q136"}, {"type": "quote", "text": "打造爆品时，首先考量的第一要素是，产品是否具备'明天属性'——给用户提供代表先进趋势的、令他们向往的全新体验。", "person": "雷军", "person_full": "雷军", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q137"}, {"type": "quote", "text": "产品定义的第一法则是做减法——满足80%用户的80%需求。", "person": "雷军", "person_full": "雷军", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q138"}, {"type": "quote", "text": "好产品不一定带来口碑，只有超过预期的产品才能带来口碑。", "person": "雷军", "person_full": "雷军", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q139"}, {"type": "quote", "text": "设计不只是外表和感觉，设计是产品如何运作。", "person": "乔布斯", "person_full": "乔布斯", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q140"}, {"type": "quote", "text": "专注和简单，这就是我的秘诀。简单比复杂更难做到。", "person": "乔布斯", "person_full": "乔布斯", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q141"}, {"type": "quote", "text": "能够长期维持的差异化就是护城河。差异化是用户需要但竞争对手满足不了的东西。", "person": "段永平", "person_full": "段永平", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q142"}, {"type": "quote", "text": "经营企业就是经营人心。产品可以被抄袭，但人心不能。消费者心智中的位置才是真正的护城河。", "person": "段永平", "person_full": "段永平", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q143"}, {"type": "quote", "text": "拼多多的核心不是便宜，而是满足用户占便宜的感觉。", "person": "黄峥", "person_full": "黄峥", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q144"}, {"type": "quote", "text": "华为命中注定是为客户而存在的，除了客户，华为没有存在的任何理由。", "person": "任正非", "person_full": "任正非", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q145"}, {"type": "quote", "text": "做产品一定要坚持面对事实，仔细辨析，小心求证，不绕弯，不侥幸，不鸵鸟。", "person": "张一鸣", "person_full": "张一鸣", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q146"}, {"type": "quote", "text": "产品与市场匹配没有发生时，你总能感觉到：客户没有从产品中获得价值，口碑没有传播，使用量增长不快。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q147"}, {"type": "quote", "text": "真正的用户价值，一定是帮助用户解决了某个问题，或者完成了某项任务，而不是仅仅提供了某个简单的功能。", "person": "李想", "person_full": "李想", "tag": "产品与用户", "theme": "产品与用户", "theme_id": 4, "id": "q148"}, {"type": "quote", "text": "真正的铁杆粉丝，是会购买你一切作品的那种人。关键的挑战在于：你必须与这1000个铁杆粉丝保持直接联系。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q149"}, {"type": "quote", "text": "对我来说，营销讲的是价值观。我们要非常清楚——我们想让人们铭记我们什么。", "person": "乔布斯", "person_full": "乔布斯", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q150"}, {"type": "quote", "text": "只有那些疯狂到以为自己能够改变世界的人，才能真正改变世界。", "person": "乔布斯", "person_full": "乔布斯 Think Different", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q151"}, {"type": "quote", "text": "可口可乐的广告永远不会出现死亡画面，只展示快乐场景——因为联想效应要求品牌只与正面情绪绑定。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q152"}, {"type": "quote", "text": "如果微信是一个人，它一定是你最好的朋友。那么，我怎么舍得在你最好的朋友脸上，贴一个广告呢？", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q153"}, {"type": "quote", "text": "事实再一次证明，快速消费品领域，没有降价3分钱无法摧毁的品牌忠诚度。", "person": "王兴", "person_full": "王兴", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q154"}, {"type": "quote", "text": "品牌是你与客户的连接。人们买戴尔是为了电脑，买苹果是为了生活方式。", "person": "Brian Chesky", "person_full": "Brian Chesky", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q155"}, {"type": "quote", "text": "我们从不在广告上花钱，我们把所有的钱都投在了产品研发及更好的产品设计上。", "person": "马斯克", "person_full": "马斯克", "tag": "品牌与传播", "theme": "产品与用户", "theme_id": 4, "id": "q156"}, {"type": "quote", "text": "当一个优秀的团队遇到一个糟糕的市场，市场赢；当一个优秀的团队遇到一个巨大的市场，就会创造奇迹。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q157"}, {"type": "quote", "text": "创业公司的生命只有两个阶段：达到产品市场匹配之前，和达到产品市场匹配之后。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q158"}, {"type": "quote", "text": "唯一重要的事是产品市场契合。在实现之前痴迷地追求它，不惜一切代价。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q159"}, {"type": "quote", "text": "0亿美元市场是最好的市场。我宁愿成为市场的创造者，也不愿做市场中的掠夺者。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q160"}, {"type": "quote", "text": "你的工作不是找到机会，而是找到你独一无二的方式去创造价值。市场不会等你。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q161"}, {"type": "quote", "text": "魔术师在别处施加强烈压力的同时偷走手表——在商业中，1000美元的选配放在65000美元车价旁边就不算什么了。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q162"}, {"type": "quote", "text": "用户体验、成本、效率，这三件事是全世界所有商业的核心和本质。", "person": "刘强东", "person_full": "刘强东", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q163"}, {"type": "quote", "text": "如果发现一个行业太乱太糟糕，那就是巨大的机会。", "person": "刘强东", "person_full": "刘强东", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q164"}, {"type": "quote", "text": "成本比毛利率更重要，这才是真正的核心竞争力。", "person": "刘强东", "person_full": "刘强东", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q165"}, {"type": "quote", "text": "追求财富而不是金钱。财富是在你睡觉时仍能为你赚钱的资产。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q166"}, {"type": "quote", "text": "依靠出租时间不可能致富。你必须拥有股权才能财务自由。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q167"}, {"type": "quote", "text": "时代的洪流浩浩荡荡，方向难以阻挡。在森林里，每一个局部树和树的竞争是激烈的。但如果我们看整个森林，最终所有树的方向又是一致的，那就是向着阳光的方向。", "person": "黄峥", "person_full": "黄峥", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q168"}, {"type": "quote", "text": "田忌赛马，在整体资源劣势下可以创造局部优势，进而赢得整个战役。", "person": "黄峥", "person_full": "黄峥", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q169"}, {"type": "quote", "text": "一种商业格局能否持续，本质上要看是否有利于消费者和价值创造者。", "person": "黄峥", "person_full": "黄峥", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q170"}, {"type": "quote", "text": "商业归根到底是靠逻辑赢的。", "person": "王兴", "person_full": "王兴", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q171"}, {"type": "quote", "text": "经济，短期看需求，长期看供给。", "person": "王兴", "person_full": "王兴", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q172"}, {"type": "quote", "text": "速度、质量和成本，三者只能取其二。", "person": "王兴", "person_full": "王兴", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q173"}, {"type": "quote", "text": "在市场爆发的时候是决定胜负的关键，平缓或者下滑的时候，再努力就没有用了，圈地变成了抢地。", "person": "李想", "person_full": "李想", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q174"}, {"type": "quote", "text": "互联网行业往往是赢家通吃，付出120%努力的人获得200%的回报。", "person": "张一鸣", "person_full": "张一鸣", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q175"}, {"type": "quote", "text": "非理性让社会存在各种商业机会，非理性让创业公司错过这些机会。不要非理性，要非常理性。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q176"}, {"type": "quote", "text": "模式、方向、战略提的很多，但许多公司其实死在非常重要但容易被忽略的基础点和细节上。", "person": "张一鸣", "person_full": "张一鸣", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q177"}, {"type": "quote", "text": "敢为天下后，后中争先。", "person": "段永平", "person_full": "段永平", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q178"}, {"type": "quote", "text": "规模效应就像万有引力，足够大就会把其他物质吸过来围绕自己转。", "person": "王慧文", "person_full": "王慧文", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q179"}, {"type": "quote", "text": "企业只有两种事情要做：营销和创新。", "person": "德鲁克", "person_full": "德鲁克", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q180"}, {"type": "quote", "text": "稳定的社会会逐渐硬化，被特殊利益群体绑架，失去活力。", "person": "Patrick Collison", "person_full": "Patrick Collison", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q181"}, {"type": "quote", "text": "战略就是一个杠杆。它让你做的每一件事都放大几倍、几十倍。一旦远离这个杠杆，就变成小公司创业模式。", "person": "傅盛", "person_full": "傅盛", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q182"}, {"type": "quote", "text": "创新决定了你是领袖还是追随者。", "person": "乔布斯", "person_full": "乔布斯", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q183"}, {"type": "quote", "text": "只有两件事叫创新：做别人没做过的，和做别人没做成的。", "person": "雷军", "person_full": "雷军", "tag": "商业与竞争", "theme": "商业与竞争", "theme_id": 5, "id": "q184"}, {"type": "quote", "text": "创业点子的获取方式不是去想点子，而是去发现问题，最好是你自己遇到的问题。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q185"}, {"type": "quote", "text": "最好的创业想法有三个共同点：创始人自己想要、自己能做出来、而且几乎没人意识到值得做。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q186"}, {"type": "quote", "text": "活在未来，然后构建缺失的东西。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q187"}, {"type": "quote", "text": "你必须做一件听起来像坏主意、但你知道其实不是的事。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q188"}, {"type": "quote", "text": "创业公司腾飞，是因为创始人让它腾飞。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q189"}, {"type": "quote", "text": "为了达到产品市场匹配，你可以做任何事：换人、改产品、改市场、拒绝客户、接受不想要的客户。不惜一切代价。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q190"}, {"type": "quote", "text": "P-80喷气战机从设计到交付只用了143天。帝国大厦从动工到完工410天。JavaScript原型10天写完。历史上人类曾以惊人的速度完成重大事物。", "person": "Patrick Collison", "person_full": "Patrick Collison", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q191"}, {"type": "quote", "text": "主将无能累死三军。执行很难的本质是没有做出正确的决定。", "person": "傅盛", "person_full": "傅盛", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q192"}, {"type": "quote", "text": "世界上最困难的事情是把一件事情真的想清楚。想清楚了执行就容易，执行力不够本质是没想清楚。", "person": "张一鸣", "person_full": "张一鸣", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q193"}, {"type": "quote", "text": "如果给过去五年的自己一个建议，就是激进再激进一点。", "person": "张一鸣", "person_full": "张一鸣", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q194"}, {"type": "quote", "text": "平庸有重力，需要逃逸速度。", "person": "张一鸣", "person_full": "张一鸣", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q195"}, {"type": "quote", "text": "企业家精神的本质是不顾当前掌握的资源而去追求机会。", "person": "王兴", "person_full": "王兴", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q196"}, {"type": "quote", "text": "想起来全是问题，做起来才有答案。", "person": "王兴", "person_full": "王兴", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q197"}, {"type": "quote", "text": "学会销售，学会构建，两技傍身，势不可当。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q198"}, {"type": "quote", "text": "我不会为尝试过后的失败而遗憾，倒是有所决定但完全不付诸行动会一直煎熬着我。", "person": "贝索斯", "person_full": "贝索斯", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q199"}, {"type": "quote", "text": "没有1000次失败就没有第1001次成功。失败和创新是不可分割的双胞胎。", "person": "贝索斯", "person_full": "贝索斯", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q200"}, {"type": "quote", "text": "我们的一夜成功耗时1000天。", "person": "Brian Chesky", "person_full": "Brian Chesky", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q201"}, {"type": "quote", "text": "约束激发创意。融资8亿后，那份执着和创造力很容易消散。", "person": "Brian Chesky", "person_full": "Brian Chesky", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q202"}, {"type": "quote", "text": "乐观、痴迷、自信、原始驱动力和人脉，是一切伟大事业的起点。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q203"}, {"type": "quote", "text": "灵感转瞬即逝，生命飞速流逝。不行动，是一种格外险恶的风险。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q204"}, {"type": "quote", "text": "快速迭代可以弥补很多不足；只要迭代够快，犯错通常没什么大不了。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q205"}, {"type": "quote", "text": "不要和旧事物作斗争；直接建设新的。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q206"}, {"type": "quote", "text": "要么不做，要做就做历史性的。", "person": "马斯克", "person_full": "马斯克", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q207"}, {"type": "quote", "text": "从0到1的验证期，千万不要试一试，要么全力以赴做成，要么早点去死。", "person": "李想", "person_full": "李想", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q208"}, {"type": "quote", "text": "我愿意押上我人生全部的声誉，为小米汽车而战。", "person": "雷军", "person_full": "雷军", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q209"}, {"type": "quote", "text": "只要没有倒闭，就是早入场比晚入场好。", "person": "王慧文", "person_full": "王慧文", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q210"}, {"type": "quote", "text": "不论是为了食物而奔跑还是不被当做食物而奔跑——无论如何，都要保持奔跑。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "创业与行动", "theme": "商业与竞争", "theme_id": 5, "id": "q211"}, {"type": "quote", "text": "效率是以正确的方式做事，效能则是做正确的事。", "person": "德鲁克", "person_full": "德鲁克", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q212"}, {"type": "quote", "text": "有所成就的人，都从最重要的事情做起。一次只做一件事。", "person": "德鲁克", "person_full": "德鲁克", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q213"}, {"type": "quote", "text": "用人不是为了克服弱点，而是为了发挥长处。", "person": "德鲁克", "person_full": "德鲁克", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q214"}, {"type": "quote", "text": "管理者自己工作的有效性，决定着现代组织的命运。卓有成效不是天赋，而是可以学会的习惯。", "person": "德鲁克", "person_full": "德鲁克", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q215"}, {"type": "quote", "text": "要发现自己的长处，唯一途径就是回馈分析法——每当做出重要决定或采取重要行动时，记录下自己对结果的预期，9至12个月后再将实际结果与预期比较。", "person": "德鲁克", "person_full": "德鲁克", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q216"}, {"type": "quote", "text": "如果一个组织的价值体系不为自己所接受或者与自己的价值观不相容，人们就会备感沮丧，工作效力低下。", "person": "德鲁克", "person_full": "德鲁克", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q217"}, {"type": "quote", "text": "本质是减少真正所谓管理的量，增加判断的量。培养做判断的能力，而非培养勤勉工作的能力。", "person": "傅盛", "person_full": "傅盛", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q218"}, {"type": "quote", "text": "管理的本质就是认知管理。", "person": "傅盛", "person_full": "傅盛", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q219"}, {"type": "quote", "text": "最好的管理方式不是靠制度，而是靠共同的追求和价值观来约束。", "person": "张一鸣", "person_full": "张一鸣", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q220"}, {"type": "quote", "text": "作为CEO，我要为这个公司里发生的一切负责，更要为该发生但却没发生的事情负责。", "person": "王兴", "person_full": "王兴", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q221"}, {"type": "quote", "text": "创始人模式的核心原则是深入细节。卓越的领导力是存在感，而非缺席感。", "person": "Brian Chesky", "person_full": "Brian Chesky", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q222"}, {"type": "quote", "text": "当创始人被告知要放弃本能、遵从传统管理结构时，他们会感到自己被欺骗了。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q223"}, {"type": "quote", "text": "最好的领导者不是最聪明的人，而是最能激发他人潜力的人。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q224"}, {"type": "quote", "text": "我宁愿帮你进步，也不愿放弃你。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q225"}, {"type": "quote", "text": "烧不死的鸟就是凤凰。公司永远不会提拔一个没有基层经验的人做高层管理者。", "person": "任正非", "person_full": "任正非", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q226"}, {"type": "quote", "text": "淡化英雄色彩，特别是淡化领导人、创业者的色彩，是实现职业化的必然之路。", "person": "任正非", "person_full": "任正非", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q227"}, {"type": "quote", "text": "一个职业管理者的社会责任与历史使命，就是为了完成组织目标而奋斗。", "person": "任正非", "person_full": "任正非", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q228"}, {"type": "quote", "text": "整天将KPI挂在嘴上的leader，都是不合格的、庸俗的。", "person": "张小龙", "person_full": "张小龙", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q229"}, {"type": "quote", "text": "我们将继续依据长期市场领导力的考量来做投资决策，而非短期盈利或华尔街的短期反应。", "person": "贝索斯", "person_full": "贝索斯", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q230"}, {"type": "quote", "text": "当你在领导时，真正的任务是创造更多领导者，而不是更多追随者。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q231"}, {"type": "quote", "text": "牛逼的战略是用普通的人达到非常好的结果。", "person": "李想", "person_full": "李想", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q232"}, {"type": "quote", "text": "规模小的时候速度就是效率，规模大到一定程度时质量就是效率。", "person": "李想", "person_full": "李想", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q233"}, {"type": "quote", "text": "聪明的组织管理意味着把冗余话多但内容空洞的人排除在关键决策之外。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q234"}, {"type": "quote", "text": "经典的电梯实验：当几个实验助手面朝后方站在电梯里时，后进来的陌生人也会转过身去面朝后方。在企业中，CEO做出愚蠢决策时，如果其他董事不反对，社会认同就让所有人觉得这没问题。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "管理与领导", "theme": "管理与团队", "theme_id": 6, "id": "q235"}, {"type": "quote", "text": "职业生涯三条规则：不卖你自己不愿买的东西，不为你不尊重的人工作，只和你喜欢的人合作。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q236"}, {"type": "quote", "text": "没有人能独自完成伟大的事情。你需要一支愿意为共同目标奋斗的团队。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q237"}, {"type": "quote", "text": "当你把标准定得极高，团队会觉得不可能完成。但当他们真正做到时，那种自豪感是无可替代的。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q238"}, {"type": "quote", "text": "组织的功能就是让平凡的人在一起做出不平凡的事。", "person": "德鲁克", "person_full": "德鲁克", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q239"}, {"type": "quote", "text": "物质资源终会枯竭，唯有文化才能生生不息。华为的文化就是奋斗文化。", "person": "任正非", "person_full": "任正非", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q240"}, {"type": "quote", "text": "文化比能力重要。能力很强但文化不符的人，危害远大于文化符合但能力差的人。", "person": "刘强东", "person_full": "刘强东", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q241"}, {"type": "quote", "text": "企业文化是一帮人约定好，一个简单有效的标准，定义什么叫对企业好。出一条，不需要一页解释。", "person": "李想", "person_full": "李想", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q242"}, {"type": "quote", "text": "坦率、坦诚是一起做事的人无比重要的品质。", "person": "张一鸣", "person_full": "张一鸣", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q243"}, {"type": "quote", "text": "如果你不在乎功劳落到谁头上，你能做成的事将会非常惊人。", "person": "王兴", "person_full": "王兴", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q244"}, {"type": "quote", "text": "公司的问题，就是员工的机会。", "person": "王兴", "person_full": "王兴", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q245"}, {"type": "quote", "text": "本分就是做对的事，和把事情做对。不占别人便宜就是最好的竞争力。", "person": "段永平", "person_full": "段永平", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q246"}, {"type": "quote", "text": "产品可以模仿，而文化是不可以模仿的。", "person": "段永平", "person_full": "段永平", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q247"}, {"type": "quote", "text": "信任不是开关，而是一个连续的光谱。每次履约充电，每次失约放电。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q248"}, {"type": "quote", "text": "文化就是一群人用热情共同做事的方式。", "person": "Brian Chesky", "person_full": "Brian Chesky", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q249"}, {"type": "quote", "text": "要组建一支才华横溢到让你略感不安的团队。", "person": "Brian Chesky", "person_full": "Brian Chesky", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q250"}, {"type": "quote", "text": "使用检查清单，刻意强调那些不容易记住的证据，在团队中安排\"指定怀疑者\"角色。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q251"}, {"type": "quote", "text": "同事之间如果怀有善意，效率一定更高。信任是最好的效率工具。", "person": "张一鸣", "person_full": "张一鸣", "tag": "团队与文化", "theme": "管理与团队", "theme_id": 6, "id": "q252"}, {"type": "quote", "text": "你和两岁孩子在一起的周末只有52个。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q253"}, {"type": "quote", "text": "不断剔除废话，不要等待才去做重要的事，好好珍惜你拥有的时光。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q254"}, {"type": "quote", "text": "你不必非常出色，只要在很长时间内保持比其他人聪明一点点就够了。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q255"}, {"type": "quote", "text": "时间是好生意的朋友，烂生意的敌人。", "person": "巴菲特", "person_full": "巴菲特", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q256"}, {"type": "quote", "text": "无论我们多么固执地渴求着对称和永恒，时间总是在不断制造着世间种种的不对称、不可逆以及死亡。", "person": "黄峥", "person_full": "黄峥", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q257"}, {"type": "quote", "text": "任何妄图趁人之危或利用漏洞使自身受益的想法，在时间面前显得异常愚蠢。", "person": "黄峥", "person_full": "黄峥", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q258"}, {"type": "quote", "text": "快就是慢，慢就是快。用平常心来做事情会更好。", "person": "黄峥", "person_full": "黄峥", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q259"}, {"type": "quote", "text": "别人腐败的时候我们在努力，别人消磨时光的时候我们在学习，延迟的满足一定会厚积薄发。", "person": "张一鸣", "person_full": "张一鸣", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q260"}, {"type": "quote", "text": "短期交往说话忽悠会有溢价，长期交往说话实在会有溢价。", "person": "张一鸣", "person_full": "张一鸣", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q261"}, {"type": "quote", "text": "坚持原则很多时候是经济的，可以看做是一种短期浮亏的长期受益的投资。", "person": "张一鸣", "person_full": "张一鸣", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q262"}, {"type": "quote", "text": "未来十年什么是不变的，比什么会改变更重要——因为你需要将战略建立在不变的事物上。", "person": "贝索斯", "person_full": "贝索斯", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q263"}, {"type": "quote", "text": "复利式指数增长是一种魔法。构建一个随规模扩大而获得复利优势的事业。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q264"}, {"type": "quote", "text": "培养迭代思维。生活中所有的回报都来自复利。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q265"}, {"type": "quote", "text": "我们高估了一天能做的事，也低估了十年能达成的事。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q266"}, {"type": "quote", "text": "你无法从前往后连接这些点，只有回头看时才能看到它们的关系。所以你必须相信这些点滴会以某种方式在你的未来串联起来。", "person": "乔布斯", "person_full": "乔布斯", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q267"}, {"type": "quote", "text": "每个人一天只有24个小时。互联网人的使命不应该是让所有人除了吃喝拉撒，把时间都花在看手机上面。", "person": "马化腾", "person_full": "马化腾（张小龙）", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q268"}, {"type": "quote", "text": "赚了不应该赚的钱，就是不本分。", "person": "段永平", "person_full": "段永平", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q269"}, {"type": "quote", "text": "从长远来看，合作制度胜过对抗，人文价值最终会占上风。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "长期主义", "theme": "长期主义", "theme_id": 7, "id": "q270"}, {"type": "quote", "text": "习惯的枷锁，开始的时候轻的难以察觉，到后来却重的无法摆脱。", "person": "巴菲特", "person_full": "巴菲特", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q271"}, {"type": "quote", "text": "在过去的任何一年，如果你一次都没有推翻过自己最中意的想法，那一年就算浪费了。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q272"}, {"type": "quote", "text": "想要得到一件东西，最稳妥的方法就是让自己配得上它。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q273"}, {"type": "quote", "text": "每天努力变得比醒来时聪明一点点，日复一年，你终将出人头地。", "person": "查理·芒格", "person_full": "查理·芒格", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q274"}, {"type": "quote", "text": "你们的时间有限，不要浪费在重复别人的生活上。不要被教条束缚。求知若饥，虚心若愚。", "person": "乔布斯", "person_full": "乔布斯", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q275"}, {"type": "quote", "text": "我坚信区分成功与不成功，一半的因素就是纯粹的毅力差别。", "person": "乔布斯", "person_full": "乔布斯", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q276"}, {"type": "quote", "text": "真正\"极度渴望成功\"且\"愿付非凡代价\"的人很少。成功路上并不拥挤，因为能坚持的人真的不多。", "person": "王兴", "person_full": "王兴", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q277"}, {"type": "quote", "text": "重要的不是当前的位置，而是方向和速度，以及加速度。", "person": "王兴", "person_full": "王兴", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q278"}, {"type": "quote", "text": "人因痛苦而改变，因受益而坚持。", "person": "李想", "person_full": "李想", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q279"}, {"type": "quote", "text": "既然这些痛苦难以回避，那我们能做的，就是直面这些痛苦，在痛苦中坚持前行。这就是痛苦的意义、挫折的馈赠。", "person": "雷军", "person_full": "雷军", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q280"}, {"type": "quote", "text": "我忍受痛苦和苦难的能力是我最珍视的超能力。智力不在这个列表的首位。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q281"}, {"type": "quote", "text": "坦诚面对错误、谦卑地寻求帮助，这是最聪明、最成功的人最难学会的品质。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q282"}, {"type": "quote", "text": "我每天早上从做最优先的工作开始。在我开始工作之前，我的一天已经成功了。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q283"}, {"type": "quote", "text": "我希望你们都能经历足够的痛苦和磨难。伟大不是来自智商，而是来自性格，而性格是在逆境中锻造的。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q284"}, {"type": "quote", "text": "强烈的动机比方法更根本。", "person": "张一鸣", "person_full": "张一鸣", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q285"}, {"type": "quote", "text": "人生太短，当你觉得某件事浪费生命时，就该想办法把它从生活中剔除。", "person": "保罗·格雷厄姆", "person_full": "保罗·格雷厄姆", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q286"}, {"type": "quote", "text": "专长指的是无法通过培训获得的知识。累积专长的过程对你像玩耍，对他人很吃力。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q287"}, {"type": "quote", "text": "安逸是通向堕落的道路。", "person": "塔勒布", "person_full": "塔勒布", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q288"}, {"type": "quote", "text": "困难唤醒了天才。", "person": "塔勒布", "person_full": "塔勒布", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q289"}, {"type": "quote", "text": "习惯远比灵感来得可靠。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q290"}, {"type": "quote", "text": "如果你重复今天做的事365天，一年后你会成为想成为的人吗？", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q291"}, {"type": "quote", "text": "防止变老的最佳实践是保持惊讶。", "person": "凯文·凯利", "person_full": "凯文·凯利", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q292"}, {"type": "quote", "text": "我认为凡人可以选择不平凡。", "person": "马斯克", "person_full": "马斯克", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q293"}, {"type": "quote", "text": "真正的超越机会不在工作时间上把对手逼死，而在认知深度上先把自己逼疯。", "person": "傅盛", "person_full": "傅盛", "tag": "成长与修炼", "theme": "长期主义", "theme_id": 7, "id": "q294"}, {"type": "quote", "text": "AI 是我们这个时代最强大的技术力量。每一个行业、每一家公司都将被它重新定义。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q295"}, {"type": "quote", "text": "软件正在吞噬世界，但 AI 正在吞噬软件。未来每一行代码都将由 AI 参与编写。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q296"}, {"type": "quote", "text": "我们在 CUDA 上投入了10年时间，没有任何回报。所有人都说我疯了。但正是这个决定让 NVIDIA 成为了 AI 时代的基础设施。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q297"}, {"type": "quote", "text": "未来的工厂不会生产汽车或手机，而是生产智能。AI 工厂将成为新的基础设施。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q298"}, {"type": "quote", "text": "NVIDIA 的核心竞争力不是芯片，而是我们构建的整个计算栈。从硬件到软件到生态系统，这才是真正的护城河。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q299"}, {"type": "quote", "text": "计算机已从指令驱动变为意图驱动。告诉它你想要什么，它会想出如何去做。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q300"}, {"type": "quote", "text": "AI不是工具。AI是工作。AI是会使用工具的工人。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q301"}, {"type": "quote", "text": "Token是人工智能的计算单位。几乎任何东西都可以被Token化。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q302"}, {"type": "quote", "text": "Token成本每年下降一个数量级。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q303"}, {"type": "quote", "text": "AI已进入良性循环：越聪明越多人用，用越多越聪明。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q304"}, {"type": "quote", "text": "物理AI是一个50万亿美元的机遇。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q305"}, {"type": "quote", "text": "一位科学家对我说：因为你的工作，我可以在有生之年完成毕生的工作。", "person": "黄仁勋", "person_full": "黄仁勋", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q306"}, {"type": "quote", "text": "AI可能将人类21世纪百年的进展压缩到短短5至10年之内实现。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q307"}, {"type": "quote", "text": "AI就像一个数据中心里的天才国家——拥有诺贝尔奖级别的智慧，运行速度是人类的数十倍。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q308"}, {"type": "quote", "text": "大多数人都低估了AI潜在好处的激进程度。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q309"}, {"type": "quote", "text": "大多数精神疾病很可能是可以治愈的——AI将通过分子生物学、神经测量、计算神经科学和行为干预四条路径共同推进。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q310"}, {"type": "quote", "text": "生物自由——每个人都有权决定自己想成为什么样的人。体重、外貌、生育等生物过程都将由人们自己掌控。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q311"}, {"type": "quote", "text": "强大的AI可能带来10%至20%的年GDP增长，同时在1到5年内取代半数初级白领岗位。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q312"}, {"type": "quote", "text": "AI已在编写Anthropic的大部分代码，形成自我强化的反馈循环——AI正在加速自身的发展。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q313"}, {"type": "quote", "text": "如果我们希望AI有利于民主，我们必须为这个结果而战——美好未来不是自动发生的。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q314"}, {"type": "quote", "text": "缩放定律已有十年实证记录——投入更多算力，AI几乎在所有认知技能上都会可预测地变强。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q315"}, {"type": "quote", "text": "智能非常强大，但它不是万能的魔法灰尘。", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q316"}, {"type": "quote", "text": "深度学习奏效了，随着规模扩大可预测地变得更好——用十五个字解释我们怎么走到今天。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q317"}, {"type": "quote", "text": "我们很可能在数千天内就能实现超级智能。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q318"}, {"type": "quote", "text": "十年内，地球上每个人的能力都将有可能超越今日最具影响力的人物。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q319"}, {"type": "quote", "text": "使用特定水平AI的成本，每12个月下降约10倍——超过摩尔定律。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q320"}, {"type": "quote", "text": "这场革命将创造巨大财富。一旦足够强大的AI加入劳动力，许多类型劳动力价格将降至接近于零。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q321"}, {"type": "quote", "text": "新的社会契约是：为所有人提供基础，但对任何人都没有上限。", "person": "Sam Altman", "person_full": "Sam Altman", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q322"}, {"type": "quote", "text": "有效使用AI现在是对Shopify每个人的基本期望。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q323"}, {"type": "quote", "text": "在申请更多人力和资源之前，团队必须证明为什么他们不能用AI完成想做的事情。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q324"}, {"type": "quote", "text": "AI是思考伙伴、深度研究员、批评者、导师和结对程序员。即便如此，我觉得自己只是刚刚触及表面。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q325"}, {"type": "quote", "text": "AI是我们这个时代最强大的杠杆。不掌握它就是主动放弃竞争优势。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q326"}, {"type": "quote", "text": "我见过用AI把工作效率提升100倍的人——他们去处理了以前根本不会尝试的任务。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q327"}, {"type": "quote", "text": "AI将彻底改变Shopify、我们的工作，以及我们余下的生命。", "person": "Tobi Lütke", "person_full": "Tobi Lütke", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q328"}, {"type": "quote", "text": "软件正在吞噬世界。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q329"}, {"type": "quote", "text": "技术是撬动世界的杠杆——用更少的资源做更多的事。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q330"}, {"type": "quote", "text": "唯一永续的增长来源，是技术。", "person": "马克·安德森", "person_full": "马克·安德森", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q331"}, {"type": "quote", "text": "AI有大约20%的概率导致人类灭绝。你必须认真对待尾部风险。", "person": "马斯克", "person_full": "马斯克", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q332"}, {"type": "quote", "text": "如果实现人机紧密共生，AI就不再是他者——它就是你自己。", "person": "马斯克", "person_full": "马斯克", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q333"}, {"type": "quote", "text": "代码和媒体是不需要许可就能使用的杠杆，这是新富阶层背后的力量。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "AI与技术", "theme": "AI与未来", "theme_id": 8, "id": "q334"}, {"type": "quote", "text": "没有偶然，只有必然。所有单点都是大趋势下的必然。", "person": "傅盛", "person_full": "傅盛", "tag": "", "theme": "认知与决策", "theme_id": 1, "id": "q335"}, {"type": "quote", "text": "一个想法或事实不会因为容易获取就更值得相信。", "person": "", "person_full": "易得性偏误的解药", "tag": "", "theme": "认知与决策", "theme_id": 1, "id": "q336"}, {"type": "quote", "text": "聪明的人会把不常用但必需的技能作为对自己的一种责任来持续练习。", "person": "查理·芒格", "person_full": "芒格", "tag": "", "theme": "认知与决策", "theme_id": 1, "id": "q337"}, {"type": "quote", "text": "效率\"（把事做对）转向", "person": "德鲁克", "person_full": "德鲁克", "tag": "", "theme": "认知与决策", "theme_id": 1, "id": "q338"}, {"type": "quote", "text": "成功的职业不是规划出来的，而是当机遇来临时，已具备自我认知的人自然水到渠成的结果。", "person": "德鲁克", "person_full": "德鲁克", "tag": "", "theme": "认知与决策", "theme_id": 1, "id": "q339"}, {"type": "quote", "text": "五年后\"或\"更重要的原则", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "认知与决策", "theme_id": 1, "id": "q340"}, {"type": "quote", "text": "无法选择或判断的时候，离远一步，用更重要的原则和更长的时间尺度来衡量就清楚了。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "认知与决策", "theme_id": 1, "id": "q341"}, {"type": "quote", "text": "绝大多数文章尚未被写出来。如果你有话要说，这就是写作的黄金时代。", "person": "保罗·格雷厄姆", "person_full": "PG", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q342"}, {"type": "quote", "text": "You can't think well without writing well, and you can't write well without reading well.", "person": "保罗·格雷厄姆", "person_full": "PG", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q343"}, {"type": "quote", "text": "If writing down your ideas always makes them more precise and more complete, then no one who hasn't written about a topic has fully formed ideas about it.", "person": "", "person_full": "不写作的人，关于任何非平凡话题都没有成型的想法", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q344"}, {"type": "quote", "text": "Informal language is the athletic clothing of ideas.", "person": "", "person_full": "口语化的语言是思想的运动服", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q345"}, {"type": "quote", "text": "If you simply manage to write in spoken language, you'll be ahead of 95% of writers.", "person": "保罗·格雷厄姆", "person_full": "PG", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q346"}, {"type": "quote", "text": "在当前变革的关键窗口期", "person": "保罗·格雷厄姆", "person_full": "PG", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q347"}, {"type": "quote", "text": "信息越透明，做表里不一的人成本越来越高。不装不但是道德品性优选，而且也是更经济的。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q348"}, {"type": "quote", "text": "当感到沟通困难的时候，最好的沟通方法不是想太多技巧和说法，而是：更坦诚的沟通。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "写作与表达", "theme_id": 2, "id": "q349"}, {"type": "quote", "text": "驱动这个世界的不是贪婪，而是嫉妒。", "person": "", "person_full": "大多数人不承认嫉妒驱动自己的行为，但这恰恰是最强大的社会动力", "tag": "", "theme": "人性与心理", "theme_id": 3, "id": "q350"}, {"type": "quote", "text": "时间总是在不断制造着世间种种的不对称、不可逆以及死亡。", "person": "", "person_full": "接受不可逆性，才能做出正确决策", "tag": "", "theme": "人性与心理", "theme_id": 3, "id": "q351"}, {"type": "quote", "text": "沟通就是把自己的人设强加给对方的过程。", "person": "", "person_full": "每条朋友圈、每次发言都在经营人设", "tag": "", "theme": "人性与心理", "theme_id": 3, "id": "q352"}, {"type": "quote", "text": "产品一定程度上是为了满足人性中的贪嗔痴。能把握住之后，产品经理应该超越其上。", "person": "张小龙", "person_full": "张小龙", "tag": "", "theme": "人性与心理", "theme_id": 3, "id": "q353"}, {"type": "quote", "text": "饥渴有三个层次：贪婪、成就动机、好奇心。分别关注：瞬间的结果、持续的过程、远大的未知。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "人性与心理", "theme_id": 3, "id": "q354"}, {"type": "quote", "text": "人欲望太强的时候就容易短视，太自我中心的时候就容易盲目。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "人性与心理", "theme_id": 3, "id": "q355"}, {"type": "quote", "text": "与智慧的
