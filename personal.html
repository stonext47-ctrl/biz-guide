具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 243, "type": "quote", "person": "黄峥", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7, "zh": "保险促进了财富从没钱人向有钱人的转移。有没有一种机制能让穷人也能卖保险给富人，让穷人也能出售自己的意愿和抗风险能力？", "en": "", "cite": "", "category": "风险与反脆弱", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 244, "type": "quote", "person": "黄峥", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7, "zh": "任何妄图趁人之危或利用漏洞使自身受益的想法，在时间面前显得异常愚蠢。", "en": "", "cite": "", "category": "长期主义", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 245, "type": "quote", "person": "黄峥", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7, "zh": "新的物种将会以和从前完全不一样的样子在新的土壤中孕育和生长。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 246, "type": "quote", "person": "段永平", "person_en": "Duan Yongping", "person_tagline": "步步高创始人·本分·不为清单", "person_order": 21, "zh": "做对的事情比把事情做对更重要。多数人忙于后者，忽略了前者。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 247, "type": "quote", "person": "段永平", "person_en": "Duan Yongping", "person_tagline": "步步高创始人·本分·不为清单", "person_order": 21, "zh": "所谓敢为天下后，就是等看清了再做。不是不做，而是想清楚了再做。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 248, "type": "quote", "person": "段永平", "person_en": "Duan Yongping", "person_tagline": "步步高创始人·本分·不为清单", "person_order": 21, "zh": "本分就是做对的事，和把事情做对。不占别人便宜就是最好的竞争力。", "en": "", "cite": "", "category": "团队与文化", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 249, "type": "quote", "person": "段永平", "person_en": "Duan Yongping", "person_tagline": "步步高创始人·本分·不为清单", "person_order": 21, "zh": "经营企业就是经营人心。产品可以被抄袭，但人心不能。消费者心智中的位置才是真正的护城河。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 250, "type": "quote", "person": "纳瓦尔", "person_en": "Naval Ravikant", "person_tagline": "AngelList·财富杠杆·特种知识", "person_order": 20, "zh": "杠杆有三种形式：劳动力、资本、以及零边际成本复制的产品（代码和媒体）。代码和媒体是无需许可的杠杆。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 251, "type": "quote", "person": "纳瓦尔", "person_en": "Naval Ravikant", "person_tagline": "AngelList·财富杠杆·特种知识", "person_order": 20, "zh": "阅读不是为了获取信息，而是为了训练思维模型。读基础学科的经典著作，而非畅销书。", "en": "", "cite": "", "category": "AI与技术", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 252, "type": "quote", "person": "纳瓦尔", "person_en": "Naval Ravikant", "person_tagline": "AngelList·财富杠杆·特种知识", "person_order": 20, "zh": "幸福是一种默认状态。当你去掉了对缺失事物的感知，剩下的就是幸福。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 253, "type": "quote", "person": "纳瓦尔", "person_en": "Naval Ravikant", "person_tagline": "AngelList·财富杠杆·特种知识", "person_order": 20, "zh": "你的声誉是你可以拥有的最重要的资产，因为你可以在它之上建立杠杆。用你的名字承担商业风险，社会会用声誉回报你。", "en": "", "cite": "", "category": "风险与反脆弱", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 254, "type": "quote", "person": "王慧文", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19, "zh": "基本没有用户会直接说出自己的需求，大部分人提的是Demand或者Requirement，极少有人提的是Needs。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 255, "type": "quote", "person": "王慧文", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19, "zh": "所有伟大需求都面临两个质疑：一是这不可能实现，二是根本没这个需求。遇到更讲道理的人，还会问第三个问题：为什么是现在？", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 256, "type": "quote", "person": "Tobi Lütke", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25, "zh": "有效使用AI现在是对Shopify每个人的基本期望。我不认为选择退出学习将AI应用于你的工作是可行的。", "en": "", "cite": "", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 257, "type": "quote", "person": "Tobi Lütke", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25, "zh": "在申请更多人力和资源之前，团队必须证明为什么他们不能用AI完成想做的事情。", "en": "", "cite": "", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 258, "type": "quote", "person": "Tobi Lütke", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25, "zh": "AI是思考伙伴、深度研究员、批评者、导师和结对程序员。即便如此，我觉得自己只是刚刚触及表面。", "en": "", "cite": "", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 259, "type": "quote", "person": "Tobi Lütke", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25, "zh": "信任就像一块电池。你和每个同事之间都有一块信任电池，每次互动都在充电或放电。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"type": "quote", "person": "马克·安德森", "person_en": "Marc Andreessen", "person_tagline": "A16z创始人·硅谷教父", "person_order": 22, "zh": "当一个优秀的团队遇到一个糟糕的市场，市场赢；当一个糟糕的团队遇到一个巨大的市场，市场赢；当一个优秀的团队遇到一个巨大的市场，就会创造奇迹。", "en": "", "cite": "", "category": "商业与竞争", "source_file": "", "id": 260}, {"type": "quote", "person": "马克·安德森", "person_en": "Marc Andreessen", "person_tagline": "A16z创始人·硅谷教父", "person_order": 22, "zh": "产品与市场匹配没有发生时，你总能感觉到：客户没有从产品中获得价值，口碑没有传播，使用量增长不快，媒体评论无关痛痒。", "en": "", "cite": "", "category": "产品与用户", "source_file": "", "id": 261}, {"type": "quote", "person": "马克·安德森", "person_en": "Marc Andreessen", "person_tagline": "A16z创始人·硅谷教父", "person_order": 22, "zh": "为了达到产品市场匹配，你可以做任何事：换人、改产品、改市场、拒绝客户、接受不想要的客户。不惜一切代价。", "en": "", "cite": "", "category": "创业与行动", "source_file": "", "id": 262}, {"type": "quote", "person": "马克·安德森", "person_en": "Marc Andreessen", "person_tagline": "A16z创始人·硅谷教父", "person_order": 22, "zh": "创业公司的生命只有两个阶段：达到产品市场匹配之前，和达到产品市场匹配之后。", "en": "", "cite": "", "category": "商业与竞争", "source_file": "", "id": 263}, {"type": "quote", "person": "Patrick Collison", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27, "zh": "P-80喷气战机从设计到交付只用了143天。帝国大厦从动工到完工410天。JavaScript原型10天写完。历史上人类曾以惊人的速度完成重大事物。", "en": "", "cite": "", "category": "创业与行动", "source_file": "", "id": 264}, {"type": "quote", "person": "Patrick Collison", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27, "zh": "1970年之前，物理基础设施项目的完成速度远快于今天。之后发生了某种根本性的变化——不是技术退步了，而是制度和流程变得臃肿了。", "en": "", "cite": "", "category": "认知与思维", "source_file": "", "id": 265}, {"type": "quote", "person": "Patrick Collison", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27, "zh": "我们需要一门新的'进步研究'——系统性地研究人类为什么在某些时期进步极快，而在另一些时期停滞不前。", "en": "", "cite": "", "category": "认知与思维", "source_file": "", "id": 266}, {"type": "quote", "person": "Patrick Collison", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27, "zh": "稳定的社会会逐渐硬化，被特殊利益群体绑架，失去活力。", "en": "", "cite": "", "category": "商业与竞争", "source_file": "", "id": 267}, {"type": "quote", "person": "乔布斯", "person_en": "Steve Jobs", "person_tagline": "Apple创始人·产品之神", "person_order": 23, "zh": "营销讲的是价值观。这是个复杂喧嚣的世界，我们没法让人们铭记我们，所以必须非常清楚——我们想让人们铭记我们什么。", "en": "", "cite": "", "category": "品牌与传播", "source_file": "", "id": 268}, {"type": "quote", "person": "乔布斯", "person_en": "Steve Jobs", "person_tagline": "Apple创始人·产品之神", "person_order": 23, "zh": "你无法从前往后连接这些点，只有回头看时才能看到它们的关系。所以你必须相信这些点滴会以某种方式在你的未来串联起来。", "en": "", "cite": "", "category": "长期主义", "source_file": "", "id": 269}, {"type": "quote", "person": "乔布斯", "person_en": "Steve Jobs", "person_tagline": "Apple创始人·产品之神", "person_order": 23, "zh": "记住自己即将死去，是我用过最重要的工具。它帮助我做出人生中的重大决定。面对死亡，几乎每件事都消失了，只有最真实重要的东西才会留下。", "en": "", "cite": "", "category": "决策与判断", "source_file": "", "id": 270}, {"type": "quote", "person": "乔布斯", "person_en": "Steve Jobs", "person_tagline": "Apple创始人·产品之神", "person_order": 23, "zh": "你们的时间有限，不要浪费在重复别人的生活上。不要被教条束缚。拥有追随自己内心与直觉的勇气。求知若饥，虚心若愚。", "en": "", "cite": "", "category": "成长与修炼", "source_file": "", "id": 271}, {"type": "quote", "person": "贝索斯", "person_en": "Jeff Bezos", "person_tagline": "亚马逊创始人·长期主义", "person_order": 14, "zh": "聪明是一种天赋，善良是一种选择。天赋易得，选择难做。", "en": "", "cite": "", "category": "成长与修炼", "source_file": "", "id": 272}, {"type": "quote", "person": "贝索斯", "person_en": "Jeff Bezos", "person_tagline": "亚马逊创始人·长期主义", "person_order": 14, "zh": "我不会为尝试过后的失败而遗憾，倒是有所决定但完全不付诸行动会一直煎熬着我。", "en": "", "cite": "", "category": "创业与行动", "source_file": "", "id": 273}, {"person": "保罗·格雷厄姆", "zh": "独立思考有三个要素：对真相的严格态度、抵制被告知该想什么的惯性、以及旺盛的好奇心。", "category": "认知与思维", "id": 274, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "你必须做一件听起来像坏主意、但你知道其实不是的事。", "category": "创业与行动", "id": 275, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "不流行的想法，往往更有可能通往有趣的地方。", "category": "认知与思维", "id": 276, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "当你听到某人说某件事时，停下来问问自己：那是真的吗？", "category": "认知与思维", "id": 277, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "放纵好奇心只会增加它，而不会满足它。问题引向更多问题。", "category": "学习与阅读", "id": 278, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "人生太短，当你觉得某件事浪费生命时，就该想办法把它从生活中剔除。", "category": "成长与修炼", "id": 279, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "你和两岁孩子在一起的周末只有52个。", "category": "长期主义", "id": 280, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "不断剔除废话，不要等待才去做重要的事，好好珍惜你拥有的时光。", "category": "长期主义", "id": 281, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "创业公司腾飞，是因为创始人让它腾飞。", "category": "创业与行动", "id": 282, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "你无法等待用户来找你，你必须主动出去找他们。", "category": "产品与用户", "id": 283, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "我从没见过哪家创业公司因为太努力取悦早期用户而走进死胡同。", "category": "产品与用户", "id": 284, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "创业点子的获取方式不是去想点子，而是去发现问题，最好是你自己遇到的问题。", "category": "创业与行动", "id": 285, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "最好的创业想法有三个共同点：创始人自己想要、自己能做出来、而且几乎没人意识到值得做。", "category": "创业与行动", "id": 286, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "保罗·格雷厄姆", "zh": "活在未来，然后构建缺失的东西。", "category": "创业与行动", "id": 287, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1}, {"person": "张一鸣", "zh": "别人腐败的时候我们在努力，别人消磨时光的时候我们在学习，延迟的满足一定会厚积薄发。", "category": "长期主义", "id": 288, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "短期交往说话忽悠会有溢价，长期交往说话实在会有溢价。", "category": "长期主义", "id": 289, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "坚持原则很多时候是经济的，可以看做是一种短期浮亏的长期受益的投资。", "category": "长期主义", "id": 290, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "非理性让社会存在各种商业机会，非理性让创业公司错过这些机会。", "category": "商业与竞争", "id": 291, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "互联网行业往往是赢家通吃，付出120%努力的人获得200%的回报。", "category": "商业与竞争", "id": 292, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "模式、方向、战略提的很多，但许多公司其实死在非常重要但容易被忽略的基础点和细节上。", "category": "商业与竞争", "id": 293, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "坦率、坦诚是一起做事的人无比重要的品质。", "category": "团队与文化", "id": 294, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "执行力就是态度和能力，不断筛选和提高大家的态度能力就是提高执行力。", "category": "管理与领导", "id": 295, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "强烈的动机比方法更根本。", "category": "成长与修炼", "id": 296, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "做产品一定要坚持面对事实，仔细辨析，小心求证，不绕弯，不侥幸，不鸵鸟。", "category": "产品与用户", "id": 297, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "张一鸣", "zh": "如果给过去五年的自己一个建议，就是激进再激进一点。", "category": "创业与行动", "id": 298, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5}, {"person": "王兴", "zh": "作为CEO，我要为这个公司里发生的一切负责，更要为该发生但却没发生的事情负责。", "category": "管理与领导", "id": 299, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "商业归根到底是靠逻辑赢的。", "category": "商业与竞争", "id": 300, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "经济，短期看需求，长期看供给。", "category": "商业与竞争", "id": 301, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "重要的不是当前的位置，而是方向和速度，以及加速度。", "category": "成长与修炼", "id": 302, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "有两种错误很常见，一是被已不存在的障碍继续束缚，二是继续追求已拥有的东西。", "category": "认知与思维", "id": 303, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "企业家精神的本质是不顾当前掌握的资源而去追求机会。", "category": "创业与行动", "id": 304, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "好机会的一个重要特征是她往往会带来更多更好的机会。", "category": "决策与判断", "id": 305, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "速度、质量和成本，三者只能取其二。", "category": "商业与竞争", "id": 306, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "战略上打持久战，战术上打歼灭战。", "category": "决策与判断", "id": 307, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "王兴", "zh": "如果你不在乎功劳落到谁头上，你能做成的事将会非常惊人。", "category": "团队与文化", "id": 308, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6}, {"person": "黄峥", "zh": "拼多多的核心不是便宜，而是满足用户占便宜的感觉。", "category": "产品与用户", "id": 309, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7}, {"person": "黄峥", "zh": "田忌赛马，在整体资源劣势下可以创造局部优势，进而赢得整个战役。", "category": "商业与竞争", "id": 310, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7}, {"person": "黄峥", "zh": "做判断时需要的不是睿智，而是面对事实时是否还有勇气用理性和常识来判断。", "category": "决策与判断", "id": 311, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7}, {"person": "黄峥", "zh": "人的思想很容易被污染。常识是显而易见的，但偏见和利益蒙蔽了我们。", "category": "认知与思维", "id": 312, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7}, {"person": "黄峥", "zh": "快就是慢，慢就是快。用平常心来做事情会更好。", "category": "长期主义", "id": 313, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7}, {"person": "黄峥", "zh": "一种商业格局能否持续，本质上要看是否有利于消费者和价值创造者。", "category": "商业与竞争", "id": 314, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7}, {"person": "芒格", "zh": "反过来想，总是反过来想。", "category": "认知与思维", "id": 315, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "承认无知是智慧的开始。", "category": "认知与思维", "id": 316, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "保持理性是一种道德律令。", "category": "决策与判断", "id": 317, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "我这辈子遇到的聪明人没有不每天阅读的——一个都没有。", "category": "学习与阅读", "id": 318, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "在过去的任何一年，如果你一次都没有推翻过自己最中意的想法，那一年就算浪费了。", "category": "成长与修炼", "id": 319, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "想要得到一件东西，最稳妥的方法就是让自己配得上它。", "category": "成长与修炼", "id": 320, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "你不必非常出色，只要在很长时间内保持比其他人聪明一点点就够了。", "category": "长期主义", "id": 321, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "职业生涯三条规则：不卖你自己不愿买的东西，不为你不尊重的人工作，只和你喜欢的人合作。", "category": "团队与文化", "id": 322, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "芒格", "zh": "每天努力变得比醒来时聪明一点点，日复一年，你终将出人头地。", "category": "成长与修炼", "id": 323, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "", "person_tagline": "", "person_order": 99}, {"person": "黄仁勋", "zh": "坦诚面对错误、谦卑地寻求帮助，这是最聪明、最成功的人最难学会的品质。", "category": "成长与修炼", "id": 324, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "承受痛苦和苦难，是在追求愿景的路上必经之痛。", "category": "成长与修炼", "id": 325, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "战略性的撤退、牺牲、决定放弃什么，是成功最核心的关键。", "category": "决策与判断", "id": 326, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "不论是为了食物而奔跑还是不被当做食物而奔跑——无论如何，都要保持奔跑。", "category": "创业与行动", "id": 327, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "我每天都不开心，我每年都对公司不满意，但我每一秒都爱这家公司。", "category": "创业与行动", "id": 328, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "你必须受苦，你必须奋斗，才能真正意识到自己所做的事情有多伟大。", "category": "成长与修炼", "id": 329, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "我宁愿帮你进步，也不愿放弃你。", "category": "管理与领导", "id": 330, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "0亿美元市场是最好的市场。我宁愿成为市场的创造者，也不愿做市场中的掠夺者。", "category": "商业与竞争", "id": 331, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "智能的扩展只取决于一个因素：计算能力。", "category": "AI与技术", "id": 332, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "推理就是思考，而思考很困难。思考远比阅读要难得多。", "category": "认知与思维", "id": 333, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "我忍受痛苦和苦难的能力是我最珍视的超能力。智力不在这个列表的首位。", "category": "成长与修炼", "id": 334, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "计算机已从指令驱动变为意图驱动。告诉它你想要什么，它会想出如何去做。", "category": "AI与技术", "id": 335, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "我每天早上从做最优先的工作开始。在我开始工作之前，我的一天已经成功了。", "category": "成长与修炼", "id": 336, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "距离破产，还剩30天——这是我每天醒来脑中的声音，坚持了30年。", "category": "风险与反脆弱", "id": 337, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "一位科学家对我说：因为你的工作，我可以在有生之年完成毕生的工作。", "category": "AI与技术", "id": 338, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "Dario Amodei", "zh": "AI就像一个数据中心里的天才国家——拥有诺贝尔奖级别的智慧，运行速度是人类的数十倍。", "category": "AI与技术", "id": 339, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "AI可能将人类21世纪百年的进展压缩到短短5至10年之内实现。", "category": "AI与技术", "id": 340, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "如果我们希望AI有利于民主，我们必须为这个结果而战——美好未来不是自动发生的。", "category": "AI与技术", "id": 341, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "意义感主要来自人际关系与连结，而非经济劳动本身。", "category": "人性与心理", "id": 342, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "我说的这一切都很可能是错的——诚实面对不确定性，是负责任规划的前提。", "category": "认知与思维", "id": 343, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "AI已在编写Anthropic的大部分代码，形成自我强化的反馈循环——AI正在加速自身的发展。", "category": "AI与技术", "id": 344, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "我们有能力成功渡过这个时代。我深信人类精神的高贵，但我们必须直面现实，不抱幻想。", "category": "风险与反脆弱", "id": 345, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "从长远来看，合作制度胜过对抗，人文价值最终会占上风。", "category": "长期主义", "id": 346, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Brian Chesky", "zh": "打造100个人热爱的产品，而非100万人勉强喜欢的产品。", "category": "产品与用户", "id": 347, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24}, {"person": "Brian Chesky", "zh": "创始人模式的核心原则是深入细节。卓越的领导力是存在感，而非缺席感。", "category": "管理与领导", "id": 348, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24}, {"person": "Brian Chesky", "zh": "我们的一夜成功耗时1000天。", "category": "创业与行动", "id": 349, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24}, {"person": "Brian Chesky", "zh": "文化就是一群人用热情共同做事的方式。", "category": "团队与文化", "id": 350, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24}, {"person": "Brian Chesky", "zh": "要组建一支才华横溢到让你略感不安的团队。", "category": "团队与文化", "id": 351, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24}, {"person": "Brian Chesky", "zh": "约束激发创意。融资8亿后，那份执着和创造力很容易消散。", "category": "创业与行动", "id": 352, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24}, {"person": "Brian Chesky", "zh": "品牌是你与客户的连接。人们买戴尔是为了电脑，买苹果是为了生活方式。", "category": "品牌与传播", "id": 353, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24}, {"person": "Tobi Lütke", "zh": "信任不是开关，而是一个连续的光谱。每次履约充电，每次失约放电。", "category": "团队与文化", "id": 354, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25}, {"person": "Tobi Lütke", "zh": "最重要的是理解一个决策的可逆程度。无法挽回的决定需要极其谨慎。", "category": "决策与判断", "id": 355, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25}, {"person": "Tobi Lütke", "zh": "反射性地使用AI是Shopify的基准期望——这不是可选项，而是默认要求。", "category": "AI与技术", "id": 356, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25}, {"person": "Tobi Lütke", "zh": "申请增加人手之前，团队必须先证明为什么这件事无法用AI完成。", "category": "AI与技术", "id": 357, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25}, {"person": "Patrick Collison", "zh": "1970年前人类以惊人速度建造重大事物。之后发生了根本性变化——不是技术退步，是制度臃肿了。", "category": "认知与思维", "id": 358, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27}, {"person": "Patrick Collison", "zh": "我们需要一门新的进步研究——系统性研究人类为什么在某些时期进步极快，而在另一些时期停滞。", "category": "认知与思维", "id": 359, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27}, {"person": "Patrick Collison", "zh": "原子并没有比以前更重。现代基础设施建设变慢，是制度问题，不是技术问题。", "category": "风险与反脆弱", "id": 360, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27}, {"person": "Patrick Collison", "zh": "扩展现有创新与创造新创新同等重要。", "category": "长期主义", "id": 361, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Patrick Collison", "person_tagline": "Stripe CEO·进步研究发起人", "person_order": 27}, {"person": "乔布斯", "zh": "设计不只是外表和感觉，设计是产品如何运作。", "category": "产品与用户", "id": 362, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Steve Jobs", "person_tagline": "苹果·品牌即价值观·现实扭曲力场", "person_order": 15}, {"person": "乔布斯", "zh": "专注和简单，这就是我的秘诀。简单比复杂更难做到。", "category": "产品与用户", "id": 363, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Steve Jobs", "person_tagline": "苹果·品牌即价值观·现实扭曲力场", "person_order": 15}, {"person": "乔布斯", "zh": "创新决定了你是领袖还是追随者。", "category": "商业与竞争", "id": 364, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Steve Jobs", "person_tagline": "苹果·品牌即价值观·现实扭曲力场", "person_order": 15}, {"person": "乔布斯", "zh": "我每天对着镜子问：如果今天是最后一天，我还会做原计划的事吗？", "category": "认知与思维", "id": 365, "type": "quote", 理·超级努力", "person_order": 14}, {"person": "马斯克", "zh": "失败是一种选择。如果事情没有失败，那你就没有足够的创新。", "category": "风险与反脆弱", "id": 374, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Elon Musk", "person_tagline": "Tesla/SpaceX·第一性原理·超级努力", "person_order": 14}, {"person": "马斯克", "zh": "若我不这么投入，才是最大的冒险，因为成功的希望将为零。", "category": "创业与行动", "id": 375, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Elon Musk", "person_tagline": "Tesla/SpaceX·第一性原理·超级努力", "person_order": 14}, {"person": "马斯克", "zh": "接受失败，但不接受放弃。", "category": "风险与反脆弱", "id": 376, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Elon Musk", "person_tagline": "Tesla/SpaceX·第一性原理·超级努力", "person_order": 14}, {"person": "马斯克", "zh": "要么不做，要做就做历史性的。", "category": "创业与行动", "id": 377, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Elon Musk", "person_tagline": "Tesla/SpaceX·第一性原理·超级努力", "person_order": 14}, {"person": "马斯克", "zh": "我认为凡人可以选择不平凡。", "category": "成长与修炼", "id": 378, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Elon Musk", "person_tagline": "Tesla/SpaceX·第一性原理·超级努力", "person_order": 14}, {"person": "马斯克", "zh": "梦想要远大，如果你的梦想没有吓到你，说明你做得不够大。", "category": "创业与行动", "id": 379, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Elon Musk", "person_tagline": "Tesla/SpaceX·第一性原理·超级努力", "person_order": 14}, {"person": "塔勒布", "zh": "风会熄灭蜡烛，却能使火越烧越旺。对不确定性也一样：你要利用它们，而不是躲避。", "category": "风险与反脆弱", "id": 380, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16}, {"person": "塔勒布", "zh": "如果失败的代价过于沉重，那么成功概率有多高根本无关紧要。", "category": "风险与反脆弱", "id": 381, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16}, {"person": "塔勒布", "zh": "所有人都知道预防比治疗更重要，但预防只能得到很少的奖赏。", "category": "认知与思维", "id": 382, "type": "quote", "en": ": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17}, {"person": "德鲁克", "zh": "一个人的学习能力，才是他的核心竞争力。", "category": "学习与阅读", "id": 392, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17}, {"person": "傅盛", "zh": "认知几乎是人和人之间唯一的本质差别。技能的差别是可量化的，而认知的差别是本质的。", "category": "认知与思维", "id": 393, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18}, {"person": "傅盛", "zh": "95%的人都处在不知道自己不知道的状态。", "category": "认知与思维", "id": 394, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18}, {"person": "傅盛", "zh": "管理的本质就是认知管理。", "category": "管理与领导", "id": 395, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18}, {"person": "傅盛", "zh": "战略的略是忽略，不敢忽略本质是分不清优先级。", "category": "决策与判断", "id": 396, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18}, {"person": "傅盛", "zh": "真正的超越机会不在工作时间上把对手逼死，而在认知深度上先把自己逼疯。", "category": "成长与修炼", "id": 397, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18}, {"person": "傅盛", "zh": "没有偶然只有必然，所有单点都是大趋势下的必然。", "category": "商业与竞争", "id": 398, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18}, {"person": "傅盛", "zh": "战略就是在格局认知下找到破局点，制定路线图，投入资源。", "category": "决策与判断", "id": 399, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18}, {"person": "段永平", "zh": "秘诀不是做了什么，而  "", "cite": "", "source_file": "", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12}, {"person": "雷军", "zh": "所有的挫折失败甚至看似毫无意义消磨时间的事，都将成为你最宝贵的财富。", "category": "成长与修炼", "id": 427, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12}, {"person": "雷军", "zh": "勇气并非没有恐惧，而是面对恐惧依然坚定不移。", "category": "成长与修炼", "id": 428, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12}, {"person": "王慧文", "zh": "规模效应就像万有引力，足够大就会把其他物质吸过来围绕自己转。", "category": "商业与竞争", "id": 429, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19}, {"person": "王慧文", "zh": "如果分析得足够好，决策会自己呈现。", "category": "决策与判断", "id": 430, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19}, {"person": "王慧文", "zh": "只要没有倒闭，就是早入场比晚入场好。", "category": "创业与行动", "id": 431, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19}, {"person": "王慧文", "zh": "投入的合理性取决于对市场体量的判断。判断对了尽早投入就是战略先机。", "category": "决策与判断", "id": 432, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19}, {"person": "刘强东", "zh": "用户体验、成本、效率，这三件事是全世界所有商业的核心和本质。", "category": "商业与竞争", "id": 433, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13}, {"person": "刘强东", "zh": "如果发现一个行业太乱太糟糕，那就是巨大的机会。", "category": "商业与竞争", "id": 434, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13}, {"person": "刘强东", "zh": "成本比毛利率更重要，这才是真正的核心竞争力 , {"person": "张小龙", "zh": "我们总是高估了用户的智商，低估了用户的情商。", "category": "人性与心理", "id": 444, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4}, {"person": "李想", "zh": "对我而言最可怕的两件事：不知道自己不知道，和不能实事求是。", "category": "认知与思维", "id": 445, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8}, {"person": "李想", "zh": "战略的核心就是取舍。", "category": "决策与判断", "id": 446, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8}, {"person": "李想", "zh": "牛逼的战略是用普通的人达到非常好的结果。", "category": "管理与领导", "id": 447, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8}, {"person": "李想", "zh": "从0到1的验证期，千万不要试一试，要么全力以赴做成，要么早点去死。", "category": "创业与行动", "id": 448, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8}, {"person": "李想", "zh": "规模小的时候速度就是效率，规模大到一定程度时质量就是效率。", "category": "管理与领导", "id": 449, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8}, {"person": "Dario Amodei", "zh": "大多数人都低估了AI潜在好处的激进程度。", "category": "AI与技术", "id": 450, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "AI可以将我们在整个21世纪本会取得的生物学和医学进展，压缩到短短几年内完成。", "category": "AI与技术", "id": 451, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "可靠地预防和治疗几乎所有自然传染病，将在强大AI出现后的5到10年内成为现实。", "category": "AI与技术", "id": 452, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "大多数癌症将被消灭；阿尔茨海默症将得到预防；人类寿命有望翻倍。", "category": "AI与技术", "id": 453, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "大多数精神疾病很可能是可以治愈的——AI将通过分子生物学、神经测量、计算神经科学和行为干预四条路径共同推进。", "category": "AI与技术", "id": 454, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "生物自由——每个人都有权决定自己想成为什么样的人。体重、外貌、生育等生物过程都将由人们自己掌控。", "category": "AI与技术", "id": 455, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "AI健康干预将在5到10年内传播至全球最贫困国家。", "category": "AI与技术", "id": 456, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "智能非常强大，但它不是万能的魔法灰尘。", "category": "AI与技术", "id": 457, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "强大的AI可能带来10%至20%的年GDP增长，同时在1到5年内取代半数初级白领岗位。", "category": "AI与技术", "id": 458, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "AI存在三类核心风险：自主性风险、滥用风险、政治风险。", "category": "AI与技术", "id": 459, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "缩放定律已有十年实证记录——投入更多算力，AI几乎在所有认知技能上都会可预测地变强。", "category": "AI与技术", "id": 460, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "Dario Amodei", "zh": "AI模型正在顶尖研究机构撰写大量代码，形成加速自身发展的正向飞轮。", "category": "AI与技术", "id": 461, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23}, {"person": "黄仁勋", "zh": "AI不是工具。AI是工作。AI是会使用工具的工人。", "category": "AI与技术", "id": 462, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "AI工厂只生产一样东西——尽可能多地产出有价值的Token。", "category": "AI与技术", "id": 463, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "Token是人工智能的计算单位。几乎任何东西都可以被Token化。", "category": "AI与技术", "id": 464, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "Token成本每年下降一个数量级。", "category": "AI与技术", "id": 465, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "预训练、后训练和推理思考是三项基础技术能力。思考才是真正的智能所在。", "category": "AI与技术", "id": 466, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "AI已进入良性循环：越聪明越多人用，用越多越聪明。", "category": "AI与技术", "id": 467, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "物理AI是一个50万亿美元的机遇。", "category": "AI与技术", "id": 468, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "黄仁勋", "zh": "规模往往会涌现出令人惊喜的突破性特性。", "category": "AI与技术", "id": 469, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Jensen Huang", "person_tagline": "NVIDIA创始人·AI教父·皮衣刀客", "person_order": 28}, {"person": "Sam Altman", "zh": "深度学习奏效了，随着规模扩大可预测地变得更好——用十五个字解释我们怎么走到今天。", "category": "AI与技术", "id": 470, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "我们很可能在数千天内就能实现超级智能。", "category": "AI与技术", "id": 471, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "十年内，地球上每个人的能力都将有可能超越今日最具影响力的人物。", "category": "AI与技术", "id": 472, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "AI模型的智能水平，大致等于用于训练和运行它的资源量的对数。", "category": "AI与技术", "id": 473, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "使用特定水平AI的成本，每12个月下降约10倍——超过摩尔定律。", "category": "AI与技术", "id": 474, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "这场革命将创造巨大财富。一旦足够强大的AI加入劳动力，许多类型劳动力价格将降至接近于零。", "category": "AI与技术", "id": 475, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "万物摩尔定律，应当成为这一代人的口号。", "category": "AI与技术", "id": 476, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "新的社会契约是：为所有人提供基础，但对任何人都没有上限。", "category": "AI与技术", "id": 477, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "乐观、痴迷、自信、原始驱动力和人脉，是一切伟大事业的起点。", "category": "创业与行动", "id": 478, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "灵感转瞬即逝，生命飞速流逝。不行动，是一种格外险恶的风险。", "category": "创业与行动", "id": 479, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "复利式指数增长是一种魔法。构建一个随规模扩大而获得复利优势的事业。", "category": "长期主义", "id": 480, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Sam Altman", "zh": "快速迭代可以弥补很多不足；只要迭代够快，犯错通常没什么大不了。", "category": "创业与行动", "id": 481, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Sam Altman", "person_tagline": "", "person_order": 99}, {"person": "Tobi Lütke", "zh": "AI将彻底改变Shopify、我们的工作，以及我们余下的生命。", "category": "AI与技术", "id": 482, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25}, {"person": "Tobi Lütke", "zh": "AI是我们这个时代最强大的杠杆。不掌握它就是主动放弃竞争优势。", "category": "AI与技术", "id": 483, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25}, {"person": "Tobi Lütke", "zh": "我见过用AI把工作效率提升100倍的人——他们去处理了以前根本不会尝试的任务。", "category": "AI与技术", "id": 484, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25}, {"person": "马斯克", "zh": "AI有大约20%的概率导致人类灭绝。你必须认真对待尾部风险。", "category": "AI与技术", "id": 485, "type": "quote", "en": "", "cite": "", "source_file": "", "person_en": "Elon Musk", "person_tagline": "Tesla/SpaceX·第一性原理· function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderQuoteItem(item, showPerson) {
  const isQuote = item.type === 'quote';
  let html = '<div class="quote-item" data-id="' + item.id + '">';

  if (isQuote) {
    // 引用类型
    const mainText = item.zh || item.en;
    html += '<div class="quote-text">' + escapeHtml(mainText) + '</div>';
    if (item.en && item.zh) {
      html += '<div class="quote-en">' + escapeHtml(item.en) + '</div>';
    }
  } else {
    // 观点类型
    html += '<div class="point-text">';
    if (item.title) {
      html += '<span class="point-title-text">' + escapeHtml(item.title) + '</span>';
    }
    if (item.body) {
      html += '<div class="point-body-text">' + escapeHtml(item.body) + '</div>';
    }
    html += '</div>';
  }

  // 元信息行
  html += '<div class="quote-meta">';
  if (showPerson) {
    html += '<span class="quote-person">' + escapeHtml(item.person) + '</span>';
  }
  if (item.cite) {
    html += '<span class="quote-cite">' + escapeHtml(item.cite) + '</span>';
  }
  html += '<span class="tag tag-' + item.category + '">' + escapeHtml(item.category) + '</span>';
  if (!isQuote && item.body) {
    html += '<button class="detail-toggle" onclick="toggleDetail(this)">展开</button>';
  }
  html += '</div>';

  html += '</div>';
  return html;
}

function renderPersonPanel(filter) {
  const panel = document.getElementById('panelPerson');
  let html = '';
  const lf = (filter || '').toLowerCase();

  for (const p of PERSONS) {
    // 过滤该人物的items
    let items = ALL_ITEMS.filter(i => i.person === p.name);
    if (lf) {
      items = items.filter(i => {
        const text = (i.zh || '') + (i.en || '') + (i.title || '') + (i.body || '') + (i.cite || '') + i.person + i.category;
        return text.toLowerCase().includes(lf);
      });
    }
    if (lf && items.length === 0) continue;

    const count = items.length;
    const initial = p.name.charAt(0);

    html += '<div class="person-card" data-person="' + escapeHtml(p.name) + '">';
    html += '<div class="person-header" onclick="toggleCard(this.parentElement)">';
    html += '<div class="person-avatar">' + initial + '</div>';
    html += '<div class="person-info">';
    html += '<div class="person-name">' + escapeHtml(p.name) + '<span class="en">' + escapeHtml(p.en) + '</span></div>';
    html += '<div class="person-tagline">' + escapeHtml(p.tagline) + '</div>';
    html += '</div>';
    html += '<span class="person-count">' + count + '</span>';
    html += '<svg class="person-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
    html += '</div>';

    // Body (预渲染但隐藏)
    html += '<div class="person-body">';

    // 核心观点概要（取前5个point）
    const points = items.filter(i => i.type === 'point').slice(0, 5);
    if (points.length > 0) {
      html += '<div class="person-summary"><h4>核心观点</h4>';
      for (const pt of points) {
        html += '<div class="point-item">';
        if (pt.title) html += '<strong>' + escapeHtml(pt.title) + '</strong> ';
        html += '</div>';
      }
      html += '</div>';
    }

    // 所有金句（按类型分组）
    const byCategory = {};
    for (const item of items) {
      if (!byCategory[item.category]) byCategory[item.category] = [];
      byCategory[item.category].push(item);
    }
    for (const [cat, catItems] of Object.entries(byCategory)) {
      html += '<div style="margin-top:12px"><span class="tag tag-' + cat + '" style="margin-bottom:8px;display:inline-block">' + escapeHtml(cat) + ' (' + catItems.length + ')</span></div>';
      for (const item of catItems) {
        html += renderQuoteItem(item, false);
      }
    }

    // 推荐阅读链接
    if (p.recommended && p.recommended.length > 0) {
      html += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border-light)">';
      html += '<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">推荐阅读</div>';
      for (const r of p.recommended) {
        if (r.url && r.url !== '搜索获取') {
          html += '<div style="font-size:13px;margin-bottom:4px"><a href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">' + escapeHtml(r.title) + ' ↗</a></div>';
        } else {
          html += '<div style="font-size:13px;margin-bottom:4px;color:var(--text-muted)">' + escapeHtml(r.title) + '</div>';
        }
      }
      html += '</div>';
    }

    // 原始来源文章
    if (p.articles && p.articles.length > 0) {
      html += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border-light)">';
      html += '<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">推荐阅读</div>';
      for (const a of p.articles) {
        if (a.link) {
          html += '<div style="font-size:13px;margin-bottom:4px"><a href="' + escapeHtml(a.link) + '" target="_blank" style="color:var(--accent);text-decoration:none">' + escapeHtml(a.title) + '</a></div>';
        } else if (a.title) {
          html += '<div style="font-size:13px;margin-bottom:4px;color:var(--text-secondary)">' + escapeHtml(a.title) + '</div>';
        }
      }
      html += '</div>';
    }

    html += '</div></div>';
  }

  if (!html) {
    html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>未找到匹配的内容</p></div>';
  }

  panel.innerHTML = html;
}

function renderCategoryPanel(filter) {
  const panel = document.getElementById('panelCategory');
  let html = '';
  const lf = (filter || '').toLowerCase();

  for (const cat of CATEGORIES) {
    let items = ALL_ITEMS.filter(i => i.category === cat);
    if (lf) {
      items = items.filter(i => {
        const text = (i.zh || '') + (i.en || '') + (i.title || '') + (i.body || '') + (i.cite || '') + i.person + i.category;
        return text.toLowerCase().includes(lf);
      });
    }
    if (lf && items.length === 0) continue;

    const color = CAT_COLORS[cat] || '#666';
    html += '<div class="category-card" data-category="' + escapeHtml(cat) + '">';
    html += '<div class="category-header" onclick="toggleCard(this.parentElement)">';
    html += '<div class="category-dot" style="background:' + color + '"></div>';
    html += '<div class="category-name">' + escapeHtml(cat) + '</div>';
    html += '<span class="category-count">' + items.length + '条</span>';
    html += '<svg class="category-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
    html += '</div>';

    html += '<div class="category-body">';

    // 按人物分组显示
    const byPerson = {};
    for (const item of items) {
      if (!byPerson[item.person]) byPerson[item.person] = [];
      byPerson[item.person].push(item);
    }
    // 按数量排序
    const sortedPersons = Object.entries(byPerson).sort((a,b) => b[1].length - a[1].length);
    for (const [person, personItems] of sortedPersons) {
      html += '<div style="margin-top:10px;font-size:13px;font-weight:600;color:var(--text-secondary)">' + escapeHtml(person) + ' (' + personItems.length + ')</div>';
      for (const item of personItems) {
        html += renderQuoteItem(item, false);
      }
    }

    html += '</div></div>';
  }

  if (!html) {
    html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>未找到匹配的内容</p></div>';
  }

  panel.innerHTML = html;
}

function renderAfuPanel(filter) {
  const panel = document.getElementById('panelAfu');
  let html = '';
  const lf = (filter || '').toLowerCase();

  html += '<div class="afu-tab-intro">';
  html += '<strong>阿福产品与品牌</strong><br>';
  html += '从28位商业领袖的洞察中提取与阿福业务直接相关的内容，按6个实战场景组织。';
  html += '</div>';

  for (const scene of AFU_SCENES) {
    let items = scene.items;
    if (lf) {
      items = items.filter(i => {
        const text = i.title + i.source + i.quote + i.apply;
        return text.toLowerCase().includes(lf);
      });
    }
    if (lf && items.length === 0) continue;

    html += '<div class="afu-scene-card" data-scene="' + scene.id + '">';
    html += '<div class="afu-scene-header" onclick="toggleCard(this.parentElement)">';
    html += '<div class="afu-scene-icon">' + scene.icon + '</div>';
    html += '<div class="afu-scene-info">';
    html += '<div class="afu-scene-name">' + escapeHtml(scene.name) + '</div>';
    html += '<div class="afu-scene-desc">' + escapeHtml(scene.desc) + '</div>';
    html += '</div>';
    html += '<span class="afu-scene-count">' + items.length + '</span>';
    html += '<svg class="afu-scene-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
    html += '</div>';

    html += '<div class="afu-scene-body">';
    for (const item of items) {
      html += '<div class="afu-insight-item">';
      html += '<div class="afu-insight-title">' + escapeHtml(item.title) + '</div>';
      html += '<span class="afu-insight-source">' + escapeHtml(item.source) + '</span>';
      html += '<div class="afu-insight-quote">' + escapeHtml(item.quote) + '</div>';
      html += '<div class="afu-insight-apply">' + escapeHtml(item.apply) + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  if (!html || (lf && html.indexOf('afu-scene-card') === -1)) {
    html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>未找到匹配的内容</p></div>';
  }

  panel.innerHTML = html;
}

// 交互
// ============================================================
let currentTab = 'person';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const panelMap = { person: 'panelPerson', category: 'panelCategory', afu: 'panelAfu' };
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === panelMap[tab]));
  applyFilter();
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

function toggleDetail(btn) {
  const item = btn.closest('.quote-item');
  const isOpen = item.classList.toggle('detail-open');
  btn.textContent = isOpen ? '收起' : '展开';
}

// 搜索
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchCount = document.getElementById('searchCount');
let searchTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 200);
  searchClear.style.display = searchInput.value ? 'block' : 'none';
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  searchCount.style.display = 'none';
  applyFilter();
});

function applyFilter() {
  const filter = searchInput.value.trim();
  renderPersonPanel(filter);
  renderCategoryPanel(filter);
  renderAfuPanel(filter);

  if (filter) {
    const lf = filter.toLowerCase();
    const matchCount = ALL_ITEMS.filter(i => {
      const text = (i.zh || '') + (i.en || '') + (i.title || '') + (i.body || '') + (i.cite || '') + i.person + i.category;
      return text.toLowerCase().includes(lf);
    }).length;
    searchCount.textContent = '找到 ' + matchCount + ' 条匹配';
    searchCount.style.display = 'block';
  } else {
    searchCount.style.display = 'none';
  }
}

const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
