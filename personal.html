常见敌人：未延迟的满足感，经验带来的麻痹或恐惧。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "人性与心理", "theme_id": 3, "id": "q356"}, {"type": "quote", "text": "每个人一天只有 24 小时。互联网人的使命不应该是让所有人把时间都花在看手机上面。", "person": "张小龙", "person_full": "张小龙", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q357"}, {"type": "quote", "text": "一个产品变成垃圾产品的过程，就是不断加功能的过程。", "person": "张小龙", "person_full": "张小龙", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q358"}, {"type": "quote", "text": "如果微信是一个人，它一定是你最好的朋友。那么，我怎么舍得在你最好的朋友脸上贴一个广告呢？", "person": "张小龙", "person_full": "张小龙", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q359"}, {"type": "quote", "text": "我所说的，都是错的。", "person": "", "person_full": "8小时演讲的最后一句话", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q360"}, {"type": "quote", "text": "一秒傻瓜，一秒专业\"的双重视角——张小龙说\"马化腾能在 3 秒内变成白痴级用户", "person": "马化腾", "person_full": "马化腾", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q361"}, {"type": "quote", "text": "如果战略点没做透，用户就会失望离开，花再多精力去弥补都无济于事。", "person": "马化腾", "person_full": "马化腾", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q362"}, {"type": "quote", "text": "不可能实现\"和\"根本没这需求", "person": "王慧文", "person_full": "王慧文", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q363"}, {"type": "quote", "text": "在任何时间点，默认大的商业机会是不存在的。全球优秀人才众多，好机会早被发现。", "person": "王慧文", "person_full": "王慧文", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q364"}, {"type": "quote", "text": "Software, free. The manual, $10,000. Genetic stems will be so cheap they will be free, but figuring out what they mean for your life will cost more.", "person": "凯文·凯利", "person_full": "KK", "tag": "", "theme": "产品与用户", "theme_id": 4, "id": "q365"}, {"type": "quote", "text": "反向保险", "person": "", "person_full": "1000个消费者联合表达购买意愿，工厂因获得需求确定性愿意给出30%折扣", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q366"}, {"type": "quote", "text": "腾讯有全中国最大的流量、投了一堆垂直电商，全没做成——因为流量逻辑今天无法成功", "person": "黄峥", "person_full": "黄峥", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q367"}, {"type": "quote", "text": "拼多多的存在本身就是一种模式，你可以说我 low，但你无法忽视我。", "person": "黄峥", "person_full": "黄峥", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q368"}, {"type": "quote", "text": "新的物种将会以和从前完全不一样的样子在新的土壤中孕育和生长。", "person": "黄峥", "person_full": "黄峥", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q369"}, {"type": "quote", "text": "When a great team meets a lousy market, market wins.", "person": "马克·安德森", "person_full": "安德森", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q370"}, {"type": "quote", "text": "Do whatever is required to get to product/market fit. Including changing out people, rewriting your product, moving into a different market.", "person": "马克·安德森", "person_full": "安德森", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q371"}, {"type": "quote", "text": "如果你需要问'我们有没有 PMF'——那就是没有。", "person": "马克·安德森", "person_full": "安德森", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q372"}, {"type": "quote", "text": "Don't do startups that require deals with big companies to make them successful.", "person": "", "person_full": "大公司是白鲸，完全不可预测", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q373"}, {"type": "quote", "text": "高管们谈花里胡哨的故事太多，但谈成本、效率、体验太少。", "person": "", "person_full": "组织膨胀后的自检信号", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q374"}, {"type": "quote", "text": "创业忌：未思进，先思退。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q375"}, {"type": "quote", "text": "互联网行业往往是 Winner Takes All。120% 的努力获得 200% 的回报。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q376"}, {"type": "quote", "text": "不鸵鸟\"——不绕弯、不侥幸，必须直面问题，极其警惕", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q377"}, {"type": "quote", "text": "我相信信息的聚合、检索、关联、推荐有很大的空间。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "商业与竞争", "theme_id": 5, "id": "q378"}, {"type": "quote", "text": "当你给一个人足够的信任和压力的时候，他总能比原来做的更好。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q379"}, {"type": "quote", "text": "对于一名 CEO 而言，最难的事可能就是抵制住想自己解决问题的欲望。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q380"}, {"type": "quote", "text": "别装，做个坦诚真实的人。团队中都是坦诚真实的人，沟通成本将小很多。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q381"}, {"type": "quote", "text": "深入细节\"不等于\"微管理", "person": "Brian Chesky", "person_full": "Chesky", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q382"}, {"type": "quote", "text": "Founders feel like they're being gaslit when told to abandon their instincts for traditional management structures.", "person": "Brian Chesky", "person_full": "Chesky", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q383"}, {"type": "quote", "text": "烧不死的鸟就是凤凰", "person": "", "person_full": "逆境是筛选机制，公司永远不会提拔没有基层经验的人做高层管理者", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q384"}, {"type": "quote", "text": "小草再怎么浇水也长不成大树，如果价值评价体系不正确的话，导向体系就错了。", "person": "任正非", "person_full": "任正非", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q385"}, {"type": "quote", "text": "一个职业管理者的社会责任，就是为了完成组织目标而奋斗。缩短时间，节约资源。", "person": "任正非", "person_full": "任正非", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q386"}, {"type": "quote", "text": "有什么、要什么、舍什么", "person": "", "person_full": "速度、质量、成本三者只能取其二", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q387"}, {"type": "quote", "text": "一个年轻同事说'我可以学'。这四个简单的字里有无穷的力量。", "person": "王兴", "person_full": "王兴", "tag": "", "theme": "管理与团队", "theme_id": 6, "id": "q388"}, {"type": "quote", "text": "时间是好生意的朋友，烂生意的敌人。", "person": "", "person_full": "判断一件事值不值得做的终极标准", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q389"}, {"type": "quote", "text": "人为压制波动性的问题是：当系统最终崩溃时，会以更猛烈的方式崩溃。", "person": "塔勒布", "person_full": "塔勒布", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q390"}, {"type": "quote", "text": "Don't tell me what you think, tell me what you have in your portfolio.", "person": "", "person_full": "切肤之痛的终极检验", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q391"}, {"type": "quote", "text": "不做不对的事\"比\"做对的事\"更重要——\"很多人太注意成功人士都干了啥，就是不注意他们不干啥。", "person": "段永平", "person_full": "段永平", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q392"}, {"type": "quote", "text": "如果你赚的是本分钱，你会睡得好。身体好会活得长，最后还是会赚到很多钱的。最重要的是，不本分赚钱的人其实不快乐。", "person": "段永平", "person_full": "段永平", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q393"}, {"type": "quote", "text": "敢为天下后，后中争先", "person": "", "person_full": "不做第一个吃螃蟹的人，但要做把螃蟹做成满汉全席的人", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q394"}, {"type": "quote", "text": "知道自己能力圈有多大，往往比能力圈本身更重要。", "person": "段永平", "person_full": "段永平", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q395"}, {"type": "quote", "text": "判断力被严重低估，努力被严重高估。", "person": "纳瓦尔", "person_full": "纳瓦尔", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q396"}, {"type": "quote", "text": "About 99% of the time, the right time is right now.", "person": "凯文·凯利", "person_full": "KK", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q397"}, {"type": "quote", "text": "Cultivate 12 people who love you, because they are worth more than 12 million people who like you.", "person": "凯文·凯利", "person_full": "KK", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q398"}, {"type": "quote", "text": "Three things you need: The ability to not give up something till it works, the ability to give up something that does not work, and the trust in other people to help you distinguish between the two.", "person": "凯文·凯利", "person_full": "KK", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q399"}, {"type": "quote", "text": "Efficiency is highly overrated; Goofing off is highly underrated.", "person": "", "person_full": "定期的无目的休息是高绩效的必要条件", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q400"}, {"type": "quote", "text": "不要关注'变健康'这个结果，关注'成为不会错过锻炼的人'这个身份。", "person": "凯文·凯利", "person_full": "KK", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q401"}, {"type": "quote", "text": "人因痛苦而改变，因受益而坚持。", "person": "", "person_full": "行为改变的双引擎", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q402"}, {"type": "quote", "text": "既然这些痛苦难以回避，能做的就是直面这些痛苦，在痛苦中坚持前行。这就是痛苦的意义、挫折的馈赠。", "person": "雷军", "person_full": "雷军", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q403"}, {"type": "quote", "text": "不带任何目的，学起东西来，反而特别轻松，也特别快。", "person": "", "person_full": "功利心是学习的最大障碍", "tag": "", "theme": "长期主义", "theme_id": 7, "id": "q404"}, {"type": "quote", "text": "Technologies creating new jobs typically require skills developed over decades, while displacement happens within months.", "person": "", "person_full": "最残酷的不对称", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q405"}, {"type": "quote", "text": "I believe deeply in our ability to prevail, but we must face the situation squarely and without illusions.", "person": "Dario Amodei", "person_full": "Dario Amodei", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q406"}, {"type": "quote", "text": "有效使用 AI 是每个人的基本期望", "person": "", "person_full": "不是建议，是要求", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q407"}, {"type": "quote", "text": "红皇后赛跑", "person": "", "person_full": "不进步就是退步。有同事已做到\"此前认为不可能的 10 倍产出\"", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q408"}, {"type": "quote", "text": "I don't think it's feasible to opt out of learning the skill of applying AI in your craft.", "person": "", "person_full": "AI不是可选项", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q409"}, {"type": "quote", "text": "通过第一性原理，我把事情升华到最根本的真理，然后从最核心处开始推理。", "person": "马斯克", "person_full": "马斯克", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q410"}, {"type": "quote", "text": "如果别人工作 50 小时而你工作 100 小时，即使做同样的事，你一年中的工作量是另一家公司的两倍。", "person": "马斯克", "person_full": "马斯克", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q411"}, {"type": "quote", "text": "现在就去冒险吧，在你拥有那些义务之前。", "person": "", "person_full": "窗口期会关闭", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q412"}, {"type": "quote", "text": "我们要非常清楚——我们想让人们铭记我们什么。", "person": "乔布斯", "person_full": "乔布斯", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q413"}, {"type": "quote", "text": "只有那些疯狂到以为自己能够改变世界的人，才能真正改变世界。", "person": "乔布斯", "person_full": "乔布斯", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q414"}, {"type": "quote", "text": "聪明是一种天赋，善良是一种选择。天赋易得，选择难做。", "person": "", "person_full": "80 岁回望时，最充实的部分由选择填满", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q415"}, {"type": "quote", "text": "未来十年什么不变？这个问题比'什么会变'重要得多。你可以围绕不变的东西制定战略。", "person": "贝索斯", "person_full": "贝索斯", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q416"}, {"type": "quote", "text": "Word of mouth remains the most powerful customer acquisition tool.", "person": "", "person_full": "口碑是最强获客工具", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q417"}, {"type": "quote", "text": "帮用户省钱不再是唯一思路，甚至不是最佳思路。", "person": "张一鸣", "person_full": "张一鸣", "tag": "", "theme": "AI与未来", "theme_id": 8, "id": "q418"}];
const SUMMARIES = [{"type": "summary", "title": "成长的唯一障碍是认知", "person": "傅盛", "core": "人与人之间唯一本质的差别是认知，技能差别可追赶，认知差别是质的不同。95%的人困在\"不知道自己不知道\"的第一层。", "detail": "四种认知状态——不知道自己不知道（95%的人）→ 知道自己不知道（有敬畏心）→ 知道自己知道（掌握规律）→ 不知道自己知道（永远空杯）。鸦片战争的本质不是武器差距，而是掌握现代物理学认知的人击败了信奉四书五经认知的人。认知才是真正的核心竞争力：史玉柱失去所有财富，仅凭营销认知就能翻身。", "quote": "\"认知，几乎是人和人之间唯一的本质差别。技能的差别是可量化的，认知的差别是本质的、不可量化的。\"", "source": "傅盛，《所谓成长就是认知升级》", "theme": "认知与决策", "theme_id": 1, "id": "s1"}, {"type": "summary", "title": "不行动的认知就是伪认知", "person": "傅盛", "core": "说了两年\"内容很重要\"却迟迟不动手，等于从未拥有过这个认知。认知必须驱动行动，否则毫无价值。", "detail": "傅盛反思自己对今日头条的判断：说了两年\"内容很重要\"，到2015年四季度才真正行动。\"你以为重要和你真的认为重要，往往不是一回事。\"认知升级三剂解药：一是坚信大趋势、立即行动（不理解就执行，在执行中理解）；二是对外求教、不做井底之蛙；三是活在当下、面向未来。", "quote": "\"不行动的认知，就是伪认知。你以为重要和你真的认为重要，往往不是一回事。\"", "source": "傅盛，《所谓成长就是认知升级》", "theme": "认知与决策", "theme_id": 1, "id": "s2"}, {"type": "summary", "title": "管理本质就是认知管理", "person": "傅盛", "core": "管理的核心是判断力，判断力的核心是认知。减少管理的量，增加判断的量。", "detail": "一个人的认知要大于整个团队的认知。三个维度管理：信息（深入分析对手、遍访行业）、时间（时间分配暴露真实优先级）、人（管一个人达到管一片人的目的）。\"战略的略是忽略\"——不敢忽略的本质是认知不够清晰。先胜后战，看上去是千军万马在打，本质是两个将领脑海里的战争格局。", "quote": "\"主将无能累死三军。执行很难的本质是没有做出正确的决定。\"", "source": "傅盛，《管理本质就是认知管理》", "theme": "认知与决策", "theme_id": 1, "id": "s3"}, {"type": "summary", "title": "判断力被严重低估，努力被严重高估", "person": "", "core": "对市值1000亿美元的公司，判断力从75%提升到85%值得支付数亿美元。需要通过学习微观经济学、博弈论、心理学建立心智模型。", "detail": "纳瓦尔认为判断力是通过学习基础模型获得的——微观经济学、博弈论、心理学，而非商学院课程。这些基础模型帮你在不完全信息下做出更好的决策。", "quote": "\"追求财富而非金钱或地位。财富是在你睡觉的时候依然能为你赚钱的资产。\"", "source": "Naval Ravikant，《如何不靠运气致富》", "theme": "认知与决策", "theme_id": 1, "id": "s4"}, {"type": "summary", "title": "善良比聪明更难", "person": "贝索斯", "core": "聪明是天赋，善良是选择。人生的质量最终由一连串选择决定，而非起点的天赋高低。", "detail": "贝索斯10岁时用数学计算告诉祖母\"你还能少活9年\"，把祖母弄哭了。祖父说了改变他一生的话。他提出12个关于选择的追问，用\"遗憾最小化框架\"做决策——80岁时会后悔没试过，不会后悔试了失败。", "quote": "\"聪明是一种天赋，善良是一种选择。天赋易得——毕竟它们与生俱来，而选择难做，一不小心，你可能就恃才傲物。\"", "source": "Jeff Bezos, 2010 普林斯顿毕业演讲", "theme": "认知与决策", "theme_id": 1, "id": "s5"}, {"type": "summary", "title": "大脑天然厌恶不确定状态", "person": "查理·芒格", "core": "大脑会迅速做出决定来消除疑虑，越焦虑越想快速下结论。法律系统专门设计了延迟裁决机制来对抗这个倾向。", "detail": "进化原因：被捕食者追赶时犹豫等于死亡。宗教信仰在一定程度上受益于这种倾向：面对生死等终极不确定性，人们倾向于快速接受一种信仰。在商业和投资决策中，要刻意延缓判断，等待更多信息。", "quote": "芒格引用法律系统的延迟裁决机制，说明对抗快速下结论倾向需要制度设计。", "source": "查理·芒格，《人类误判心理学》", "theme": "认知与决策", "theme_id": 1, "id": "s6"}, {"type": "summary", "title": "过度乐观与自视过高", "person": "查理·芒格", "core": "人系统性地高估自己和好结果的概率。90%的司机认为自己开车水平在平均线以上。对抗过度乐观的标准方法是学习概率论。", "detail": "过度乐观不同于心理否认——它不是拒绝坏消息，而是系统性地高估好结果的概率。自视过高（禀赋效应）则让人高估自己拥有的东西。芒格引用费马和帕斯卡的概率论方法作为解药。", "quote": "\"习惯性地使用概率数学是对抗过度乐观的标准方法。\"", "source": "查理·芒格，《人类误判心理学》", "theme": "认知与决策", "theme_id": 1, "id": "s7"}, {"type": "summary", "title": "越容易想起的信息，权重越大", "person": "查理·芒格", "core": "大脑过度赋权于容易想起的信息——越生动、越近期的经历，在判断中权重越大。对抗方法是使用检查清单，刻意强调不容易记住的证据。", "detail": "", "quote": "\"一个想法或事实不会因为容易获取就更值得相信。\"", "source": "查理·芒格，《人类误判心理学》", "theme": "认知与决策", "theme_id": 1, "id": "s8"}, {"type": "summary", "title": "正确 × 重要 × 新颖 × 强度", "person": "保罗·格雷厄姆", "core": "一篇好文章需要同时满足真实、重要、新颖、表述坚定四个条件，四者是相乘关系。任何一项为零，整篇价值归零。", "detail": "表述强度和限定词就像手动挡汽车的油门和离合器。把论点推到尽可能强，同时不越过真实的边界。Graham 自己会把一个句子反复读100遍以上才发布。有用的文章必然会惹人生气——新颖意味着挑战已有认知，强度意味着不留退路。", "quote": "\"Useful writing makes claims that are as strong as they can be made without becoming false.\"", "source": "Paul Graham, *How to Write Usefully*", "theme": "写作与表达", "theme_id": 2, "id": "s9"}, {"type": "summary", "title": "让文字透明", "person": "保罗·格雷厄姆", "core": "华丽的文字不仅掩盖思想，还掩盖思想的缺失。简单的文字让读者把脑力花在理解思想上而非解码语言。", "detail": "Graham 用意大利菜名类比：理想的写作应该让文字近乎透明，读者直接接收到想法。一个人如果用大白话说\"我们应该抓住机遇\"听起来是废话，但包装成\"在当前变革的关键窗口期我们需要以前瞻性的战略眼光把握结构性机会\"，很多人就觉得有内容了——实际什么也没说。简单的文字更持久，不受时代流行语影响。", "quote": "\"Fancy writing doesn't just conceal ideas. It can also conceal the lack of them.\"", "source": "Paul Graham, *Write Simply*", "theme": "写作与表达", "theme_id": 2, "id": "s10"}, {"type": "summary", "title": "像说话一样写作", "person": "", "core": "大多数人写作时不自觉切换到\"书面腔\"，复杂的句式不仅增加理解难度，还制造虚假的\"内容感\"。复杂想法不需要复杂句式。", "detail": "专家在讨论高度专业的话题时，用的也是口语化的句式结构，只是必要术语无法避免。Graham 的实操方法：朗读检验法——发布前把文章读出声，如果读出来不像正常人说的话就改掉。更极端的方法：把想写的东西口头讲给朋友听，然后用说的话替换写的内容。", "quote": "\"Informal language is the athletic clothing of ideas.\" / \"If you simply manage to write in spoken language, you'll be ahead of 95% of writers.\"", "source": "Paul Graham, *Write Like You Talk*", "theme": "写作与表达", "theme_id": 2, "id": "s11"}, {"type": "summary", "title": "写作是思想的严格测试", "person": "", "core": "写作不是思想的记录工具，而是思想的严格测试。一篇文章最终包含的想法有一半是写作过程中才产生的。没有写过某个主题的人，关于这个主题没有完全成型的想法。", "detail": "\"脑子里的计划\"几乎一定是不完整的。写作比说话更苛刻——要求选择唯一最优的词序，不能靠语气传达意思，可以反复修改到满意。Graham 经常花两周写一篇文章，重读50遍草稿。这意味着写作领域有巨大的未开发空间：绝大多数文章尚未被写出来。", "quote": "\"If writing down your ideas always makes them more precise and more complete, then no one who hasn't written about a topic has fully formed ideas about it.\"", "source": "Paul Graham, *Putting Ideas into Words*", "theme": "写作与表达", "theme_id": 2, "id": "s12"}, {"type": "summary", "title": "阅读→写作→思考的因果链", "person": "", "core": "不会写就不会想，不会读就不会写。有一种思考只有通过写作才能完成。", "detail": "阅读的价值不仅在于获取信息，更在于它潜移默化地教你什么是好的写作——句式如何组织、论证如何展开、节奏如何控制。这个\"副产品\"无法被其他信息获取方式替代。", "quote": "\"There is a kind of thinking that can only be done by writing.\" / \"You can't think well without writing well, and you can't write well without reading well.\"", "source": "Paul Graham, *The Need to Read*", "theme": "写作与表达", "theme_id": 2, "id": "s13"}, {"type": "summary", "title": "清单体的优势与致命弱点", "person": "", "core": "清单体降低了阅读和写作的认知门槛，但几乎没有发现的空间——标题一旦定下来，思考的边界就锁死了。", "detail": "清单体的结构是并行且容错的——跳过一个点不影响理解其他点。但Graham 对清单体最根本的批评是：真正的文章在写作过程中会产生新想法，清单体让思考局限在预设的格子里。\"The 7 Secrets of...\"类标题是不诚实的——利用读者的完整性焦虑做点击诱饵。", "quote": "\"The greatest weakness of the list of n things is that there's so little room for discovery.\"", "source": "Paul Graham, *The List of N Things*", "theme": "写作与表达", "theme_id": 2, "id": "s14"}, {"type": "summary", "title": "写作与演讲的分工", "person": "", "core": "好写作的核心是好想法，好演讲的核心不是。优秀的演讲技巧可能与深度思考相矛盾。越大的听众群体越容易被情绪操控。", "detail": "Graham 用声学比喻——低频音穿墙，高频音不能。粗糙的情感诉求能打动大群体，精细的理性论证不能。但演讲有其独特价值：激励和连接感是写作无法提供的。两者是互补关系，不是替代关系。", "quote": "\"Having good ideas is most of writing well. If you know what you're talking about, you can say it in the plainest words and you'll be perceived as having a good style.\"", "source": "Paul Graham, *Writing and Speaking*", "theme": "写作与表达", "theme_id": 2, "id": "s15"}, {"type": "summary", "title": "正确的废话是内容最大的敌人", "person": "查理·芒格", "core": "人类的语言天赋导致大量无意义的废话干扰严肃工作。每一句话都要有信息增量，否则删掉。", "detail": "", "quote": "芒格的建议非常直接：聪明的组织管理意味着把冗余话多但内容空洞的人排除在关键决策之外。", "source": "查理·芒格，《人类误判心理学》", "theme": "写作与表达", "theme_id": 2, "id": "s16"}, {"type": "summary", "title": "奖励和惩罚超级反应倾向", "person": "查理·芒格", "core": "人对激励的反应远超想象，激励不仅驱动行为，还会扭曲认知——人们会在不知不觉中为受激励驱动的行为找到\"正当理由\"。", "detail": "联邦快递夜班分拣员按小时计薪时拖延，改为按班次完成量计薪后问题立刻消失。一位外科医生因手术提成，说服自己胆囊是\"医学恶魔之源\"，大量做不必要的切除手术。", "quote": "芒格称之为\"激励导致的偏见\"（incentive-caused bias），认为这是最重要的心理效应之一。", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s17"}, {"type": "summary", "title": "喜欢/热爱倾向与讨厌/憎恨倾向", "person": "查理·芒格", "core": "人会忽略喜欢对象的缺点并偏爱相关的一切；反之会忽略讨厌对象的优点并扭曲事实来合理化憎恨。这两种倾向一旦形成，极难逆转。", "detail": "喜欢和赞赏之间会形成正反馈循环。一个令人钦佩的人通过\"热爱-赞赏\"的反馈效应，自然提升周围所有人的品质。而憎恨倾向的泛化极其危险——9/11后巴基斯坦人把事件归咎于印度教徒，穆斯林世界归咎于犹太人——事实被极端扭曲，因为憎恨需要一个出口。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s18"}, {"type": "summary", "title": "习惯变成命运", "person": "查理·芒格", "core": "大脑为节省\"编程空间\"，会顽强维持既有的结论、习惯和身份认同，即使新证据表明它们是错的。改变旧观念比建立新观念困难得多。", "detail": "富兰克林发现让别人帮自己一个小忙比直接讨好更容易赢得好感——帮过你的人为了保持行为一致性，会说服自己喜欢你。让人做出一个小承诺后续转化就容易得多。", "quote": "狄更斯笔下马利的鬼魂说：\"我戴着的是我生前锻造的锁链。\"", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s19"}, {"type": "summary", "title": "人自动按照周围人行为行动", "person": "查理·芒格", "core": "人在困惑或压力之下更容易从众。好行为和坏行为都具有传染性，甚至\"不行动\"本身也能成为社会证据。", "detail": "经典电梯实验：当几个实验助手面朝后方站在电梯里时，后进来的陌生人也会转过身去。在企业中，CEO做出愚蠢决策时如果其他董事不反对，社会认同就让所有人觉得这没问题。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s20"}, {"type": "summary", "title": "损失厌恶", "person": "查理·芒格", "core": "失去某样东西带来的痛苦远大于得到等价物带来的快乐。即使是\"差一点就得到\"的东西被夺走，也会引发超强反应。", "detail": "这解释了赌场赌客在差一点赢时的疯狂加注行为，也解释了企业面对市场份额下滑时的非理性应对。在财产、地位、爱情和意识形态领域都极其活跃。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s21"}, {"type": "summary", "title": "以德报德、以牙还牙", "person": "查理·芒格", "core": "人天生有回馈的强烈冲动，当别人给了你好处（即使你没要求的），你会感到强烈的回报义务。回馈倾向既能促进合作，也容易被操控。", "detail": "在博弈论囚徒困境实验中\"以牙还牙\"策略表现最佳。更深层的洞察：当一个人被操纵去伤害另一个人后，他反而会更讨厌受害者——因为他需要合理化自己的行为。", "quote": "\"一个人永远不会忘记他埋下斧头的地方。\"", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s22"}, {"type": "summary", "title": "对比错误反应倾向", "person": "查理·芒格", "core": "神经系统感知的是对比而非绝对值。渐进的恶化因为每一步变化太小而不被察觉，直到灾难降临。", "detail": "魔术师在别处施加强烈压力的同时偷走手表——对比效应让微小变化被忽略。在商业中，1000美元的选配放在65000美元车价旁边就不算什么了。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s23"}, {"type": "summary", "title": "权威错误影响倾向", "person": "查理·芒格", "core": "人类在等级体系中进化，天然倾向于服从权威，服从时几乎不会质疑。", "detail": "大韩航空多次空难事故原因是副驾驶不敢纠正机长的错误决定。芒格数据指出在25%的情况下，即使副驾驶知道飞机要坠毁，也不会挑战机长的权威。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s24"}, {"type": "summary", "title": "给出\"为什么\"比只给\"做什么\"有效得多", "person": "查理·芒格", "core": "人对附带理由的请求更容易服从，即使理由本身没有意义。一个糟糕的理由也比没有理由好。", "detail": "经典复印机实验：说\"我能先复印吗？因为我要复印\"（理由毫无信息量）的成功率显著高于不给理由的情况。在教育中给学生解释\"为什么要学这个\"比单纯要求更有效。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s25"}, {"type": "summary", "title": "多种偏误的叠加效应", "person": "查理·芒格", "core": "当多种心理倾向同时朝同一方向作用时，会产生远超简单相加的极端效果。现实中的极端结果几乎都是多种倾向叠加的产物。", "detail": "心理学教科书逐条讲偏误却几乎不教它们如何组合。开放式拍卖中的疯狂出价、邪教的洗脑——全都是多种倾向同时发力的结果。你必须学会识别它们的组合模式。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s26"}, {"type": "summary", "title": "大脑会直接扭曲现实来保护自己", "person": "查理·芒格", "core": "当现实太痛苦时，大脑不是\"看不见\"，而是主动把不可接受的事实替换为可接受的版本。在爱、死亡和成瘾领域最为极端。", "detail": "成瘾者在生活严重恶化的情况下仍坚持认为\"我能控制\"\"没那么严重\"——这不是意志力问题，而是心理否认在运作。", "quote": "", "source": "查理·芒格，《人类误判心理学》", "theme": "人性与心理", "theme_id": 3, "id": "s27"}, {"type": "summary", "title": "产品做加法是本能，做减法是能力", "person": "张小龙", "core": "好产品不需要说明书，一个产品变成垃圾产品的过程就是不断加功能的过程。", "detail": "张小龙反复强调：好产品让用户凭直觉使用。\"一个产品需要说明书的话，它的恶劣程度和 Tip 和文字说明数量正相关。\"理想状态是用户觉得\"产品天生就应该这样使用\"。", "quote": "\"一个产品，要加多少的功能，才能成为一个垃圾产品啊！\"", "source": "张小龙，饭否语录", "theme": "产品与用户", "theme_id": 4, "id": "s28"}, {"type": "summary", "title": "用户本质上是懒的", "person": "张小龙", "core": "产品要顺应而非对抗用户的懒惰。内容必须以最低摩擦的方式出现在用户面前。", "detail": "", "quote": "\"人已经懒到，你不把文章推送到我桌面上，并且打开好了，字体合适，长度合适，有朋友的推荐语，我就不会阅读了。\"", "source": "张小龙，饭否语录", "theme": "产品与用户", "theme_id": 4, "id": "s29"}, {"type": "summary", "title": "好产品是用完即走的工具", "person": "张小龙", "core": "技术的使命是帮助人类提高效率而不是浪费时间。微信关心的是用户能不能最快完成任务，不追求停留时长。", "detail": "", "quote": "\"每个人一天只有 24 个小时。互联网人的使命不应该是让所有人除了吃喝拉撒，把时间都花在看手机上面。\"", "source": "张小龙，2019 微信公开课", "theme": "产品与用户", "theme_id": 4, "id": "s30"}, {"type": "summary", "title": "产品满足贪嗔痴，但产品经理要超越贪嗔痴", "person": "张小龙", "core": "利用人性弱点获取用户注意力，但最终目标不是剥削弱点，而是提供价值。", "detail": "", "quote": "\"产品一定程度上是为了满足人性中的贪嗔痴，这是用户的痛点。能把握住之后，产品经理应该超越其上，用产品帮助人们得以解脱。\"", "source": "张小龙，《微信背后的产品观》", "theme": "产品与用户", "theme_id": 4, "id": "s31"}, {"type": "summary", "title": "克制是能力，善良是基于理性的能力", "person": "张小龙", "core": "克制不是忍着不做，而是清楚知道什么不该做。善良的反面不是邪恶，而是\"套路\"。", "detail": "一旦围绕 KPI 驱动，产品经理的工作目标就不再是做最好的产品，而是用一切手段获取流量。\"只有我们对待用户有一种真正的理性的善良，才会使用户更长久地使用我们的产品。\"", "quote": "\"如果微信是一个人，它一定是你最好的朋友。那么，我怎么舍得在你最好的朋友脸上，贴一个广告呢？\"", "source": "张小龙，2019 微信公开课", "theme": "产品与用户", "theme_id": 4, "id": "s32"}, {"type": "summary", "title": "Needs / Requirements / Demand 三概念必须区分", "person": "王慧文", "core": "用户几乎不会直接说出自己的 Needs（深层动机），说出来的多是 Demand 或 Requirement。混用是产品决策混乱的根源。", "detail": "伟大需求面临两个质疑：\"这不可能实现\"和\"根本没这个需求\"。需求突破的机会窗像闪电——需求端强度增长 + 供给端可行性提升，两股力量交汇时击穿障碍。美团外卖的出现不是因为人们突然想吃外卖，而是移动互联网使配送效率从日送8单提升到20-30单。", "quote": "\"所有伟大需求都面临两个质疑：一是'这不可能实现'，二是'根本没这个需求'。遇到更讲道理的人，还会问第三个问题：为什么是现在？\"", "source": "王慧文，清华产品课", "theme": "产品与用户", "theme_id": 4, "id": "s33"}, {"type": "summary", "title": "安全感、价值感、向往感", "person": "李想", "core": "安全感从用户真实场景出发，价值感是\"同样的钱买到最好的体验\"，向往感是唤起用户心中的理想场景。", "detail": "不问用户\"你要什么\"，而是让用户回忆场景、讲感性期待。真正的用户价值是帮助用户解决了某个问题或完成了某项任务，而不是提供某个功能。", "quote": "\"真正的用户价值，一定是帮助用户解决了某个问题，或者完成了某项任务，而不是仅仅提供了某个简单的功能。\"", "source": "李想，《产品实战16讲》", "theme": "产品与用户", "theme_id": 4, "id": "s34"}, {"type": "summary", "title": "明天属性 + 做减法 + 重组创新 + 精准触达", "person": "雷军", "core": "产品要有\"明天属性\"——给用户令其向往的全新体验，一旦用过就不想放手。产品定义的第一法则是满足80%用户的80%需求。", "detail": "创新不是发明新技术，而是把已有技术重新组合。小米充电宝导入笔记本行业电芯，扫地机器人用工业照相机原理开发激光传感器。爆品的四个特征：单款、精品、海量、长周期。", "quote": "\"产品定义的第一法则是做减法——满足 80% 用户的 80% 需求。只专注解决用户最迫切的需求。\"", "source": "雷军", "theme": "产品与用户", "theme_id": 4, "id": "s35"}, {"type": "summary", "title": "低价是 1，品质服务是 0", "person": "刘强东", "core": "零售的客户体验三要素是价格、品质、服务。没有低价优势，其他竞争优势都归零。低价不是说品质不重要，而是低价是前提条件。", "detail": "", "quote": "\"如果把零售业务客户体验分成三要素——价格、品质和服务，低价是'1'，品质和服务是两个'0'，失去了低价优势，其他一切所谓的竞争优势都会归零。\"", "source": "刘强东，2022年底京东内部讲话", "theme": "产品与用户", "theme_id": 4, "id": "s36"}, {"type": "summary", "title": "不是更贵，而是更公平", "person": "黄峥", "core": "消费升级不是让上海人过巴黎人的生活，而是让安徽安庆的人有厨纸用、有好水果吃。追求性价比是普遍需求，与财富无关。", "detail": "黄峥发现一个人会买爱马仕包，也会用9.9元买一箱芒果。拼多多不按城市等级分人，而是满足同一个人的多种消费面。匹配逻辑 vs 流量逻辑是与淘宝的根本差异：淘宝是搜索→海量SKU（流量逻辑）；拼多多是推荐→有限SKU（匹配逻辑）。", "quote": "\"消费升级不是让上海人去过巴黎人的生活，而是让安徽安庆的人有厨纸用，有好水果吃。\"", "source": "黄峥，59条思考", "theme": "商业与竞争", "theme_id": 5, "id": "s37"}, {"type": "summary", "title": "错位竞争与田忌赛马", "person": "黄峥", "core": "在饱和领域找新突破不需要帝国式竞争。整体劣势可创造局部优势赢战役。", "detail": "淘宝搜索是核心，任何改革都意味弱化搜索，但搜索在拼多多只是极小场景。\"我是深圳年轻无包袱，它是上海曾经牛逼但有包袱。\"", "quote": "\"拼多多的存在本身就是一种模式，你可以说我low，但你无法忽视我。\"", "source": "黄峥", "theme": "商业与竞争", "theme_id": 5, "id": "s38"}, {"type": "summary", "title": "消费者的确定性也有价值", "person": "黄峥", "core": "一千个消费者联合表达购买意愿并支付订金，工厂因获得需求确定性，愿意给出折扣——这是穷人向富人\"卖保险\"。", "detail": "传统保险的逻辑是穷人向富人购买抗风险能力。黄峥提出反向逻辑：消费者对自身购买行为的确定性把握，对供给方是有价值的。这就是拼多多拼团模式的理论基础：需求侧的半\"计划经济\"推动供给侧的半\"市场经济\"。", "quote": "\"工厂用自己发行的限时折扣券，向普通消费者购买了一个保证在未来购买的保险。\"", "source": "黄峥，《把\"资本主义\"倒过来》", "theme": "商业与竞争", "theme_id": 5, "id": "s39"}, {"type": "summary", "title": "营销的本质是传达价值观，不是卖产品参数", "person": "", "core": "在注意力稀缺的环境下，传递\"你是谁\"比传递\"你做了什么\"更有效。Nike 从不聊技术参数，他们赞美伟大的竞技体育和运动员。", "detail": "乔布斯的论证链：品牌遭忽视→不能靠参数赢回关注→营销的本质是价值观→找到苹果的灵魂→赞美\"Think Different\"的人→让消费者觉得\"苹果是我的同类\"。Got Milk 案例：乳制品行业花20年宣传\"喝牛奶对你好\"失败了，改为\"Got Milk?\"——削弱产品存在感反而成功。", "quote": "\"对我来说，营销讲的是价值观。这是个复杂的世界，喧嚣的世界，我们没法让人们铭记我们。所以，我们要非常清楚——我们想让人们铭记我们什么。\" / \"只有那些疯狂到以为自己能够改变世界的人，才能真正改变世界。\"", "source": "Steve Jobs, 1997 Think Different 内部演讲", "theme": "商业与竞争", "theme_id": 5, "id": "s40"}, {"type": "summary", "title": "消费者从来没有为\"内容\"付费", "person": "保罗·格雷厄姆", "core": "出版商卖的一直是纸和塑料光盘而非思想和音乐。当介质消失后，内容直接销售极其困难。赢家判断标准：是否利用新技术给了人们以前得不到的东西。", "detail": "历史上真正直接卖信息成功的案例极少，主要是金融信息。\"一个 Photoshop 用户对 Photoshop 的需要程度，是任何人对某首歌或某篇文章都达不到的。\"未来两条路：免费内容+间接变现，或把信息嵌入实体产品。", "quote": "\"When you see something that's taking advantage of new technology to give people something they want that they couldn't have before, you're probably looking at a winner.\"", "source": "Paul Graham, *Post-Medium Publishing*", "theme": "商业与竞争", "theme_id": 5, "id": "s41"}, {"type": "summary", "title": "1000 个铁杆粉丝足以养活一个创作者", "person": "", "core": "1,000 true fans × $100/年 = $100,000。不需要百万粉丝，不需要成为超级明星。直接关系是关键：去掉中间商。", "detail": "\"True fan\"是会开200英里车去听你唱歌、买你所有版本作品的人。铁杆粉丝处于同心圆中心，是你的首席营销力量——他们自发传播，带来更多普通粉丝。这提供了长尾困境的出路：不在尾巴上挣扎也不追求头部爆款，而是\"making a living instead of a fortune\"。", "quote": "\"A true fan is defined as a fan that will buy anything you produce.\"", "source": "Kevin Kelly, *1,000 True Fans*", "theme": "商业与竞争", "theme_id": 5, "id": "s42"}, {"type": "summary", "title": "八种\"比免费更好\"的生成性价值", "person": "", "core": "当复制免费时，不可复制的东西才值钱。钱跟着注意力走，不跟着副本走。", "detail": "KK 提出8种无法被复制的价值属性：即时性（Immediacy）、个性化（Personalization）、解读性（Interpretation）、可信性（Authenticity）、可达性（Accessibility）、实体化（Embodiment）、赞助性（Patronage）、可发现性（Findability）。这8种构成了数字时代内容变现的完整框架。", "quote": "\"When copies are super abundant, stuff which can't be copied becomes scarce and valuable.\" / \"Software, free. The manual, $10,000.\"", "source": "Kevin Kelly, *Better Than Free*", "theme": "商业与竞争", "theme_id": 5, "id": "s43"}, {"type": "summary", "title": "关注核心而非边界", "person": "王兴", "core": "不应该纠结\"业务边界在哪里\"，而是\"核心是什么\"。如同万有引力，核心足够强大，周边业务自然被吸引过来。", "detail": "", "quote": "\"真正'极度渴望成功'且'愿付非凡代价'的人很少。成功路上并不拥挤，因为能坚持的人真的不多。\"", "source": "王兴，100条商业思考", "theme": "商业与竞争", "theme_id": 5, "id": "s44"}, {"type": "summary", "title": "预测→破局点→All in", "person": "傅盛", "core": "预测是对大趋势的判断，破局点是找到切入角度，All in 是集中所有资源。大部分公司死在第一步——没有预测能力。", "detail": "\"单点做到极致就能创造奇迹的时代过去了。\"战略是杠杆，让每一件事放大几倍。对目标没有持续有效累加的事情都没有意义。", "quote": "\"战略就是一个杠杆。它让你做的每一件事都放大几倍、几十倍。一旦远离这个杠杆，就变成小公司创业模式。\"", "source": "傅盛，《战略就是格局+破局》", "theme": "商业与竞争", "theme_id": 5, "id": "s45"}, {"type": "summary", "title": "产品服务决定销量，品牌决定利润率", "person": "李想", "core": "丰田和大众销量接近，但丰田品牌价值是大众的5倍。品牌在先，产品在后——品牌定义用户预期，产品兑现预期。", "detail": "", "quote": "\"在市场爆发的时候是决定胜负的关键，平缓或者下滑的时候，再努力就没有用了，圈地变成了抢地。\"", "source": "李想，《创业16年的10个经验》", "theme": "商业与竞争", "theme_id": 5, "id": "s46"}, {"type": "summary", "title": "有什么、要什么、舍什么——创业的本质是取舍", "person": "王兴", "core": "创业不是无限扩张，而是在资源有限的前提下做出清晰的取舍。速度、质量、成本三者只能取其二。", "detail": "王兴认为这三个问题对个人和公司都极重要。CEO三大不可代劳职责：设定愿景战略、招留人才、确保资金。看重候选人的状态而非年龄。", "quote": "\"想起来全是问题，做起来才有答案。\" / \"一流是做事，二流是评价别人，三流是评价别人的评价。\"", "source": "王兴，100条商业思考", "theme": "管理与团队", "theme_id": 6, "id": "s47"}, {"type": "summary", "title": "Develop a company as a product——把公司当产品来做", "person": "张一鸣", "core": "公司本身就是创始人的作品，需要像打磨产品一样打磨组织。", "detail": "定义用户（员工和客户）、设计体验（文化和流程）、迭代优化（管理机制）。吸引人才的四个维度：短期回报、长期回报、个人成长、精神生活。", "quote": "\"Develop a company as a product. 像做产品一样做公司。\"", "source": "张一鸣", "theme": "管理与团队", "theme_id": 6, "id": "s48"}, {"type": "summary", "title": "平庸有重力，需要逃逸速度", "person": "张一鸣", "core": "平庸不是靠努力一点点就能脱离的，需要达到\"逃逸速度\"才能进入新轨道。在关键时期需要120%的投入。", "detail": "", "quote": "\"平庸有重力，需要逃逸速度。\" / \"互联网行业往往是Winner Takes All，120%的努力获得200%的回报。\"", "source": "张一鸣", "theme": "管理与团队", "theme_id": 6, "id": "s49"}, {"type": "summary", "title": "Founder Mode vs Manager Mode", "person": "", "core": "传统管理学教的是 Manager Mode——招好人、放权。但这对创始人经营的公司往往是灾难。创始人被\"煤气灯效应\"困住了——被反复告知他们的管理直觉是错的。", "detail": "Chesky 听了\"请好人、给空间\"的建议后 Airbnb 陷入混乱。后来他研究了乔布斯的管理方式，做到了硅谷最高水平的自由现金流利润率。Skip-level 是创始人的必备工具——不是微管理，而是保持对产品和业务的真实感知。", "quote": "\"Founders feel like they're being gaslit when told to abandon their instincts for traditional management structures.\"", "source": "Paul Graham, *Founder Mode*", "theme": "管理与团队", "theme_id": 6, "id": "s50"}, {"type": "summary", "title": "砍掉官僚主义，不是管理它", "person": "Brian Chesky", "core": "官僚主义是公司增长的自然副产品，但不是不可避免的。创始人要主动抵抗不必要的组织复杂性。", "detail": "Chesky 将 Airbnb 客人端和房东端的独立团队合并为统一跨功能团队，从效果营销转向品牌驱动增长，维护滚动两年路线图。创始人必须保持\"in the details\"。", "quote": "", "source": "Brian Chesky, Lenny's Newsletter", "theme": "管理与团队", "theme_id": 6, "id": "s51"}, {"type": "summary", "title": "企业文化不应该需要解释", "person": "李想", "core": "文化就是一帮人约定好的简单有效的标准。出一条，不需要一页解释。", "detail": "", "quote": "\"企业文化是一帮人约定好，一个简单有效的标准，定义什么叫对企业好。出一条，不需要一页解释。\"", "source": "李想，《创业16年的10个经验》", "theme": "管理与团队", "theme_id": 6, "id": "s52"}, {"type": "summary", "title": "经验变为能力的关键", "person": "李想", "core": "复盘目标是\"以后怎么做更好\"的共识达成。CEO必须参与。总结成功经验固化到流程，不惩罚新错误，鼓励大胆解决问题。", "detail": "", "quote": "\"人因痛苦而改变，因受益而坚持。\" / \"企业成长速度决定一切，人与人最大差别也是成长速度。\"", "source": "李想，《产品实战16讲》", "theme": "管理与团队", "theme_id": 6, "id": "s53"}, {"type": "summary", "title": "自我要求体系", "person": "段永平", "core": "本分 = 要求自己而不是要求别人。\"不赚人便宜\"实现真正双赢。本分包含且高于诚信。", "detail": "\"不做不对的事\"比\"做对的事\"更重要。企业应有长长的 Stop Doing List。\"敢为天下后，后中争先\"——选择需求已验证的品类（做对的事），然后以执行力争先（把事做对）。好公司三要素：好的商业模式 + 好的企业文化 + \"利润之上\"的追求。护城河 = 能够长期维持的差异化。", "quote": "\"如果你赚的是本分钱，你会睡得好。身体好会活得长，最后还是会赚到很多钱的。最重要的是，不本分赚钱的人其实不快乐。\" / \"很多人太注意所谓成功人士都干了啥，就是不注意他们不干啥。往往不干什么，才是决定成功的最重要因素。\"", "source": "段永平，200条思考", "theme": "认知与决策", "theme_id": 1, "id": "s54"}, {"type": "summary", "title": "长期主义高于短期利润", "person": "", "core": "所有决策以长期市场领导地位为锚点。口碑是最有效的获客方式。现金流优先于会计利润。", "detail": "贝索斯1997年直接告诉华尔街长期主义的立场，然后把这封信附在此后每一年的股东信里持续二十多年。招聘标准是找能像创始人一样思考的人，用股票期权代替高薪。", "quote": "\"We will continue to make investment decisions in light of long-term market leadership considerations rather than short-term profitability considerations or short-term Wall Street reactions.\"", "source": "Jeff Bezos, 1997 Letter to Shareholders", "theme": "认知与决策", "theme_id": 1, "id": "s55"}, {"type": "summary", "title": "穿越低谷的感悟", "person": "雷军", "core": "痛苦难以回避，能做的是直面痛苦在痛苦中坚持前行，让痛苦来塑造更好的我们。", "detail": "雷军26岁做出技术优秀的\"盘古\"软件但销量惨淡，去中关村站店卖软件。盘古失败后半年无所事事，在论坛每天发上百帖认识了马化腾和丁磊。卓越网\"创办于互联网泡沫破灭之后，倒下于电商全面崛起之前\"——时机比执行力更重要。", "quote": "\"既然这些痛苦难以回避，那我们能做的，就是直面这些痛苦，在痛苦中坚持前行，让痛苦来塑造更好的我们。\" / \"不带任何目的，学起东西来，反而特别轻松，也特别快。\"", "source": "雷军, 2022 年度演讲", "theme": "认知与决策", "theme_id": 1, "id": "s56"}, {"type": "summary", "title": "延迟满足感是优秀的基石", "person": "张一鸣", "core": "高估自己的年轻人往往不愿做基础工作，而真正成长快的人愿意踏实做好当下的事。", "detail": "张一鸣面试过约2000名年轻人，\"不傲娇，能延迟满足感\"是反复强调的特质。其他关键特质：好奇心驱动的主动学习、对不确定性保持乐观、不甘于平庸但对重要选择有判断力。", "quote": "\"以大多数人满足感延迟程度之低，根本轮不到拼天赋。\" / \"对自己的标准一定要高。你对自己的标准，影响了你一生的高度。\"", "source": "张一鸣", "theme": "认知与决策", "theme_id": 1, "id": "s57"}, {"type": "summary", "title": "保持轻度喜悦和轻度沮丧之间的情绪状态", "person": "张一鸣", "core": "追求情绪的中间态，避免过度满足导致的思维钝化，也避免过度沮丧导致的决策偏差。", "detail": "", "quote": "\"最佳状态是保持在轻度喜悦和轻度沮丧之间。\"", "source": "张一鸣", "theme": "认知与决策", "theme_id": 1, "id": "s58"}, {"type": "summary", "title": "从劳动力到代码和媒体", "person": "纳瓦尔", "core": "劳动力杠杆最古老也最落后，代码和媒体是新时代杠杆——边际成本为零、无需许可。依靠出租时间不可能致富，必须拥有股权。", "detail": "专属知识（Specific Knowledge）无法通过培训获得，往往是你觉得像玩、别人觉得像工作的东西。四种运气类型中，第四种——打造独特个性让运气主动找上你——才是可持续的。", "quote": "\"依靠出租时间不可能致富，你必须拥有股权——一个企业的一部分——才能获得财务自由。\" / \"如果社会可以培训你获得某种技能，它终将培训出别人来替代你。\"", "source": "Naval Ravikant，《如何不靠运气致富》", "theme": "认知与决策", "theme_id": 1, "id": "s59"}, {"type": "summary", "title": "时间是不可逆的向量", "person": "黄峥", "core": "不要妄想回到过去也不要投机取巧，任何趁人之危或利用漏洞的想法在时间面前显得异常愚蠢。", "detail": "", "quote": "\"无论我们多么固执地渴求着对称和永恒，时间总是在不断制造着世间种种的不对称、不可逆以及死亡。\"", "source": "黄峥，2020年致股东信", "theme": "认知与决策", "theme_id": 1, "id": "s60"}, {"type": "summary", "title": "不用就忘倾向与持续练习", "person": "查理·芒格", "core": "所有技能如果不持续练习就会退化。被训练到\"流利\"程度的技能退化更慢。", "detail": "", "quote": "\"聪明的人会把不常用但必需的技能作为对自己的一种责任来持续练习。\"", "source": "查理·芒格，《人类误判心理学》", "theme": "认知与决策", "theme_id": 1, "id": "s61"}, {"type": "summary", "title": "AI 压缩 21 世纪", "person": "Dario Amodei", "core": "强大 AI 像\"a country of geniuses in a datacenter\"。AI 可以把50-100年的生物学进步压缩到5-10年内完成。", "detail": "Dario Amodei 具体预测：传染病被可靠预防和治疗；癌症死亡率和发病率下降95%以上；大多数遗传病可通过胚胎筛查或基因编辑预防；阿尔茨海默症被攻克；人类寿命翻倍至约150岁。心理健康领域有四条路径：分子生物学、神经测量、计算神经科学、行为干预。但智能的\"边际回报\"受限于物理世界——实验需要时间、数据有限、系统有内在复杂性。", "quote": "\"I think their rate of discovery could be increased by 10x or more if there were a lot more talented, creative researchers.\" / \"Life expectancy increased almost 2x in the 20th century (from ~40 years to ~75), so it's 'on trend' that the 'compressed 21st' would double it again to 150.\"", "source": "Dario Amodei, *Machines of Loving Grace*", "theme": "AI与未来", "theme_id": 8, "id": "s62"}, {"type": "summary", "title": "五大风险", "person": "Dario Amodei", "core": "强大 AI 可能在1-2年内到来，人类正处于历史上最关键的转折点。五大风险：自主性、毁灭性武器、权力攫取、经济冲击、意义危机。", "detail": "最具体的威胁是生物武器——AI 可能让没有专业背景的人像\"技术客服指导修电脑\"一样被引导完成病原体设计。权力攫取的四大工具：全自主武器、AI 监控、个性化洗脑、虚拟战略家。经济冲击的非对称性：AI 可能在1-5年内取代一半以上的白领入门岗位，失业在数月内发生但新岗位需要数十年形成。方法论：不末日论、承认不确定性、精准干预。", "quote": "\"With sufficiently powerful AI, these barriers collapse. A disturbed person could be walked through designing and synthesizing pathogens step-by-step, like technical support debugging a computer.\" / \"I believe deeply in our ability to prevail, in humanity's spirit and its nobility, but we must face the situation squarely and without illusions.\"", "source": "Dario Amodei, *The Adolescence of Technology*", "theme": "AI与未来", "theme_id": 8, "id": "s63"}, {"type": "summary", "title": "AI-First 是基本期望，不是可选项", "person": "", "core": "有效使用 AI 现在是每个人的基本期望。任何团队在申请增加人力之前，必须先展示为什么 AI 无法完成这项工作。AI 使用纳入绩效评估。", "detail": "Tobi Lutke 承认之前\"去试试 AI 吧\"说得太像建议了没有产生足够改变，所以把 AI 使用从可选升级为强制。他引用\"红皇后赛跑\"理论：公司年增长20-40%的情况下，团队必须提升同等幅度效率才能保持不退步。有些同事已做到\"此前认为不可能的10倍产出\"。他形容自己使用 AI 的方式：\"a thought partner, deep researcher, critic, tutor, or pair programmer\"，但觉得自己\"only scratching the surface\"。", "quote": "\"Using AI effectively is now a fundamental expectation of everyone at Shopify.\" / \"Before asking for more headcount and resources, teams must demonstrate why they cannot get what they want done using AI.\"", "source": "Tobi Lutke, Shopify AI Memo, 2025.04", "theme": "AI与未来", "theme_id": 8, "id": "s64"}, {"type": "summary", "title": "流通正在取代内容本身", "person": "张小龙", "core": "信息的分发方式比信息本身更重要。社交推荐是最符合人性的信息获取方式。", "detail": "张小龙明确表态机器推荐效果不好，社交推荐数据增长快。原因是\"人类进化而来的社交体系，是一个具有纠错功能的复杂体系\"。视频号的 1:2:10 法则——关注内容:朋友点赞:机器推荐 = 1:2:10，实际验证为 1:2:9。当内容不太全面时基于机器推荐走不下去，社交推荐在冷启动阶段有天然优势。", "quote": "\"流通正在取代内容本身，mp3 取代唱片，微博取代书本。\" / \"这里面内容消费比例应该是 1:2:10 的关系。\"", "source": "张小龙", "theme": "AI与未来", "theme_id": 8, "id": "s65"}, {"type": "summary", "title": "朋友圈的本质是\"人设推广\"", "person": "张小龙", "core": "沟通就是把自己的人设强加给对方的过程。每个人发的每一条朋友圈都是精心挑选的，一定对自己的人设有利。", "detail": "", "quote": "\"沟通就是把自己的人设强加给对方的过程。每个人有自己的人设，希望别人接受。你说的每一句话，有意无意的，都在希望别人接受你对自己人设的认可。\"", "source": "张小龙，2019 微信公开课", "theme": "AI与未来", "theme_id": 8, "id": "s66"}, {"type": "summary", "title": "新物种将以完全不一样的样子在新土壤中生长", "person": "黄峥", "core": "旧的二元对立正在瓦解，不要用旧形态套新平台。", "detail": "", "quote": "\"新的物种将会以和从前完全不一样的样子在新的土壤中孕育和生长。\"", "source": "黄峥，2020年致股东信", "theme": "AI与未来", "theme_id": 8, "id": "s67"}, {"type": "summary", "title": "认知四层次模型", "person": "傅盛", "core": "四种认知状态：不知道自己不知道（95%的人）→ 知道自己不知道 → 知道自己知道 → 不知道自己知道", "detail": "不行动的认知就是伪认知——傅盛说了两年\"内容很重要\"才真正行动\n战略三部曲：预测 → 破局点 → All in", "quote": "", "source": "思想精华个人版", "theme": "认知与决策", "theme_id": 1, "id": "s68"}, {"type": "summary", "title": "25种认知偏误的组合效应", "person": "查理·芒格", "core": "Lollapalooza 效应：多种偏误叠加时产生极端后果。学术心理学逐条讲偏误，却几乎不教你它们如何组合", "detail": "激励导致的偏见是最重要的心理效应——判断他人建议前，先看他的激励结构\n避免不一致性倾向让人成为习惯的囚徒——大脑为节省\"编程空间\"，顽强维持既有结论\n用检查清单对抗本能的认知缺陷，安排\"指定怀疑者\"角色", "quote": "", "source": "思想精华个人版", "theme": "认知与决策", "theme_id": 1, "id": "s69"}, {"type": "summary", "title": "回馈分析法", "person": "德鲁克", "core": "每当做出重要决定时，记录下对结果的预期，9-12个月后与实际结果比较。坚持几年，就能发现真正的优势和盲区。比任何性格测试都有效", "detail": "卓有成效是可以学会的习惯——重点从\"效率\"（把事做对）转向\"效能\"（做对的事）\n决策必须有反面意见——它保护决策者不沦为惯性的奴隶，提供可选方案，激发想象力", "quote": "", "source": "思想精华个人版", "theme": "认知与决策", "theme_id": 1, "id": "s70"}, {"type": "summary", "title": "头脑和心灵必须同时同意", "person": "马克·安德森", "core": "只接受理性和情感都认同的承诺。错位的决定会制造持续的内耗和分心", "detail": "三个列表生产力系统：Todo（必须做）、Watch（需要跟进）、Later（以后再说）+ 每天一张 3x5 卡片写明天 3-5 件事\nAnti-Todo List：卡片背面记录当天实际完成的事，提供正反馈", "quote": "", "source": "思想精华个人版", "theme": "认知与决策", "theme_id": 1, "id": "s71"}, {"type": "summary", "title": "本质问题穿透法（思维模型）", "person": "张一鸣", "core": "很多表面复杂的问题，是一个更高维度简单问题的低维投影", "detail": "遇到缠绕不清的难题，不在现象层面抬杠，往下挖一层找真正的制约因素\n解决根本问题需要更大代价和决心，但一劳永逸", "quote": "", "source": "张一鸣231条语录", "theme": "认知与决策", "theme_id": 1, "id": "s72"}, {"type": "summary", "title": "时间尺度切换法（思维模型）", "person": "张一鸣", "core": "面对无法判断的决策，拉长时间尺度，用\"五年后\"或\"更重要的原则\"来重新审视", "detail": "当下的困惑往往会自动消解。短期看是损失的东西，长期看可能是最划算的投资\n\"无法选择或判断的时候，离远一步，用更重要的原则和更长的时间尺度来衡量就清楚了。\" (#006)", "quote": "", "source": "张一鸣231条语录", "theme": "认知与决策", "theme_id": 1, "id": "s73"}, {"type": "summary", "title": "有用性乘法公式", "person": "保罗·格雷厄姆", "core": "有用性 = 正确 × 重要 × 新颖 × 强度，四者相乘而非相加。任何一项为零，整篇文章价值归零", "detail": "表述强度与限定词是油门和离合器的关系——限定词不是软弱，是精密思考的工具\n\"先松后紧\"的写作流程：快速初稿 + 反复打磨。一个句子反复读100遍以上才发布\n有用的文章必然会惹人生气——新颖意味着挑战已有认知，强度意味着不留退路", "quote": "", "source": "场景版总集（30篇总集中也有，此处补充完整论述细节）", "theme": "写作与表达", "theme_id": 2, "id": "s74"}, {"type": "summary", "title": "阅读→写作→思考的因果链", "person": "保罗·格雷厄姆", "core": "有一种思考，只有通过写作才能完成", "detail": "", "quote": "", "source": "思想精华个人版", "theme": "写作与表达", "theme_id": 2, "id": "s75"}, {"type": "summary", "title": "简单写作的三重价值", "person": "保罗·格雷厄姆", "core": "简单的文字让读者把脑力花在理解思想上，而不是解码语言", "detail": "华丽的文字不仅掩盖思想，还掩盖思想的缺失——\"在当前变革的关键窗口期\"这类话实际上什么也没说\n简单的文字更持久——不受时代流行语和修辞风尚的影响，十年后读仍然清晰", "quote": "", "source": "场景版总集", "theme": "写作与表达", "theme_id": 2, "id": "s76"}, {"type": "summary", "title": "说实话的经济学", "person": "张一鸣", "core": "\"信息越透明，做表里不一的人成本越来越高。不装不但是道德品性优选，而且也是更经济的。\" (#045)", "detail": "\"当感到沟通困难的时候，最好的沟通方法不是想太多技巧和说法，而是：更坦诚的沟通。\" (#004)", "quote": "", "source": "张一鸣231条语录", "theme": "写作与表达", "theme_id": 2, "id": "s77"}, {"type": "summary", "title": "驱动世界的是嫉妒，不是贪婪", "person": "查理·芒格", "core": "激励不仅驱动行为，还会扭曲认知——人们会在不知不觉中为受激励驱动的行为找到\"正当理由\"", "detail": "", "quote": "", "source": "思想精华个人版", "theme": "人性与心理", "theme_id": 3, "id": "s78"}, {"type": "summary", "title": "人的多面性", "person": "黄峥", "core": "一个人会买爱马仕包，也会用 9.9 元买一箱芒果。不按标签分人，理解同一个人在不同场景下的不同需求", "detail": "追求性价比是普遍人性，与财富无关", "quote": "", "source": "思想精华个人版", "theme": "人性与心理", "theme_id": 3, "id": "s79"}, {"type": "summary", "title": "饥渴的三个层次", "person": "张一鸣", "core": "\"饥渴有三个层次：贪婪、成就动机、好奇心。分别关注：瞬间的结果、持续的过程、远大的未知。\" (#078)", "detail": "\"人欲望太强的时候就容易短视，太自我中心的时候就容易盲目。\" (#131)\n\"与智慧的常见敌人：未延迟的满足感，经验带来的麻痹或恐惧。\" (#015)", "quote": "", "source": "张一鸣231条语录", "theme": "人性与心理", "theme_id": 3, "id": "s80"}, {"type": "summary", "title": "好产品的四个标准", "person": "张小龙", "core": "好产品是用完即走的工具，不追求停留时长——\"每个人一天只有 24 小时。互联网人的使命不应该是让所有人把时间都花在看手机上面。\"", "detail": "善良是一种基于理性的能力，不是道德洁癖——善良的反面不是邪恶，而是\"套路\"\n产品做加法是本能，做减法是能力——\"一个产品变成垃圾产品的过程，就是不断加功能的过程。\"", "quote": "", "source": "思想精华个人版", "theme": "产品与用户", "theme_id": 4, "id": "s81"}, {"type": "summary", "title": "10/100/1000 法则", "person": "马化腾", "core": "每月做 10 个用户调查、关注 100 个用户博客、收集 1000 条用户反馈。没有捷径", "detail": "口碑先于营销——\"如果战略点没做透，用户就会失望离开，花再多精力去弥补都无济于事。\"", "quote": "", "source": "思想精华个人版", "theme": "产品与用户", "theme_id": 4, "id": "s82"}, {"type": "summary", "title": "需求的三层区分", "person": "王慧文", "core": "Needs（深层动机）/ Requirements（功能需求）/ Demand（表达出来的需要）必须区分", "detail": "用户几乎不会直接说出真正的 Needs，说出来的多是 Demand 或 Requirement。混用是决策混乱的根源\n伟大需求面临两个质疑：\"不可能实现\"和\"根本没这需求\"。第三个追问：\"为什么是现在？\"\n需求突破的\"闪电\"模型：需求端强度增长 + 供给端可行性提升，两股力量交汇时击穿障碍", "quote": "", "source": "思想精华个人版 + 场景版总集", "theme": "产品与用户", "theme_id": 4, "id": "s83"}, {"type": "summary", "title": "八种\"比免费更好\"的价值", "person": "凯文·凯利", "core": "即时性(Immediacy)、个性化(Personalization)、解读性(Interpretation)、可信性(Authenticity)、可达性(Accessibility)、实体化(Embodiment)、赞助性(Patronage)、可发现性(Findability)", "detail": "当复制免费时，不可复制的东西才值钱", "quote": "", "source": "场景版总集", "theme": "产品与用户", "theme_id": 4, "id": "s84"}, {"type": "summary", "title": "产品标准三维度", "person": "李想", "core": "安全感（从用户真实场景出发）、价值感（同样的钱买到最好的功能体验）、向往感（唤起用户心中的理想场景）", "detail": "产品服务决定销量，品牌决定利润率\n先做好 60 分再追求 100 分\n商业模式四步法：圈地 → 产品 → 运营 → 商业化", "quote": "", "source": "场景版总集", "theme": "产品与用户", "theme_id": 4, "id": "s85"}, {"type": "summary", "title": "错位竞争与田忌赛马", "person": "黄峥", "core": "整体劣势可创造局部优势。淘宝搜索是核心，任何改革都意味弱化搜索；但搜索在拼多多只是极小场景", "detail": "匹配逻辑 vs 流量逻辑：\"腾讯有全中国最大的流量、投了一堆垂直电商，全没做成——因为流量逻辑今天无法成功\"", "quote": "", "source": "思想精华个人版 + 场景版总集", "theme": "商业与竞争", "theme_id": 5, "id": "s86"}, {"type": "summary", "title": "PMF 是唯一分水岭", "person": "马克·安德森", "core": "\"When a great team meets a lousy market, market wins.\" 市场 > 团队 > 产品", "detail": "", "quote": "", "source": "思想精华个人版", "theme": "商业与竞争", "theme_id": 5, "id": "s87"}, {"type": "summary", "title": "\"低价是1，品质服务是两个0\"", "person": "刘强东", "core": "失去核心竞争力（那个\"1\"），其他一切竞争优势都归零", "detail": "用户体验公式：（产品+服务）/ 价格 >> 1", "quote": "", "source": "思想精华个人版 + 场景版总集", "theme": "商业与竞争", "theme_id": 5, "id": "s88"}, {"type": "summary", "title": "商业篇核心洞察", "person": "张一鸣", "core": "\"非理性让社会存在各种商业机会，非理性让创业公司错过这些机会。不要非理性，要非常理性。\" (商#021)", "detail": "\"创业忌：未思进，先思退。\" (商#010)\n\"互联网行业往往是 Winner Takes All。120% 的努力获得 200% 的回报。\" (商#022)\n做产品的核心是\"不鸵鸟\"——不绕弯、不侥幸，必须直面问题，极其警惕\"愿望式思考\"\n方向清楚的一方仍然输了，输在执行和团队。战略家过多是负资产，抓细节的人才是稀缺资源\n创业四原则：(1) 凡事只能靠自己 (2) 万事皆有解，且只有唯一正解 (3) 凡是担心的事一定会发生 (4) 从创业的第一天开始，享受！\n前瞻性预判（2010-2012写，后被验证）：\"我相信信息的聚合、检索、关联、推荐有很大的空间。\"——今日头条（2012）和抖音（2016）的思想源头", "quote": "", "source": "张一鸣231条语录", "theme": "商业与竞争", "theme_id": 5, "id": "s89"}, {"type": "summary", "title": "三大管理框架", "person": "张一鸣", "core": "\"当你给一个人足够的信任和压力的时候，他总能比原来做的更好。\" (管#009)", "detail": "\"对于一名 CEO 而言，最难的事可能就是抵制住想自己解决问题的欲望。\" (管#014)\n\"别装，做个坦诚真实的人。团队中都是坦诚真实的人，沟通成本将小很多。\" (管#004)", "quote": "", "source": "张一鸣231条语录", "theme": "管理与团队", "theme_id": 6, "id": "s90"}, {"type": "summary", "title": "Founder Mode vs Manager Mode", "person": "Brian Chesky", "core": "传统管理学教招好人、放权、不微管理。但这套方法对创始人经营往往是灾难", "detail": "\"深入细节\"不等于\"微管理\"，而是保持对真实情况的感知\nSkip-level 是创始人的必备工具——不只通过直接汇报了解情况\n乔布斯每年召集 Apple 最重要的 100 个人（不一定是最高职级的 100 人）开年度闭门会议。最重要的人 ≠ 职级最高的人", "quote": "", "source": "思想精华个人版 + 场景版总集", "theme": "管理与团队", "theme_id": 6, "id": "s91"}, {"type": "summary", "title": "组织管理四原则", "person": "任正非", "core": "\"淡化英雄色彩\"是职业化的必然——如一列火车从广州到北京，数百人搬了道岔、数十个司机接力", "detail": "自我批判写入\"宪法\"——华为基本法将自我批判制度化", "quote": "", "source": "思想精华个人版 + 场景版总集", "theme": "管理与团队", "theme_id": 6, "id": "s92"}, {"type": "summary", "title": "取舍是一切的起点", "person": "王兴", "core": "关注核心而非边界——核心足够强大，周边自然被吸引过来", "detail": "", "quote": "", "source": "思想精华个人版", "theme": "管理与团队", "theme_id": 6, "id": "s93"}, {"type": "summary", "title": "影响圈聚焦原则（思维模型）", "person": "张一鸣", "core": "把精力只投入\"现在能改变的事\"，对无法控制的外部环境不抱怨、不感叹", "detail": "抱怨是零收益行为。行动，哪怕是准备行动，才是唯一有效的出口\n比柯维更激进：不动肯定是错误", "quote": "", "source": "张一鸣231条语录", "theme": "长期主义", "theme_id": 7, "id": "s94"}, {"type": "summary", "title": "惰性即万恶之源（思维模型）", "person": "张一鸣", "core": "大多数个人问题（拖延、依赖、保守、知行不一）本质上都是惰性的变体", "detail": "三种惰性：体力惰性、思维惰性、情绪惰性\n修炼就是反复克服惰性，没有捷径，只有建立指标、持续测量、小承诺积累", "quote": "", "source": "张一鸣231条语录", "theme": "长期主义", "theme_id": 7, "id": "s95"}, {"type": "summary", "title": "\"买入同学10%\"思想实验", "person": "巴菲特", "core": "如果可以买下一个同学未来 10% 的收入，你不会选智商最高的，而会选慷慨、诚实、把功劳归于他人的人", "detail": "品行不是天赋，是可以培养的行为习惯\n最大的错误是\"该做的没做\"——最大的风险不是亏损，而是错过", "quote": "", "source": "思想精华个人版", "theme": "长期主义", "theme_id": 7, "id": "s96"}, {"type": "summary", "title": "反脆弱三元结构 + 实操策略", "person": "塔勒布", "core": "脆弱（玻璃杯碎裂）→ 强韧（塑料杯恢复）→ 反脆弱（九头蛇砍一头长两头）", "detail": "杠铃策略：90% 极端保守 + 10% 极端进取。损失上限 10%，收益无上限\nVia Negativa：移除有害元素比添加干预更智慧。戒掉坏习惯比添加保健品有效", " /* 使用 Object.freeze 保证状态不被直接修改 */

/* 创建新状态（不可变更新，返回冻结的新对象） */
function updateState(patch) {
  state = Object.freeze({ ...state, ...patch });
}

/* ===== 辅助函数 ===== */
function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

/* 搜索高亮：在已转义的文本中高亮匹配 */
function highlight(text, query) {
  if (!text || !query) return escapeHtml(text);
  const safe = escapeHtml(text);
  const q = escapeHtml(query);
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return safe.replace(re, "<mark>$1</mark>");
}

/* 判断数据项是否匹配搜索词 */
function matchesSearch(item, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  if (item.type === "summary") {
    return [item.title, item.person, item.core, item.detail, item.quote, item.source]
      .join(" ").toLowerCase().includes(q);
  }
  return [item.text, item.person, item.tag, item.theme]
    .join(" ").toLowerCase().includes(q);
}

/* 获取所有匹配当前搜索的条目数 */
function getFilteredCount() {
  const q = state.searchText;
  if (!q) return QUOTES.length + SUMMARIES.length;
  return [...QUOTES, ...SUMMARIES].filter(item => matchesSearch(item, q)).length;
}

/* ===== 渲染引擎 ===== */

function render() {
  const container = document.getElementById("content");
  const { view, searchText, personFilter } = state;

  /* 更新搜索计数 */
  const countEl = document.getElementById("search-count");
  if (searchText) {
    const matchCount = getFilteredCount();
    countEl.textContent = "找到 " + matchCount + " 条";
    countEl.classList.add("visible");
  } else {
    countEl.classList.remove("visible");
  }

  /* 根据视图类型分发渲染 */
  if (view === "theme") {
    renderThemeView(container, searchText, personFilter);
  } else {
    renderPersonView(container, searchText);
  }
}

    const groupId = "theme-" + tid;
    const isExpanded = state.expandedGroups.includes(groupId);

    /* 分组行 */
    html += '<div class="group-row' + (isExpanded ? ' expanded' : '') + '" onclick="toggleGroup(\'' + groupId + '\')">'
      + '<div class="group-dot group-dot-' + tid + '"></div>'
      + '<div class="group-info"><div class="group-name">' + escapeHtml(themeName) + '</div></div>'
      + '<span class="group-count">' + totalCount + '</span>'
      + '<span class="group-arrow">&#9660;</span>'
      + '</div>';

    /* 分组内容 */
    html += '<div class="group-content' + (isExpanded ? ' expanded' : '') + '" id="' + groupId + '">'
      + '<div class="group-content-inner">';

    /* 深度解读子区 */
    if (themeSummaries.length > 0) {
      html += '<div class="sub-section-title">深度解读 (' + themeSummaries.length + ')</div>';
      themeSummaries.forEach(item => {
        html += renderSummaryCard(item, searchText);
      });
    }

    /* 精选金句子区 */
    if (themeQuotes.length > 0) {
      html += '<div class="sub-section-title">精选金句 (' + themeQuotes.length + ')</div>';
      themeQuotes.forEach(item => {
        html += renderQuoteCard(item, searchText);
      });
    }

    html += '</div></div>';
  }

  if (!html) {
    html = '<div class="empty-state"><div class="emoji">&#128214;</div><p>没有找到匹配的内容</p></div>';
  }

  container.innerHTML = html;
}

/* ===== 按人物视图 ===== */
function renderPersonView(container, searchText) {
  /* 统计每个人的内容并按数量排序 */
  const personData = {};
  [...SUMMARIES, ...QUOTES].forEach(item => {
    if (!item.person) return;
    if (!matchesSearch(item, searchText)) return;
    if (!personData[item.person]) {
      personData[item.person] = { summaries: [], quotes: [] };
    }
    if (item.type === "summary") {
      personData[item.person].summaries.push(item);
    } else {
      personData[item.person].quotes.push(item);
    }
  });

  /* 按内容数量排序 */
  const sorted = Object.entries(personData)
    .map(([name, data]) => ({
      name,
      total: data.summaries.length + data.quotes.length,
      summaries: data.summaries,
      quotes: data.quotes
    }))
    .sort((a, b) => b.total - a.total);

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">&#128214;</div><p>没有找到匹配的内容</p></div>';
    return;
  }

  /* 颜色池，为人物分配头像颜色 */
  const colorPool = [
    THEME_COLORS[1], THEME_COLORS[2], THEME_COLORS[3], THEME_COLORS[4],
    THEME_COLORS[5], THEME_COLORS[6], THEME_COLORS[7], THEME_COLORS[8]
  ];

  let html = "";
  sorted.forEach((person, idx) => {
    const info = PERSON_INFO[person.name] || {};
    const initial = person.name.charAt(0);
    const avatarColor = colorPool[idx % colorPool.length];
    const groupId = "person-" + idx;
    const isExpanded = state.expandedGroups.includes(groupId);

    html += '<div class="group-row' + (isExpanded ? ' expanded' : '') + '" onclick="toggleGroup(\'' + groupId + '\')">'
      + '<div class="group-avatar" style="background:' + avatarColor + '">' + escapeHtml(initial) + '</div>'
      + '<div class="group-info">'
        + '<div class="group-name">' + escapeHtml(person.name)
          + (info.en && info.en !== person.name ? ' <span class="group-en">' + escapeHtml(info.en) + '</span>' : '')
        + '</div>'
        + (info.desc ? '<div class="group-desc">' + escapeHtml(info.desc) + '</div>' : '')
      + '</div>'
      + '<span class="group-count">' + person.total + '</span>'
      + '<span class="group-arrow">&#9660;</span>'
      + '</div>';

    html += '<div class="group-content' + (isExpanded ? ' expanded' : '') + '" id="' + groupId + '">'
      + '<div class="group-content-inner">';

    if (person.summaries.length > 0) {
      html += '<div class="sub-section-title">深度解读 (' + person.summaries.length + ')</div>';
      person.summaries.forEach(item => {
        html += renderSummaryCard(item, searchText);
      });
    }

    if (person.quotes.length > 0) {
      html += '<div class="sub-section-title">精选金句 (' + person.quotes.length + ')</div>';
      person.quotes.forEach(item => {
        html += renderQuoteCard(item, searchText);
      });
    }

    html += '</div></div>';
  });

  container.innerHTML = html;
}

/* ===== 渲染深度卡片 ===== */
function renderSummaryCard(item, searchText) {
  const isFav = state.favorites.includes(item.id);
  const tid = item.theme_id;
  const hl = searchText ? (t => highlight(t, searchText)) : (t => escapeHtml(t));

  let detailHtml = "";
  if (item.detail) {
    detailHtml += '<p>' + hl(item.detail) + '</p>';
  }
  if (item.quote) {
    detailHtml += '<div class="quote-block">' + hl(item.quote) + '</div>';
  }
  if (item.source) {
    detailHtml += '<div class="card-source">&mdash;&mdash; ' + hl(item.source) + '</div>';
  }

  return '<div class="card theme-border-' + tid + '" data-id="' + item.id + '">'
    + '<div class="card-header">'
      + '<div class="card-title">' + hl(item.title || "") + '</div>'
      + (item.person ? '<span class="card-person-badge">' + escapeHtml(item.person) + '</span>' : '')
    + '</div>'
    + '<div class="card-core">' + hl(item.core || "") + '</div>'
    + (detailHtml ? (
        '<div class="card-expand-hint" onclick="event.stopPropagation();toggleCard(this)"><span class="arrow" style="transition:transform 300ms">&#9660;</span> 展开详情</div>'
        + '<div class="card-detail"><div class="card-detail-inner">' + detailHtml + '</div></div>'
      ) : '')
    + '<div class="card-footer">'
      + '<div class="card-tags">'
        + (item.person ? '<button class="person-tag" onclick="event.stopPropagation();filterPerson(\'' + escapeAttr(item.person) + '\')">' + escapeHtml(item.person) + '</button>' : '')
        + '<span class="quote-tag tag-' + tid + '">' + escapeHtml(THEME_NAMES[tid] || "") + '</span>'
      + '</div>'
      + '<div class="card-actions">'
        + '<button class="card-action-btn" onclick="event.stopPropagation();copyItem(\'' + item.id + '\',\'summary\')" title="复制">&#128203;</button>'
        + '<button class="card-action-btn ' + (isFav ? 'favorited' : '') + '" onclick="event.stopPropagation();toggleFav(\'' + item.id + '\')" title="收藏">' + (isFav ? '&#9733;' : '&#9734;') + '</button>'
      + '</div>'
    + '</div>'
  + '</div>';
}

/* ===== 渲染金句卡片 ===== */
function renderQuoteCard(item, searchText) {
  const isFav = state.favorites.includes(item.id);
  const tid = item.theme_id;
  const hl = searchText ? (t => highlight(t, searchText)) : (t => escapeHtml(t));

  return '<div class="quote-card theme-border-' + tid + '" data-id="' + item.id + '">'
    + '<div class="quote-text">' + hl(item.text) + '</div>'
    + '<div class="quote-footer">'
      + '<div class="quote-meta">'
        + (item.person ? '<span class="quote-person" onclick="event.stopPropagation();filterPerson(\'' + escapeAttr(item.person) + '\')">' + hl(item.person) + '</span>' : '')
        + '<span class="quote-tag tag-' + tid + '">' + escapeHtml(item.theme || "") + '</span>'
      + '</div>'
      + '<div class="card-actions">'
        + '<button class="card-action-btn" onclick="event.stopPropagation();copyItem(\'' + item.id + '\',\'quote\')" title="复制">&#128203;</button>'
        + '<button class="card-action-btn ' + (isFav ? 'favorited' : '') + '" onclick="event.stopPropagation();toggleFav(\'' + item.id + '\')" title="收藏">' + (isFav ? '&#9733;' : '&#9734;') + '</button>'
      + '</div>'
    + '</div>'
  + '</div>';
}

/* ===== 交互函数 ===== */

/* 切换视图 Tab */
function setView(view) {
  updateState({ view, expandedGroups: [], personFilter: "" });
  document.querySelectorAll(".view-tab").forEach(el => {
    el.classList.toggle("active", el.dataset.view === view);
  });
  render();
  window.scrollTo({ top: document.getElementById("sticky-bar").offsetTop, behavior: "smooth" });
}

/* 展开/收起分组 */
function toggleGroup(groupId) {
  const newExpanded = state.expandedGroups.includes(groupId)
    ? state.expandedGroups.filter(id => id !== groupId)
    : [...state.expandedGroups, groupId];
  updateState({ expandedGroups: newExpanded });

  /* 直接操作 DOM 做动画，避免重渲染所有内容 */
  const contentEl = document.getElementById(groupId);
  const rowEl = contentEl ? contentEl.previousElementSibling : null;
  if (contentEl) {
    const isNowExpanded = newExpanded.includes(groupId);
    contentEl.classList.toggle("expanded", isNowExpanded);
    if (rowEl) rowEl.classList.toggle("expanded", isNowExpanded);
  }
}

/* 搜索输入（200ms 防抖） */
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    updateState({
      searchText: document.getElementById("search-input").value.trim(),
      expandedGroups: []
    });
    render();
  }, 200);
}

/* 展开/收起深度卡片详情 */
function toggleCard(hint) {
  const card = hint.closest(".card");
  card.classList.toggle("expanded");
  const isExpanded = card.classList.contains("expanded");
  hint.childNodes[1].textContent = isExpanded ? " 收起详情" : " 展开详情";
  /* 标记已读 */
  const id = card.dataset.id;
  if (isExpanded && id && !state.readItems.includes(id)) {
    const newRead = [...state.readItems, id];
    updateState({ readItems: newRead });
    localStorage.setItem("biz_read", JSON.stringify(newRead));
  }
}

/* 切换收藏 */
function toggleFav(id) {
  const newFavs = state.favorites.includes(id)
    ? state.favorites.filter(f => f !== id)
    : [...state.favorites, id];
  updateState({ favorites: newFavs });
  localStorage.setItem("biz_favs", JSON.stringify(newFavs));
  showToast(newFavs.includes(id) ? "已收藏" : "已取消收藏");
  render();
}

/* 复制内容（含出处） */
function copyItem(id, type) {
  let text = "";
  if (type === "quote") {
    const item = QUOTES.find(q => q.id === id);
    if (item) text = "「" + item.text + "」—— " + (item.person || "") + (item.tag ? " #" + item.tag : "");
  } else {
    const item = SUMMARIES.find(s => s.id === id);
    if (item) {
      text = item.title + "\n" + (item.core || "") + (item.source ? "\n—— " + item.source : "");
    }
  }
  navigator.clipboard.writeText(text).then(() => showToast("已复制到剪贴板"));
}

/* 按人物筛选（仅按主题视图中可用） */
function filterPerson(name) {
  if (state.view !== "theme") {
    /* 如果在人物视图中点击人物标签，切换到按主题视图并筛选 */
    updateState({ view: "theme", personFilter: name, expandedGroups: [] });
    document.querySelectorAll(".view-tab").forEach(el => {
      el.classList.toggle("active", el.dataset.view === "theme");
    });
  } else {
    updateState({
      personFilter: state.personFilter === name ? "" : name,
      expandedGroups: []
    });
  }
  render();
  if (state.personFilter) showToast("筛选: " + state.personFilter);
  else showToast("已清除人物筛选");
}

/* 清除人物筛选 */
function clearPersonFilter() {
  updateState({ personFilter: "", expandedGroups: [] });
  render();
  showToast("已清除人物筛选");
}

/* ===== 面板操作 ===== */
function openPanel(type) {
  document.getElementById("panel-overlay").classList.add("visible");
  if (type === "fav") {
    renderFavPanel();
    document.getElementById("fav-panel").classList.add("visible");
  }
}

function closePanel() {
  document.getElementById("panel-overlay").classList.remove("visible");
  document.getElementById("fav-panel").classList.remove("visible");
}

function renderFavPanel() {
  const container = document.getElementById("fav-content");
  if (state.favorites.length === 0) {
    container.innerHTML = '<div class="fav-empty">还没有收藏内容</div>';
    return;
  }
  let html = "";
  state.favorites.forEach(id => {
    if (id.startsWith("q")) {
      const item = QUOTES.find(q => q.id === id);
      if (item) html += renderQuoteCard(item, "");
    } else {
      const item = SUMMARIES.find(s => s.id === id);
      if (item) html += renderSummaryCard(item, "");
    }
  });
  container.innerHTML = html;
}

/* ===== 深色模式 ===== */
function toggleDark() {
  const isDark = !state.darkMode;
  updateState({ darkMode: isDark });
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  localStorage.setItem("biz_dark", isDark.toString());
  document.getElementById("dark-toggle").innerHTML = isDark ? "&#9788;" : "&#9790;";
}

/* ===== Toast 提示 ===== */
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("visible");
  setTimeout(() => el.classList.remove("visible"), 1500);
}

/* ===== 进度条 & 回到顶部 ===== */
window.addEventListener("scroll", () => {
  /* 进度条 */
  const scrollTop = document.documentElement.scrollTop;
  const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = scrollHeight > 0 ? (scrollTop / scrollHeight * 100) : 0;
  document.getElementById("progress-bar").style.width = progress + "%";
  /* 回到顶部按钮 */
  document.getElementById("back-to-top").classList.toggle("visible", scrollTop > 400);
}, { passive: true });

/* ===== 初始化 ===== */
(function init() {
  /* 恢复深色模式偏好 */
  if (state.darkMode) {
    document.documentElement.setAttribute("data-theme", "dark");
    document.getElementById("dark-toggle").innerHTML = "&#9788;";
  }
  /* 首次渲染 */
  render();
})();
</script>
</body>
</html>
