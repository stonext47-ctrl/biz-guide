/* ========== CSS 变量 ========== */
:root {
  /* 暖色调配色 */

  --bg-search: #FFFFFF;
  --text: #3D2E1F;
  --text-secondary: #6B5B4A;
  --text-muted: #9A8B7A;
  --accent: #C17B2E;
  --accent-hover: #A8681E;
  --accent-light: rgba(193, 123, 46, 0.1);
  --accent-lighter: rgba(193, 123, 46, 0.05);
  --border: #E5DDD0;
  --border-light: #EDE7DB;
  --shadow-sm: 0 1px 3px rgba(61,46,31,0.06);
  --shadow-md: 0 4px 12px rgba(61,46,31,0.08);
  --shadow-lg: 0 8px 24px rgba(61,46,31,0.1);
  --quote-border: #D4A96A;
  --quote-mark: #C17B2E;

  --tag-成长与修炼: #059669;
  --tag-决策与判断: #d97706;
  --tag-写作与表达: #8b5cf6;
  --tag-人性与心理: #dc2626;
  --tag-管理与领导: #0284c7;
  --tag-商业与竞争: #c026d3;
  --tag-长期主义: #0d9488;
  --tag-创业与行动: #ea580c;
  --tag-学习与阅读: #4f46e5;
  --tag-AI与技术: #0891b2;
  --tag-产品与用户: #16a34a;
  --tag-品牌与传播: #e11d48;
  --tag-风险与反脆弱: #7c3aed;
  --tag-团队与文化: #ca8a04;

  /* 排版 */
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans SC", "PingFang SC", sans-serif;
  --font-serif: "Noto Serif SC", "Songti SC", Georgia, serif;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-pill: 100px;
  --transition: 0.25s ease;
  --max-w: 720px;
}

/* ========== 全局重置 ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {

  font-size: 15px;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ========== 页头 ========== */
/* <!-- 板块：页头 --> */
.page-header {
  text-align: center;
  padding: 48px 20px 32px;
  background: linear-gradient(180deg, rgba(193,123,46,0.08) 0%, transparent 100%);
}
.page-header h1 {
  font-family: var(--font-serif);
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -0.02em;
}
.page-header .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}
.page-header .meta {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 12px;
}
.stat-bar {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 16px;
  font-size: 13px;
  color: var(--text-secondary);
}
.stat-bar .num {
  font-weight: 700;
  color: var(--accent);
  font-size: 18px;
  display: block;
}

/* ========== 搜索栏 ========== */
/* <!-- 板块：搜索 --> */
.search-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  border-bottom: 1px solid var(--border-light);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: var(--max-w);
  margin: 0 auto;
  background: var(--bg-search);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 8px 16px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.search-icon {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  color: var(--text-muted);
}
.search-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
  color: var(--text);
  font-family: var(--font-sans);
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear {
  display: none;
  border: none;
  background: var(--border);
  color: var(--text-secondary);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  line-height: 1;
}
.search-count {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
  max-width: var(--max-w);
  margin-left: auto;
  margin-right: auto;
  display: none;
}

/* ========== Tab切换 ========== */
/* <!-- 板块：Tab导航 --> */
.tab-nav {
  display: flex;
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 16px;
}
.tab-btn {
  flex: 1;
  padding: 12px 0;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
  border: none;
  background: none;
  cursor: pointer;
  position: relative;
  transition: var(--transition);
}
.tab-btn.active {
  color: var(--accent);
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 3px;
  background: var(--accent);
  border-radius: 3px;
}

/* ========== 内容区 ========== */
.content-area {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 16px 120px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ========== 人物卡片 ========== */
/* <!-- 板块：人物卡片 --> */
.person-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.person-card.expanded {
  box-shadow: var(--shadow-md);
}
.person-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.person-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
  flex-shrink: 0;
  font-family: var(--font-serif);
}
.person-info {
  flex: 1;
  min-width: 0;
}
.person-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.person-name .en {
  font-weight: 400;
  font-size: 13px;
  color: var(--text-muted);
  margin-left: 6px;
}
.person-tagline {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.person-count {
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 2px 10px;
  border-radius: var(--radius-pill);
}
.person-arrow {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  transition: transform var(--transition);
}
.person-card.expanded .person-arrow {
  transform: rotate(90deg);
}

.person-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border-light);
}
.person-card.expanded .person-body {
  display: block;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.person-summary {
  padding: 12px 0;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 12px;
}
.person-summary h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.person-summary .point-item {
  padding: 4px 0;
  line-height: 1.6;
}
.person-summary .point-item strong {
  color: var(--text);
}

/* ========== 类型卡片 ========== */
/* <!-- 板块：类型卡片 --> */
.category-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.category-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.category-name {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.category-count {
  font-size: 13px;
  color: var(--text-muted);
}
.category-arrow {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  transition: transform var(--transition);
}
.category-card.expanded .category-arrow {
  transform: rotate(90deg);
}
.category-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border-light);
}
.category-card.expanded .category-body {
  display: block;
  animation: slideDown 0.3s ease;
}

/* ========== 金句条目 ========== */
/* <!-- 板块：金句条目 --> */
.quote-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border-light);
}
.quote-item:last-child {
  border-bottom: none;
}
.quote-text {
  font-family: var(--font-serif);
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
  font-weight: 500;
  position: relative;
  padding-left: 20px;
}
.quote-text::before {
  content: '\201C';
  position: absolute;
  left: -2px;
  top: -4px;
  font-size: 28px;
  color: var(--quote-mark);
  opacity: 0.4;
  font-family: Georgia, serif;
  line-height: 1;
}
.quote-en {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-top: 6px;
  padding-left: 20px;
  font-style: italic;
}
.point-text {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
}
.point-title-text {
  font-weight: 700;
  color: var(--text);
}
.point-body-text {
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 4px;
  line-height: 1.7;
  display: none;
}
.quote-item.detail-open .point-body-text {
  display: block;
  animation: slideDown 0.2s ease;
}

.quote-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
  padding-left: 20px;
}
.quote-person {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}
.quote-cite {
  font-size: 13px;
  color: var(--text-muted);
}

/* 类型标签 */
.tag {
  display: inline-block;
  font-size: 13px;
  font-weight: 600;

.tag-认知与思维 { background: rgba(99,102,241,0.1); color: var(--tag-认知与思维); }

.tag-管理与领导 { background: rgba(2,132,199,0.1); color: var(--tag-管理与领导); }
.tag-商业与竞争 { background: rgba(192,38,211,0.1); color: var(--tag-商业与竞争); }
.tag-长期主义 { background: rgba(13,148,136,0.1); color: var(--tag-长期主义); }
.tag-创业与行动 { background: rgba(234,88,12,0.1); color: var(--tag-创业与行动); }
.tag-学习与阅读 { background: rgba(79,70,229,0.1); color: var(--tag-学习与阅读); }
.tag-AI与技术 { background: rgba(8,145,178,0.1); color: var(--tag-AI与技术); }
.tag-产品与用户 { background: rgba(22,163,74,0.1); color: var(--tag-产品与用户); }
.tag-品牌与传播 { background: rgba(225,29,72,0.1); color: var(--tag-品牌与传播); }
.tag-风险与反脆弱 { background: rgba(124,58,237,0.1); color: var(--tag-风险与反脆弱); }
.tag-团队与文化 { background: rgba(202,138,4,0.1); color: var(--tag-团队与文化); }

/* 展开按钮 */
.detail-toggle {
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
  border: none;
  background: none;
  padding: 2px 0;
  margin-left: auto;
  -webkit-tap-highlight-color: transparent;
}

/* ========== 回到顶部 ========== */
/* <!-- 板块：回到顶部 --> */
.back-top {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition);
  z-index: 90;
  -webkit-tap-highlight-color: transparent;
}
.back-top.visible {
  opacity: 1;
  pointer-events: auto;
}
.back-top svg {
  width: 20px;
  height: 20px;
}

/* ========== 空状态 ========== */
.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-muted);
}
.empty-state svg {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
  opacity: 0.3;
}

/* ========== 响应式 ========== */
@media (min-width: 768px) {
  body { font-size: 16px; }
  .page-header { padding: 64px 24px 40px; }
  .content-area { padding: 0 24px 120px; }
  .person-header { padding: 18px 20px; }
  .person-body { padding: 0 20px 20px; }
  .quote-text { font-size: 16px; }
}

/* ========== 打印 ========== */
@media print {
  .search-wrap, .tab-nav, .back-top { display: none !important; }
  .person-body, .category-body { display: block !important; }
  .point-body-text { display: block !important; }
  .person-card, .category-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
}
</style>

const ALL_ITEMS = [{"id": 1, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "有用的写作，是把论点推到尽可能强，恰好不越过虚假的边界。", "en": "Useful writing makes claims that are as strong as they can be made without becoming false.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 2, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "表述强度和限定词就像手动挡汽车的油门和离合器。当你试图精炼一个想法的表达时，你上下调节强度，以产出仍然为真的最高质量版本。", "en": "Strength and qualification are like the accelerator and clutch in a car with a manual transmission. As you try to refine the expression of an idea, you adjust the strength up or down to produce the highest-quality version that is still true.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 3, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "绝大多数文章仍然没有被写出来……互联网之于出版，大致相当于五百年前的印刷术。如果你有话要说，这就是写作的黄金时代。", "en": "Most essays are still unwritten... The internet is to publishing roughly what the printing press was five centuries ago. And this is the golden age of essay writing — if you have something to say.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 4, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "一篇文章越容易读，读者就越能深入地参与其中。", "en": "The easier something is to read, the more deeply readers will engage with it.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 5, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "华丽的文字不仅掩盖思想，还能掩盖思想的缺失。", "en": "Fancy writing doesn't just conceal ideas. It can also conceal the lack of them.", "cite": "", "category": "认知与思维", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 6, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "口语化的语言是思想的运动服。", "en": "Informal language is the athletic clothing of ideas.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 7, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "表达复杂的想法不需要复杂的句子。某个深奥领域的专家彼此讨论专业问题时，他们用的句式并不比讨论午饭吃什么更复杂。", "en": "You don't need complex sentences to express complex ideas. When specialists in some abstruse topic talk to one another about ideas in their field, they don't use sentences any more complex than they do when talking about what to have for lunch.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 8, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "如果你能做到用口语来写作，你就已经超过了95%的写作者。", "en": "If you simply manage to write in spoken language, you'll be ahead of 95% of writers.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 9, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "把想法写成文字是一场严格的测试。你最初选择的词通常是错的，你必须反复改写句子才能准确表达。而且你的想法不仅不精确，还不完整。一篇文章最终包含的想法，有一半是你在写作过程中才想到的。", "en": "Putting ideas into words is a severe test. The first words you choose are usually wrong; you have to rewrite sentences over and over to get them exactly right. And your ideas won't just be imprecise, but incomplete too. Half the ideas that end up in an essay will be ones you thought of while you were writing it.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 10, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "如果把想法写下来总是能让它们变得更精确、更完整，那么任何没有就某个话题写过东西的人，关于这个话题都没有完全成型的想法。一个从不写作的人，关于任何非平凡的事情都没有完全成型的想法。", "en": "If writing down your ideas always makes them more precise and more complete, then no one who hasn't written about a topic has fully formed ideas about it. And someone who never writes has no fully formed ideas about anything nontrivial.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 11, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "你必须假装自己是一个中立的读者，他对你脑子里的想法一无所知，只能看到你写下的文字。当他读你写的东西时，看起来正确吗？看起来完整吗？", "en": "You have to pretend to be a neutral reader who knows nothing of what's in your head, only what you wrote. When he reads what you wrote, does it seem correct? Does it seem complete?", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 12, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "阅读关于x的内容，不仅教你关于x的知识，还教你如何写作。", "en": "Reading about x doesn't just teach you about x; it also teaches you how to write.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 13, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "有一种思考，只有通过写作才能完成。", "en": "There is a kind of thinking that can only be done by writing.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 14, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "不会写就不会想，不会读就不会写。", "en": "You can't think well without writing well, and you can't write well without reading well.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 15, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "N条清单比普通文章更容易读。读者不需要费力去解码文章的底层结构……因为各个点是独立的，读者可以跳过任何无聊的点而不失去主线。", "en": "The list of n things is easier to read than a regular article. Readers don't have to work as hard deciphering the article's underlying structure... Because the points are independent, the reader can stop reading or skim over any that bore them without losing the thread.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 16, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "N条清单最大的弱点是几乎没有发现的空间。好的文章写作，其要义在于写作过程本身，而不是主题……清单体是先想标题，而标题限制了你能说什么。", "en": "The greatest weakness of the list of n things is that there's so little room for discovery. The main point of essay writing, when done well, is the writing, not the topic... With the list of n things you think of the title first, and that constrains what you can say.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 17, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "好写作的大部分在于好想法。如果你知道自己在说什么，你可以用最朴素的文字来表达，别人就会觉得你文风好。", "en": "Having good ideas is most of writing well. If you know what you're talking about, you can say it in the plainest words and you'll be perceived as having a good style.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 18, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "面对足够大的听众，你不需要笑话、戏剧、个人故事或有力的表达。你只需要告诉他们想听的……低频音比高频音更容易穿墙。", "en": "With a large enough audience, you don't need jokes or drama or personal stories or powerful delivery. You just have to tell them what they want to hear... low notes travel through walls better than high ones.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 19, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "消费者从来没有真正为内容付费，出版商也从来没有真正在卖内容……几乎所有出版形式的组织方式，都好像它们卖的是介质本身。", "en": "Consumers never really were paying for content, and publishers weren't really selling it either... Almost every form of publishing has been organized as if the medium was what they were selling.", "cite": "", "category": "管理与领导", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 20, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "一个 Photoshop 用户对 Photoshop 的需要程度，是任何人对某首歌或某篇文章都达不到的。", "en": "A Photoshop user needs Photoshop in a way that no one needs a particular song or article.", "cite": "", "category": "写作与表达", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 21, "type": "quote", "person": "保罗·格雷厄姆", "person_en": "Paul Graham", "person_tagline": "硅谷教父·YC创始人·写作即思考", "person_order": 1, "zh": "当你看到某个东西利用新技术给了人们以前想要但得不到的东西，你大概率在看一个赢家。", "en": "When you see something that's taking advantage of new technology to give people something they want that they couldn't have before, you're probably looking at a winner.", "cite": "", "category": "认知与思维", "source_file": "工具_报告_保罗格雷厄姆写作课深度总结_20260329.html"}, {"id": 22, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "联邦快递（FedEx）的夜班分拣员按小时计薪时总是拖延，改为按班次完成量计薪后，问题立刻消失。一位外科医生因手术提成，说服自己胆囊是\"医学恶魔之源\"，大量做不必要的切除手术。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 23, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格以巴菲特的叔叔弗雷德为例：一个令人钦佩的人会通过\"热爱-赞赏\"的反馈效应，自然提升周围所有人的品质。这解释了为什么要让令人尊敬的人进入教育等领域——其影响力会被放大。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 24, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "9/11后，巴基斯坦人把事件归咎于印度教徒，穆斯林世界归咎于犹太人——事实被极端扭曲，因为憎恨需要一个出口。家族企业中的兄弟内斗，往往打到双方对同一件事的事实描述完全不重叠。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 25, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "宗教信仰在一定程度上受益于这种倾向：面对生死等终极不确定性，人们倾向于快速接受一种信仰，而不是持续保持不可知的状态。法律系统专门设计了延迟裁决的机制来对抗这个倾向。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 26, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "狄更斯笔下马利的鬼魂说：\"我戴着的是我生前锻造的锁链。\"本杰明·富兰克林发现，让别人帮自己一个小忙，比直接讨好对方更容易赢得好感——因为帮过你的人为了保持行为一致性，会说服自己喜欢你。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 27, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "雅典人因纯粹的好奇心发展了数学和科学，而罗马人只关心实用工程，对理论知识几乎没有贡献。好奇心驱动的学习比功利性学习走得更远。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 28, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格认为这种倾向推动了文明进步——人们愿意遵守规则、排队等候、诚实交易，是因为内心相信\"如果人人都这样，社会会更好\"。但当公平被打破时，失望和愤怒也格外强烈。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 29, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "驱动这个世界的不是贪婪，而是嫉妒。\"芒格指出，大学里因薪资差异导致的不满远比绝对收入低带来的不满更强烈。人们几乎从不承认自己的行为是嫉妒驱动的。", "en": "", "cite": "", "category": "人性与心理", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 30, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "在博弈论的囚徒困境实验中，\"以牙还牙\"（tit-for-tat）策略表现最佳。芒格还提到：当一个人被操纵去伤害另一个人后，他反而会更讨厌受害者——因为他需要合理化自己的行为。\"一个人永远不会忘记他埋下斧头的地方。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 31, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "可口可乐的广告永远不会出现死亡画面，只展示快乐场景——因为联想效应要求品牌只与正面情绪绑定。包装设计也利用这一偏误：高档的包装让人联想到高品质的产品。", "en": "", "cite": "", "category": "品牌与传播", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 32, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "成瘾者在生活严重恶化的情况下仍然坚持认为\"我能控制\"\"没那么严重\"——这不是意志力问题，而是心理否认在运作。人在极端压力下会构建一个和现实完全不同的内心版本。", "en": "", "cite": "", "category": "人性与心理", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 33, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "在瑞典的研究中，90%的司机认为自己的驾驶水平高于平均。甚至犯罪分子也会为自己的行为找到合理化理由。芒格建议：强迫自己对自身、家庭、财产和过去的行为进行客观评估。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 34, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格引用费马和帕斯卡的概率论方法作为解药：\"习惯性地使用概率数学是对抗过度乐观的标准方法。\"人天然不擅长概率思维，所以系统性训练至关重要。", "en": "", "cite": "", "category": "AI与技术", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 35, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格指出，差点得到的奖赏被拿走时，人的反应和实际失去已有之物一样剧烈。这解释了赌场赌客在差一点赢时的疯狂加注行为，也解释了企业面对市场份额下滑时的非理性应对。", "en": "", "cite": "", "category": "商业与竞争", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 36, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "经典的电梯实验：当几个实验助手面朝后方站在电梯里时，后进来的陌生人也会转过身去面朝后方。青少年跟随同龄人而非父母的行为模式，正是社会认同倾向在起作用。在企业中，CEO做出愚蠢决策时，如果其他董事不反对，社会认同就让所有人觉得这没问题。", "en": "", "cite": "", "category": "管理与领导", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 37, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "魔术师在别处施加强烈压力的同时偷走手表——对比效应让微小变化被忽略。自由女神像的消失魔术利用了极缓慢的旋转，低于人的感知阈值。在商业中，1000美元的选配放在65000美元车价旁边就不算什么了。", "en": "", "cite": "", "category": "商业与竞争", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 38, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "巴甫洛夫的狗在经历了差点被淹死的极端压力后，之前训练出的所有条件反射全部消失——压力足以重置大脑的\"编程\"。对邪教成员的去洗脑，需要施加与洗脑同等强度的反向压力才可能成功。", "en": "", "cite": "", "category": "AI与技术", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 39, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格提出了对抗方法：使用检查清单（checklists），刻意强调那些不容易记住的证据，在团队中安排\"指定怀疑者\"角色。\"一个想法或事实不会因为容易获取就更值得相信。", "en": "", "cite": "", "category": "团队与文化", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 40, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格引用谚语：\"聪明的人会把不常用但必需的技能作为对自己的一种责任来持续练习。\"他认为学习不仅是获取知识，更是持续应用——不用就等于没学过。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 41, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格认为化学物质的影响与第11条\"心理否认\"密切相关——成瘾者一边在药物驱动下做出自毁行为，一边用心理否认来维持\"我没问题\"的假象，两种倾向互相喂养，形成致命循环。", "en": "", "cite": "", "category": "人性与心理", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 42, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格引用自身经验指出：很少有人在年老时还能学会新的复杂技能，但如果持续保持思考和学习的习惯，已有的能力可以长期保持。衰老不可避免，但衰退速度可以控制。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 43, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "大韩航空的多次空难事故，原因是副驾驶不敢纠正机长的错误决定——权威倾向强到宁可坠机也不敢开口。芒格据此数据指出，在25%的情况下，即使副驾驶知道飞机要坠毁，也不会挑战机长的权威。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 44, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格没有给出具体例子，但他的建议非常直接：聪明的组织管理意味着把冗余话多但内容空洞的人排除在关键决策之外。对废话的容忍度应该极低。", "en": "", "cite": "", "category": "管理与领导", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 45, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "经典的复印机实验：说\"我能先复印吗？因为我要复印\"（理由毫无信息量）的成功率，显著高于不给理由的情况。芒格据此指出，在教育中给学生解释\"为什么要学这个\"比单纯要求他们学更有效。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 46, "type": "quote", "person": "查理·芒格", "person_en": "Charlie Munger", "person_tagline": "多元思维模型·人类误判心理学", "person_order": 2, "zh": "芒格反复强调：心理学教科书逐条讲偏误，却几乎不教你它们如何组合。但生活中最重要的后果——开放式拍卖中的疯狂出价、邪教的洗脑——全都是多种倾向同时发力的结果。你必须学会识别它们的组合模式。", "en": "", "cite": "", "category": "人性与心理", "source_file": "工具_报告_芒格人类误判心理学深度总结_20260328.html"}, {"id": 47, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "一个产品，要加多少的功能，才能成为一个垃圾产品啊！", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 48, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "人已经懒到，你不把文章推送到我桌面上，并且打开好了，字体合适，长度合适，有朋友的推荐语，我就不会阅读了。", "en": "", "cite": "", "category": "写作与表达", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 49, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "流通正在取代内容本身，mp3 取代唱片，微博取代书本。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 50, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "互联网产品应该由用户推动，而不是产品经理来推动。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 51, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "每个人需要两个微博，一个是社交型微博，一个是自我表达型微博。", "en": "", "cite": "", "category": "写作与表达", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 52, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "一个产品要加多少功能才能还不是一个垃圾产品。现在微信虽然比十年以前多了很多功能，但是这些功能都是用最简单的方法做到了。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 53, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "这里面内容消费比例应该是 1:2:10 的关系，平均一个人看 10 个关注的视频，20 个朋友赞的视频和 100 个机器推荐的视频。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 54, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "当你的内容不太全面时，基于机器推荐走不下去。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 55, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "直播特别轻松，不需要你去做基本的内容。你打开直播可能不管有多少观众，你说几句话，这跟你在微博上写一句话没有本质区别。", "en": "", "cite": "", "category": "写作与表达", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 56, "type": "quote", "person": "张小龙", "person_en": "Allen Zhang", "person_tagline": "微信之父·产品哲学·克制与极简", "person_order": 4, "zh": "简单是很美的。简单的东西才最好用，简单的目标是一个最高的目标。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 57, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "每个人一天只有 24 个小时。互联网人的使命不应该是让所有人除了吃喝拉撒，把时间都花在看手机上面。", "en": "", "cite": "", "category": "长期主义", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 58, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "如果微信是一个人，它一定是你最好的朋友，你才愿意花那么多时间给它。那么，我怎么舍得在你最好的朋友脸上，贴一个广告呢？你每次见他，都要先看完广告才能揭开广告跟他说话。", "en": "", "cite": "", "category": "品牌与传播", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 59, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "沟通就是把自己的人设强加给对方的过程。每个人有自己的人设，希望别人接受。你说的每一句话，有意无意的，都在希望别人接受你对自己人设的认可。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 60, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "我自己这些年来看的书，没有一本书是主动找的，基本都是受朋友的影响。我也经常给一些朋友推荐书，推荐的效果往往会比他们自己去找书要好很多倍。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 61, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "如果我们推荐给用户新的知识，用户会离开的。因为惰性是人共有的特性。没有人愿意主动去学习新知识，去伤脑筋啊。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 62, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "产品一定程度上是为了满足人性中的贪嗔痴，这是用户的痛点。能把握住之后，产品经理应该超越其上，用产品帮助人们得以解脱。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 63, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "想清楚自己究竟要做什么，不去迎合上司，不去讨好用户，不去取悦自己。想不清楚一个功能点之前，宁可不做。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 64, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "产品经理永远都应该是文艺青年，而非理性青年。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 65, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "一个 APP 只做一件事情，一个大而全的 APP 意味着全面的平庸。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 66, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "我所说的，都是错的。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_张小龙核心文章深度总结_20260328.html"}, {"id": 67, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "产品经理每个月必须做10个用户调查，关注100个用户博客，收集反馈1000个用户体验。在研究用户需求上没有什么捷径可以走，不要以为自己可以想当然地猜测用户习惯。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 68, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "有冲突时，不强迫用户，不为1%的需求骚扰99%的用户。所有人都喜欢清晰、简单、自然、好用的设计，这是人对美最自然的感受和追求。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 69, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "产品经理需要\"一秒傻瓜，一秒专业\"——通过不断使用和改进来打磨产品。核心能力要做到极致，不能做\"人家有，我也有\"的产品。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 70, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "产品经理要把自己当成\"最挑剔的用户\"。如果产品上线时产品经理能坚持使用三个月，一定会发现不少问题。问题是有限的，一天发现一个，解决掉，就会慢慢逼近\"很有口碑\"的点。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 71, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "每做一件事、每加一个东西都要很谨慎地考虑，尽量不要去打扰用户。每个功能不一定要用得多才是好，而是用了的人都觉得好才是真正的好。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 72, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "不强迫用户。不为1%的需求骚扰99%的用户。淡淡的美术，点到即止。在交互功能上：Don't make me think！在美术呈现上：尽可能简单。在产品设计上：让功能存在于无形之中。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 73, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "我们的心态要好一些，对未来的长期发展我还是非常有信心的。信心是当前大环境最为缺失的。", "en": "", "cite": "", "category": "长期主义", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 74, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "视频号不负众望，是全鹅厂的希望。微信是日活、整个生态最强壮的平台，已有12年历史。我们计划全力发展视频号直播电商。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 75, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "不能躺在功劳簿上。游戏出海是公司国际化最大希望。CSIG企业服务必须尽快上岸、浮出水面，需实现盈利和高质量发展。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 76, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "张小龙受马化腾影响颇深的观念包括用户体验、口碑、细节美学、化功能于无形之中。张小龙谈到\"用户体验\"就是让自己变成\"白痴级\"用户的速度——马化腾能在3秒内做到，乔布斯需要1秒，而他自己需要5秒。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 77, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "腾讯的产品迭代就是一个被马化腾的邮件推着走的过程。QQ空间开发期间，马化腾与郑志昊团队的邮件往来超过2000份；QQ邮箱改版期间，马化腾与张小龙团队来往了1300多份邮件。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 78, "type": "quote", "person": "马化腾", "person_en": "Pony Ma", "person_tagline": "腾讯创始人·产品经理·用户体验", "person_order": 10, "zh": "杰出的领导者往往能够跳出\"对错\"之争，无论\"对错\"，都对自己的行为进行深刻反思，并努力变得更好。马化腾在\"3Q\"大战后没有因为法律上的胜利而坚持原有路径，而是对过去路径做了一次系统反思，带来其在产品格局上的一次重大升华。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 79, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "消费升级不是让上海人去过巴黎人的生活，而是让安徽安庆的人有厨纸用，有好水果吃。追求高性价比的人群，他会买一个爱马仕的包，也会用9.9元买一箱芒果，这跟消费能力没关系。 —— 黄峥，59条思考", "en": "", "cite": "—— 黄峥，59条思考", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 80, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "拼多多的存在本身就是一种模式，你可以说我low，但你无法忽视我。……淘宝是流量逻辑，搜索，海量SKU满足长尾；拼多多是匹配逻辑，推荐，有限SKU满足结构性丰富。 —— 黄峥，谈与淘宝的根本差异", "en": "", "cite": "—— 黄峥，谈与淘宝的根本差异", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 81, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "时代的洪流浩浩荡荡，方向难以阻挡……在森林里，每一个局部树和树的竞争是激烈的，不同局部的较量是异常丰富、曲折变化的。但如果我们看整个森林，最终所有树的方向又是一致的，那就是向着阳光的方向。 —— 黄峥，谈时代与个体", "en": "", "cite": "—— 黄峥，谈时代与个体", "category": "商业与竞争", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 82, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "认知，几乎是人和人之间唯一的本质差别。技能的差别是可量化的，认知的差别是本质的、不可量化的。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 83, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "不行动的认知，就是伪认知。你以为重要和你真的认为重要，往往不是一回事。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 84, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "一个人卓越，造就不了一家卓越的公司；一群人卓越，才能造就一家卓越的公司。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 85, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "如果把零售业务客户体验分成三要素——价格、品质和服务，低价是'1'，品质和服务是两个'0'，失去了低价优势，其他一切所谓的竞争优势都会归零。\" — 刘强东, 2022 年底京东内部会议", "en": "", "cite": "— 刘强东, 2022 年底京东内部会议", "category": "产品与用户", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 86, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "高管们谈花里胡哨的故事太多，但谈成本、效率、体验太少。\" — 刘强东, 2022 年底京东内部会议", "en": "", "cite": "— 刘强东, 2022 年底京东内部会议", "category": "产品与用户", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 87, "type": "quote", "person": "刘强东", "person_en": "Richard Liu", "person_tagline": "京东创始人·成本效率·商业本质", "person_order": 13, "zh": "低价是我们过去成功最重要的武器，以后也是唯一基础性武器。\" — 刘强东, 2022 年底京东内部会议", "en": "", "cite": "— 刘强东, 2022 年底京东内部会议", "category": "管理与领导", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 88, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "保险这种产品进一步促进了财富从没钱人向有钱人的转移。有没有一种机制能让穷人也能卖\"保险\"给富人，穷人也能卖一些自己的\"软实力\"、自己的意愿、抗风险能力给富人？ —— 黄峥，《把\"资本主义\"倒过来》", "en": "", "cite": "—— 黄峥，《把\"资本主义\"倒过来》", "category": "产品与用户", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 89, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "个体对自身某个行为的确定性的把握，对满足需求的供给方往往是有价值的。一千个消费者联合表达冬季购买羽绒衣的意愿并支付订金，工厂因获得需求确定性，愿意给予30%的折扣。工厂用自己发行的限时折扣券，向普通消费者购买了一个保证在未来购买的保险。 —— 黄峥，《把\"资本主义\"倒过来》", "en": "", "cite": "—— 黄峥，《把\"资本主义\"倒过来》", "category": "写作与表达", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 90, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "习惯的枷锁，开始的时候轻的难以察觉，到后来却重的无法摆脱。\" ——巴菲特，1998 佛罗里达大学演讲", "en": "", "cite": "——巴菲特，1998 佛罗里达大学演讲", "category": "成长与修炼", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 91, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "头脑聪明、勤奋努力，但品行不好，肯定是个祸害。\" ——巴菲特引用彼得·基威特的招聘标准", "en": "", "cite": "——巴菲特引用彼得·基威特的招聘标准", "category": "认知与思维", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 92, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "或早或晚，你们都应该开始做自己真心想做的事。做你们喜欢的工作——要是总做自己不喜欢的工作只为让简历漂亮，那你真是糊涂了。\" ——巴菲特，1998 佛罗里达大学演讲", "en": "", "cite": "——巴菲特，1998 佛罗里达大学演讲", "category": "认知与思维", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 93, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "为了得到对自己不重要的东西，甘愿拿对自己重要的东西去冒险，这简直是疯了。一生只需富一次。\" ——巴菲特论长期资本管理公司破产", "en": "", "cite": "——巴菲特论长期资本管理公司破产", "category": "管理与领导", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 94, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "时间是好生意的朋友，烂生意的敌人。买股票就是买公司的一部分所有权。只要公司生意好，价格合理，收益就不会差。\" ——巴菲特，1998 佛罗里达大学演讲", "en": "", "cite": "——巴菲特，1998 佛罗里达大学演讲", "category": "长期主义", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 95, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "靠第七个最好的主意发家的人很少，靠最好的生意发家的人很多。要是你真能看懂生意，拥有的生意不应超过六个。\" ——巴菲特论集中投资", "en": "", "cite": "——巴菲特论集中投资", "category": "认知与思维", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 96, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "长期累积的资本利得或损失才是真正的重点所在，而非单一期间的盈余数字。\" ——巴菲特，1977 年致股东信", "en": "", "cite": "——巴菲特，1977 年致股东信", "category": "长期主义", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 97, "type": "quote", "person": "巴菲特", "person_en": "Warren Buffett", "person_tagline": "伯克希尔·价值投资·品行与习惯", "person_order": 3, "zh": "保险事业的本质使得经理人的表现对公司绩效具有举足轻重的地位。\" ——巴菲特论保险业务管理者的重要性", "en": "", "cite": "——巴菲特论保险业务管理者的重要性", "category": "管理与领导", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 98, "type": "quote", "person": "黄峥", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7, "zh": "无论我们多么固执地渴求着对称和永恒，时间总是在不断制造着世间种种的不对称、不可逆以及死亡。 —— 黄峥，2020年致股东信", "en": "", "cite": "—— 黄峥，2020年致股东信", "category": "长期主义", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 99, "type": "quote", "person": "黄峥", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7, "zh": "如果概率和随机性本来就是每个物体的天然属性呢？如果大量的物体在本质上就是相互交织和关联的呢？……任何妄图趁人之危或利用漏洞使自身受益的想法，在时间面前显得异常愚蠢。 —— 黄峥，2020年致股东信", "en": "", "cite": "—— 黄峥，2020年致股东信", "category": "长期主义", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 100, "type": "quote", "person": "黄峥", "person_en": "Colin Huang", "person_tagline": "拼多多·错位竞争·本分哲学", "person_order": 7, "zh": "新的物种将会以和从前完全不一样的样子在新的土壤中孕育和生长。 —— 黄峥，2020年致股东信", "en": "", "cite": "—— 黄峥，2020年致股东信", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 101, "type": "quote", "person": "乔布斯", "person_en": "Steve Jobs", "person_tagline": "苹果·品牌即价值观·现实扭曲力场", "person_order": 15, "zh": "对我来说，营销讲的是价值观。这是个复杂的世界，喧嚣的世界，我们没法让人们铭记我们，没有一家公司能做到。所以，我们要非常清楚——我们想让人们铭记我们什么，并非常清楚地把它传达出来。 —— Steve Jobs, 1997 Think Different 内部演讲", "en": "", "cite": "—— Steve Jobs, 1997 Think Different 内部演讲", "category": "品牌与传播", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 102, "type": "quote", "person": "乔布斯", "person_en": "Steve Jobs", "person_tagline": "苹果·品牌即价值观·现实扭曲力场", "person_order": 15, "zh": "Nike的广告从来不聊产品。他们不告诉你他们的气垫鞋比锐步好在哪里。Nike的广告做了什么？他们赞美伟大的竞技体育和运动员。他们表达的是：他们是谁，他们代表什么。 —— Steve Jobs, 谈Nike的营销本质", "en": "", "cite": "—— Steve Jobs, 谈Nike的营销本质", "category": "写作与表达", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 103, "type": "quote", "person": "乔布斯", "person_en": "Steve Jobs", "person_tagline": "苹果·品牌即价值观·现实扭曲力场", "person_order": 15, "zh": "只有那些疯狂到以为自己能够改变世界的人，才能真正改变世界。 —— Think Different 广告核心文案", "en": "", "cite": "—— Think Different 广告核心文案", "category": "品牌与传播", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 104, "type": "quote", "person": "凯文·凯利", "person_en": "Kevin Kelly", "person_tagline": "《失控》作者·未来学家·人生建议", "person_order": 27, "zh": "真正的铁杆粉丝，是会购买你一切作品的那种人。他们会驱车320公里只为听你唱一首歌；他们会同时买精装版、平装版和有声版；他们会在看都没看的情况下预购你的下一件周边。—— Kevin Kelly, 《1000个铁杆粉丝》", "en": "", "cite": "—— Kevin Kelly, \"1,000 True Fans\"", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 105, "type": "quote", "person": "凯文·凯利", "person_en": "Kevin Kelly", "person_tagline": "《失控》作者·未来学家·人生建议", "person_order": 27, "zh": "他们给你的支持，是完整归你的——不像通过唱片公司、出版商、院线或零售商，你只能拿到很小的抽成。……关键的挑战在于：你必须与这1000个铁杆粉丝保持直接联系。—— Kevin Kelly, 《1000个铁杆粉丝》", "en": "", "cite": "—— Kevin Kelly, \"1,000 True Fans\"", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 106, "type": "quote", "person": "凯文·凯利", "person_en": "Kevin Kelly", "person_tagline": "《失控》作者·未来学家·人生建议", "person_order": 27, "zh": "长尾并不会大幅提升创作者的销量，却极大地丰富了消费者的选择。……与其追逐白金唱片、爆款大片和名人地位那些窄小而渺茫的顶峰，不如直接连接一千个真正的铁杆粉丝。—— Kevin Kelly, 《1000个铁杆粉丝》", "en": "", "cite": "—— Kevin Kelly, \"1,000 True Fans\"", "category": "决策与判断", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 107, "type": "quote", "person": "凯文·凯利", "person_en": "Kevin Kelly", "person_tagline": "《失控》作者·未来学家·人生建议", "person_order": 27, "zh": "当复制品极度丰富，它们便变得毫无价值。当复制品极度丰富，那些无法被复制的东西反而稀缺而珍贵。—— Kevin Kelly, 《比免费更好》", "en": "", "cite": "—— Kevin Kelly, \"Better Than Free\"", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 108, "type": "quote", "person": "凯文·凯利", "person_en": "Kevin Kelly", "person_tagline": "《失控》作者·未来学家·人生建议", "person_order": 27, "zh": "在这个网络经济中，金钱流动的路径不是复制品的路径，而是注意力的路径——而注意力自有其规律。—— Kevin Kelly, 《比免费更好》", "en": "", "cite": "—— Kevin Kelly, \"Better Than Free\"", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 109, "type": "quote", "person": "凯文·凯利", "person_en": "Kevin Kelly", "person_tagline": "《失控》作者·未来学家·人生建议", "person_order": 27, "zh": "软件，免费。手册，一万美元。……基因片段会便宜到免费，但解读它们对你意味着什么，将耗资更多。—— Kevin Kelly, 谈 Interpretation（解读性）", "en": "", "cite": "—— Kevin Kelly, 谈 Interpretation（解读性）", "category": "认知与思维", "source_file": "工具_报告_六篇商业经典深度总结_20260329.html"}, {"id": 110, "type": "quote", "person": "傅盛", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18, "zh": "本质是减少真正所谓管理的量，增加判断的量。培养做判断的能力，而非培养勤勉工作的能力。", "en": "", "cite": "", "category": "管理与领导", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 111, "type": "quote", "person": "傅盛", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18, "zh": "主将无能累死三军。执行很难的本质是没有做出正确的决定。", "en": "", "cite": "", "category": "创业与行动", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 112, "type": "quote", "person": "傅盛", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18, "zh": "一个领导者的本质就是做正确的决定。有足够大的信息输入，足够高的反思频度，你才会有足够的信息输出。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 113, "type": "quote", "person": "傅盛", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18, "zh": "没有偶然，只有必然。所有单点都是大趋势下的必然。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 114, "type": "quote", "person": "傅盛", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18, "zh": "战略就是一个杠杆。它让你做的每一件事都放大几倍、几十倍。一旦远离这个杠杆，就变成小公司创业模式。", "en": "", "cite": "", "category": "创业与行动", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 115, "type": "quote", "person": "傅盛", "person_en": "Fu Sheng", "person_tagline": "猎豹移动·认知三部曲·成长即认知升级", "person_order": 18, "zh": "只把一个单点做到极致就能创造奇迹的时代，真的过去了。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 116, "type": "quote", "person": "王慧文", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19, "zh": "基本没有用户会直接说出自己的需求，大部分人提的是 Demand 或者 Requirement，极少有人提的是 Needs。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 117, "type": "quote", "person": "王慧文", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19, "zh": "所有伟大需求都面临两个质疑：一是\"这不可能实现\"，二是\"根本没这个需求\"。遇到更讲道理的人，还会问第三个问题：为什么是现在？", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 118, "type": "quote", "person": "王慧文", "person_en": "Wang Huiwen", "person_tagline": "美团联合创始人·互联网产品方法论", "person_order": 19, "zh": "伟大需求的机会窗就像闪电——正负电荷团击穿空气的瞬间，至少一个在移动中积累。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 119, "type": "quote", "person": "纳瓦尔", "person_en": "Naval Ravikant", "person_tagline": "AngelList·财富杠杆·特种知识", "person_order": 20, "zh": "追求财富而非金钱或地位。财富是在你睡觉的时候依然能为你赚钱的资产。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 120, "type": "quote", "person": "纳瓦尔", "person_en": "Naval Ravikant", "person_tagline": "AngelList·财富杠杆·特种知识", "person_order": 20, "zh": "依靠出租时间不可能致富，你必须拥有股权——一个企业的一部分——才能获得财务自由。", "en": "", "cite": "", "category": "长期主义", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 121, "type": "quote", "person": "纳瓦尔", "person_en": "Naval Ravikant", "person_tagline": "AngelList·财富杠杆·特种知识", "person_order": 20, "zh": "如果社会可以培训你获得某种技能，它终将培训出别人来替代你。专属知识往往是那些你觉得像玩、别人觉得像工作的东西。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 122, "type": "quote", "person": "段永平", "person_en": "Duan Yongping", "person_tagline": "步步高创始人·本分·不为清单", "person_order": 21, "zh": "如果你赚的是本分钱，你会睡得好。身体好会活得长，最后还是会赚到很多钱的。最重要的是，不本分赚钱的人其实不快乐。", "en": "", "cite": "", "category": "团队与文化", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 123, "type": "quote", "person": "段永平", "person_en": "Duan Yongping", "person_tagline": "步步高创始人·本分·不为清单", "person_order": 21, "zh": "很多人太注意所谓成功人士都干了啥，就是不注意他们不干啥。往往不干什么，才是决定成功的最重要因素。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 124, "type": "quote", "person": "段永平", "person_en": "Duan Yongping", "person_tagline": "步步高创始人·本分·不为清单", "person_order": 21, "zh": "能够长期维持的差异化就是护城河。差异化是用户需要但竞争对手满足不了的东西。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_商业思想深度阅读笔记_20260328.html"}, {"id": 125, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "真正\"极度渴望成功\"且\"愿付非凡代价\"的人很少。成功路上并不拥挤，因为能坚持的人真的不多。", "en": "", "cite": "", "category": "成长与修炼", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 126, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "想起来全是问题，做起来才有答案。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 127, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "一流是做事，二流是评价别人，三流是评价别人的评价。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 128, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "人人都是产品经理，产品即自己的一生。信息有不同保质期，年轻时应获取一生适用的信息。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 129, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "纵情向前\"才是我的态度，关注所得而非所失。人生是七八十年与自己的恋爱，需理解宽容接纳。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 130, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "公司的问题，就是员工的机会。", "en": "", "cite": "", "category": "团队与文化", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 131, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "种一棵树的最好时机是十年前，其次是现在。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 132, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "一个年轻同事说\"我可以学\"。这四个简单的字里有无穷的力量。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 133, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "事实再一次证明，快速消费品领域，没有降价3分钱无法摧毁的品牌忠诚度。", "en": "", "cite": "", "category": "品牌与传播", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 134, "type": "quote", "person": "王兴", "person_en": "Wang Xing", "person_tagline": "美团创始人·核心与边界·供给侧", "person_order": 6, "zh": "在投资与被投资、并购和被并购的谈判桌两边切换角色，对理解整个事情很有帮助。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 135, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "以大多数人满足感延迟程度之低，根本轮不到拼天赋。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 136, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "只有乐观的人会相信，会愿意去尝试。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 137, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "对自己的标准一定要高。你对自己的标准，影响了你一生的高度。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 138, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "平庸有重力，需要逃逸速度。", "en": "", "cite": "", "category": "创业与行动", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 139, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "像做产品一样经营公司。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 140, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "最佳状态是保持在轻度喜悦和轻度沮丧之间。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 141, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "互联网行业往往是Winner Takes All，120%的努力获得200%的回报。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 142, "type": "quote", "person": "张一鸣", "person_en": "Zhang Yiming", "person_tagline": "字节跳动·延迟满足·理性自控", "person_order": 5, "zh": "别人腐败时我们努力，别人消磨时光我们学习。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 143, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "在市场爆发的时候是决定胜负的关键，平缓或者下滑的时候，再努力就没有用了，圈地变成了抢地。", "en": "", "cite": "", "category": "商业与竞争", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 144, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "所有的媒体、所有的网站，这些从业人员都不是我们想要的，因为没有任何人考虑用户的需求。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 145, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "企业文化是一帮人约定好，一个简单有效的标准，定义什么叫对企业好。出一条，不需要一页解释。", "en": "", "cite": "", "category": "团队与文化", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 146, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "常年做老三是个非常痛苦的事，什么都改变不了。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 147, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "自信的最核心原因是对自己的认知，你知道自己想要什么，知道自己能放弃什么，你就自信了。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 148, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "真正的用户价值，一定是帮助用户解决了某个问题，或者完成了某项任务，而不是仅仅提供了某个简单的功能。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 149, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "关注用户价值，超越用户需求。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 150, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "人因痛苦而改变，因受益而坚持。", "en": "", "cite": "", "category": "成长与修炼", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 151, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "企业成长速度决定一切，人与人最大差别也是成长速度。", "en": "", "cite": "", "category": "成长与修炼", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 152, "type": "quote", "person": "李想", "person_en": "Li Xiang", "person_tagline": "理想汽车·创业16年·产品实战", "person_order": 8, "zh": "同样的钱，买到对目标用户最好的功能和体验——这就是价值感。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_王兴张一鸣李想深度总结_20260329.html"}, {"id": 153, "type": "quote", "person": "贝索斯", "person_en": "Jeff Bezos", "person_tagline": "亚马逊·长期主义·Day 1哲学", "person_order": 11, "zh": "我们将继续依据长期市场领导力的考量来做投资决策，而非短期盈利或华尔街的短期反应。\" — Jeff Bezos, 1997年致股东信", "en": "", "cite": "— Jeff Bezos, 1997 Letter to Shareholders", "category": "管理与领导", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 154, "type": "quote", "person": "贝索斯", "person_en": "Jeff Bezos", "person_tagline": "亚马逊·长期主义·Day 1哲学", "person_order": 11, "zh": "当必须在美化GAAP会计报表和最大化未来现金流现值之间二选一时，我们选现金流。\" — Jeff Bezos, 1997年致股东信", "en": "", "cite": "— Jeff Bezos, 1997 Letter to Shareholders", "category": "认知与思维", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 155, "type": "quote", "person": "贝索斯", "person_en": "Jeff Bezos", "person_tagline": "亚马逊·长期主义·Day 1哲学", "person_order": 11, "zh": "我们将持续不懈地聚焦于客户……口碑始终是我们最强大的客户获取工具。\" — Jeff Bezos, 1997年致股东信", "en": "", "cite": "— Jeff Bezos, 1997 Letter to Shareholders", "category": "认知与思维", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 156, "type": "quote", "person": "贝索斯", "person_en": "Jeff Bezos", "person_tagline": "亚马逊·长期主义·Day 1哲学", "person_order": 11, "zh": "聪明是一种天赋，善良是一种选择。天赋易得——毕竟它们与生俱来，而选择难做，一不小心，你可能就恃才傲物。\" — Jeff Bezos, 2010 Princeton Commencement", "en": "", "cite": "— Jeff Bezos, 2010 Princeton Commencement", "category": "决策与判断", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 157, "type": "quote", "person": "贝索斯", "person_en": "Jeff Bezos", "person_tagline": "亚马逊·长期主义·Day 1哲学", "person_order": 11, "zh": "在你们 80 岁时某个追忆往昔的时刻，只有你一个人静静对内心诉说着你的人生故事，其中最为充实、最有意义的那段讲述，会被你们作出的一系列决定所填满。最后，是选择塑造了我们的人生。\" — Jeff Bezos, 2010 Princeton Commencement", "en": "", "cite": "— Jeff Bezos, 2010 Princeton Commencement", "category": "决策与判断", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 158, "type": "quote", "person": "雷军", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12, "zh": "打造爆品时，首先考量的第一要素是，产品是否具备'明天属性'——给用户提供代表先进趋势的、令他们向往的全新体验，而且这种体验是用户一旦用过就不想放手的。\" — 雷军", "en": "", "cite": "— 雷军", "category": "产品与用户", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 159, "type": "quote", "person": "雷军", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12, "zh": "产品定义的第一法则是做减法——满足 80% 用户的 80% 需求。只专注解决用户最迫切的需求。\" — 雷军", "en": "", "cite": "— 雷军", "category": "产品与用户", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 160, "type": "quote", "person": "雷军", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12, "zh": "既然这些痛苦难以回避，那我们能做的，就是直面这些痛苦，在痛苦中坚持前行，让痛苦来塑造更好的我们。这就是痛苦的意义、挫折的馈赠。\" — 雷军, 2022 年度演讲", "en": "", "cite": "— 雷军, 2022 年度演讲", "category": "成长与修炼", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 161, "type": "quote", "person": "雷军", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12, "zh": "不带任何目的，学起东西来，反而特别轻松，也特别快。\" — 雷军, 2022 年度演讲", "en": "", "cite": "— 雷军, 2022 年度演讲", "category": "认知与思维", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 162, "type": "quote", "person": "雷军", "person_en": "Lei Jun", "person_tagline": "小米创始人·爆品方法论·逆境哲学", "person_order": 12, "zh": "作为工程师，一定要做用户需要的产品。\" — 雷军, 回忆盘古失败", "en": "", "cite": "— 雷军, 回忆盘古失败", "category": "产品与用户", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 163, "type": "quote", "person": "Dario Amodei", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23, "zh": "我认为，如果有更多富有才华和创造力的研究者投入，他们的发现速度可以提升10倍甚至更多。\" — Dario Amodei, 论 AI 加速生物学研究", "en": "", "cite": "— Dario Amodei, 论 AI 加速生物学研究", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 164, "type": "quote", "person": "Dario Amodei", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23, "zh": "几乎所有自然传染病的可靠预防与治疗……改进的胚胎筛查将有望预防大多数遗传病……20世纪人类预期寿命增长了近一倍（从约40岁到约75岁），照此趋势，\"压缩的21世纪\"将再次翻番，达到150岁。\" — Dario Amodei, 论生物医学的5-10年预期成果", "en": "", "cite": "— Dario Amodei, 论生物医学的 5-10 年预期成果", "category": "商业与竞争", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 165, "type": "quote", "person": "Dario Amodei", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23, "zh": "每个人都能让自己的大脑运转得更好一点，拥有更充实的日常体验。\" — Dario Amodei, 论 AI 驱动的心理健康改善", "en": "", "cite": "— Dario Amodei, 论 AI 驱动的心理健康改善", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 166, "type": "quote", "person": "Dario Amodei", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23, "zh": "当 AI 足够强大，这些壁垒就会崩塌。一个心理扭曲的人可以被一步步引导着设计和合成病原体，就像技术支持调试电脑一样。\" — Dario Amodei, 论 AI 降低生物武器门槛", "en": "", "cite": "— Dario Amodei, 论 AI 降低生物武器门槛", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 167, "type": "quote", "person": "Dario Amodei", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23, "zh": "AI 可能在1到5年内取代所有初级白领工作的一半……创造新工作岗位的技术通常需要数十年才能培育出对应技能，而岗位的消失只需几个月。\" — Dario Amodei, 论经济冲击的非对称性", "en": "", "cite": "— Dario Amodei, 论经济冲击的非对称性", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 168, "type": "quote", "person": "Dario Amodei", "person_en": "Dario Amodei", "person_tagline": "Anthropic CEO·AI安全·技术乐观主义", "person_order": 23, "zh": "我深信人类战胜困难的能力，相信人类精神的伟大与高贵，但我们必须直面现实，不能抱有任何幻想。\" — Dario Amodei, 结语", "en": "", "cite": "— Dario Amodei, 结语", "category": "认知与思维", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 169, "type": "quote", "person": "Brian Chesky", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24, "zh": "当创始人被告知要放弃本能、遵从传统管理结构时，他们会感到自己被欺骗了。\" — Paul Graham, 《创始人模式》", "en": "", "cite": "— Paul Graham, Founder Mode", "category": "管理与领导", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 170, "type": "quote", "person": "Brian Chesky", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24, "zh": "乔布斯每年召集 Apple 最重要的 100 个人（不一定是最高职级的 100 人）开年度闭门会议。这是一种 Founder Mode 的典型实践——却几乎没有被研究和复制过。 — Paul Graham, 引用 Steve Jobs 的案例", "en": "", "cite": "— Paul Graham, 引用 Steve Jobs 的案例", "category": "管理与领导", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 171, "type": "quote", "person": "Brian Chesky", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24, "zh": "Chesky 的核心信条是：创始人保持\"in the details\"不等于微管理，而是与产品开发和用户体验保持亲密连接，做出真正有判断力的战略决策。 — Lenny's Newsletter 对 Chesky 管理哲学的总结", "en": "", "cite": "— Lenny's Newsletter 对 Chesky 管理哲学的总结", "category": "产品与用户", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 172, "type": "quote", "person": "Brian Chesky", "person_en": "Brian Chesky", "person_tagline": "Airbnb·Founder Mode·逆向管理", "person_order": 24, "zh": "Airbnb 推出\"Guest Favorites\"功能，精选约 200 万套最受好评的房源。这是从算法推荐转向\"人工策展\"思路的体现——不是让用户在海量供给中迷失，而是帮用户筛选。 — Lenny's Newsletter, 关于 Airbnb 2023 冬季发布", "en": "", "cite": "— Lenny's Newsletter, 关于 Airbnb 2023 冬季发布", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 173, "type": "quote", "person": "Tobi Lütke", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25, "zh": "在 Shopify，有效使用 AI 现在是对每个人的基本期望。我认为，拒绝在工作中学习和应用 AI 技能，是不现实的。\" — Tobi Lutke, Shopify AI Memo, 2025.04", "en": "", "cite": "— Tobi Lutke, Shopify AI Memo, 2025.04", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 174, "type": "quote", "person": "Tobi Lütke", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25, "zh": "在申请更多人手和资源之前，团队必须先说明为什么无法用 AI 完成想做的事。\" — Tobi Lutke, Shopify AI Memo, 2025.04", "en": "", "cite": "— Tobi Lutke, Shopify AI Memo, 2025.04", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 175, "type": "quote", "person": "Tobi Lütke", "person_en": "Tobi Lütke", "person_tagline": "Shopify CEO·AI-First·信任电池", "person_order": 25, "zh": "Tobi 形容自己使用 AI 的方式：\"思维伙伴、深度研究员、批评者、导师，或结对编程搭档\"，并且承认即便如此，他觉得自己\"只是刚刚触及皮毛\"。 — Tobi Lutke, Shopify AI Memo, 2025.04", "en": "", "cite": "— Tobi Lutke, Shopify AI Memo, 2025.04", "category": "AI与技术", "source_file": "工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"}, {"id": 176, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "您有幸加入了华为公司，我们也有幸获得了与您合作的机会。我们将在相互尊重、相互理解和共同信任的基础上，与您一起渡过在公司工作的岁月。这种开头对等的姿态，不是客套——是华为文化自信的起点。", "en": "", "cite": "", "category": "团队与文化", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 177, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "物质资源终会枯竭，唯有文化才能生生不息。华为的文化就是奋斗文化。一丝不苟地做好本职工作就是奉献，就是英雄行为。", "en": "", "cite": "", "category": "团队与文化", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 178, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "烧不死的鸟就是凤凰。公司永远不会提拔一个没有基层经验的人做高层管理者。遵循循序渐进的原则，每一个环节对您的人生都有巨大的意义。", "en": "", "cite": "", "category": "管理与领导", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 179, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "华为的追求是在电子信息领域实现顾客的梦想，并依靠点点滴滴、锲而不舍的艰苦追求，使我们成为世界级领先企业。（第一条）", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 180, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "我们保证按销售额的10%拨付研发费用，有必要且可能时还将加大拨付比例。（第二十六条）", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 181, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "我们不搞终身雇佣制，但这不等于不能终身在华为工作。我们主张自由雇佣制。（第六十条）", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 182, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "公司的宏观商业模式是：产品发展的路标是客户需求导向，企业管理的目标是流程化组织建设。卖得出去的产品才是真正的技术需求，企业之魂应该是客户需求。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 183, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "当知识和技术不\"值钱\"后，人们回归理性与平实，社会会变得更加可爱。我们不能因为过去的成功就认为自己不需要改变。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 184, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "华为命中注定是为客户而存在的，除了客户，华为没有存在的任何理由。为客户服务是华为存在的唯一理由，客户需求是华为发展的原动力。", "en": "", "cite": "", "category": "产品与用户", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 185, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "以奋斗者为本的实质是什么？其实就是以客户为本。奋斗者为什么而奋斗？应该是为客户而奋斗。\"为客户创造价值的任何微小活动\"都是奋斗。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 186, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "不能为客户创造价值的部门、流程和人员都是多余的，应被精简。在任何客户界面都要保持敬畏之心，让服务超出客户预期。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 187, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "人类社会最主要的目的是创造财富，使更多人摆脱贫穷。社会一定是要合作共赢的，世界就是合作共赢。", "en": "", "cite": "", "category": "认知与思维", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 188, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "我们100%没有后门，愿意与各国签订无后门协议。一个割裂的全球技术网络和市场，最终不仅伤害技术本身，也伤害人类社会发展。", "en": "", "cite": "", "category": "商业与竞争", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 189, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "我们预计销售收入将下降300亿美元，但到2021年公司将重新焕发勃勃生机。有很多美国公司值得学习，我们不能因为一时的困难就否定合作的价值。", "en": "", "cite": "", "category": "学习与阅读", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 190, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "一个职业管理者的社会责任与历史使命，就是为了完成组织目标而奋斗。以组织目标的完成为责任，缩短实现组织目标的时间，节约实现组织目标的资源，就是一个管理者的职业素养与成就。", "en": "", "cite": "", "category": "管理与领导", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 191, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "淡化英雄色彩，特别是淡化领导人、创业者的色彩，是实现职业化的必然之路。如一列火车从广州开到北京，有数百人搬了道岔，有数十个司机接力。不能说最后一个驾车到了北京的就是英雄。", "en": "", "cite": "", "category": "管理与领导", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 192, "type": "quote", "person": "任正非", "person_en": "Ren Zhengfei", "person_tagline": "华为创始人·奋斗文化·灰度哲学", "person_order": 9, "zh": "个人修炼当然也重要，但小草再怎么浇水也长不成大树，如果价值评价体系不正确的话，那我们的导向体系就错了，我们公司就永远发展不起来。", "en": "", "cite": "", "category": "成长与修炼", "source_file": "工具_报告_任正非马化腾深度总结_20260329.html"}, {"id": 193, "type": "quote", "person": "塔勒布", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16, "zh": "反脆弱超越了韧性与强健。强健的系统抵御冲击、维持原状；反脆弱的系统则在冲击中变得更好。\" ——Taleb, EconTalk on Antifragility, 2012", "en": "", "cite": "——Taleb, EconTalk on Antifragility, 2012", "category": "风险与反脆弱", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 194, "type": "quote", "person": "塔勒布", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16, "zh": "人为压制波动性的问题在于：当系统终于崩溃时，会以更加猛烈的方式崩塌。\" ——Taleb 论人为压制波动性的危险", "en": "", "cite": "——Taleb 论人为压制波动性的危险", "category": "认知与思维", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 195, "type": "quote", "person": "塔勒布", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16, "zh": "别告诉我你怎么想，告诉我你的仓位是什么。永远不要相信没有切肤之痛的人。\" ——Taleb, EconTalk on Skin in the Game", "en": "", "cite": "——Taleb, EconTalk on Skin in the Game", "category": "认知与思维", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 196, "type": "quote", "person": "塔勒布", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16, "zh": "社会公正应聚焦于对称性与风险共担，而非事后重新分配结果。\" ——Taleb 论社会公正的本质是风险对称", "en": "", "cite": "——Taleb 论社会公正的本质是风险对称", "category": "风险与反脆弱", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 197, "type": "quote", "person": "塔勒布", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16, "zh": "脆弱的事物喜欢安宁的环境，强韧的事物不太在意环境，反脆弱的事物则从混乱中成长。\" ——塔勒布《反脆弱》", "en": "", "cite": "——塔勒布《反脆弱》", "category": "风险与反脆弱", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 198, "type": "quote", "person": "塔勒布", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16, "zh": "如果你的 90% 资金以现金形式持有，而剩下 10% 投资于风险极高的证券，那么你的损失不可能超过 10%，而你的收益是没有上限的。\" ——塔勒布论杠铃策略", "en": "", "cite": "——塔勒布论杠铃策略", "category": "风险与反脆弱", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 199, "type": "quote", "person": "塔勒布", "person_en": "Nassim Taleb", "person_tagline": "《反脆弱》·黑天鹅·切肤之痛", "person_order": 16, "zh": "在黑天鹅世界里，优化是不可能的，你能做到的最好只是减少脆弱、增加稳健。\" ——塔勒布《反脆弱》", "en": "", "cite": "——塔勒布《反脆弱》", "category": "风险与反脆弱", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 200, "type": "quote", "person": "德鲁克", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17, "zh": "成功的职业不是规划出来的，而是当机遇来临时，已具备自我认知的人自然水到渠成的结果。\" ——德鲁克《管理自己》", "en": "", "cite": "——德鲁克《管理自己》", "category": "管理与领导", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 201, "type": "quote", "person": "德鲁克", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17, "zh": "要发现自己的长处，唯一途径就是回馈分析法——每当做出重要决定或采取重要行动时，记录下自己对结果的预期，9 至 12 个月后再将实际结果与预期比较。\" ——德鲁克《管理自己》", "en": "", "cite": "——德鲁克《管理自己》", "category": "管理与领导", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 202, "type": "quote", "person": "德鲁克", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17, "zh": "如果一个组织的价值体系不为自己所接受或者与自己的价值观不相容，人们就会备感沮丧，工作效力低下。\" ——德鲁克论价值观匹配的重要性", "en": "", "cite": "——德鲁克论价值观匹配的重要性", "category": "管理与领导", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 203, "type": "quote", "person": "德鲁克", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17, "zh": "管理者自己工作的有效性，决定着现代组织的命运。卓有成效不是天赋，而是可以学会的习惯。\" ——德鲁克《卓有成效的管理者》", "en": "", "cite": "——德鲁克《卓有成效的管理者》", "category": "管理与领导", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 204, "type": "quote", "person": "德鲁克", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17, "zh": "打算做新业务，必须删除原有业务。\" ——德鲁克论要事优先的减法原则", "en": "", "cite": "——德鲁克论要事优先的减法原则", "category": "认知与思维", "source_file": "工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"}, {"id": 205, "type": "quote", "person": "德鲁克", "person_en": "Peter Drucker", "person_tagline": "管理学之父·卓有成效·管理自己", "person_order": 17, "zh": "决策是一种判断，是若干方案中的选择。决策必须有反面意见——它保护决策者不沦为组织的奴隶，提供可选方案，激发想象力。\" ——德鲁克论有效决策", "en": "", "cite": "——德鲁克论有效决策", "category": "管理与领导", "source_file": "
