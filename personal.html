:"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":246,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"\"可发现性\"是内容分发的关键：","body":"健康信息过载，用户面对海量科普不知道看什么。做好\"策展\"——帮用户在对的时间发现对的内容（体检前看什么、拿到报告看什么、复查前看什么）——这个引导本身就是价值。","category":"产品与用户","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":247,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"8种价值可以叠加：","body":"即时性（第一时间解读新出的体检指南变化）+ 个性化（根据你的报告定制建议）+ 可信性（有执业医师背书）+ 实体化（线下陪诊、面对面讲解）。叠加越多，竞争壁垒越高。","category":"长期主义","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":248,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"从\"卖内容\"转向\"卖生成性价值\"：","body":"免费内容（体检科普文章）是获客手段，真正变现的是8种生成性价值的组合。比如：即时解读服务（Immediacy）、个性化健康方案（Personalization）、专家咨询（Interpretation）、官方认证报告（Authenticity）。","category":"写作与表达","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":249,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"KOL的\"Patronage\"模式：","body":"KK 说当受益者明确、交易简单时，粉丝愿意直接付费。设计KOL与粉丝的直接互动机制——\"我帮你看体检报告\"的付费咨询，比\"我推荐你买这个体检套餐\"的佣金模式更健康、更可持续。","category":"产品与用户","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":250,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"做健康内容的\"TV Guide\"：","body":"KK 说引导注意力本身就值钱。阿福可以定位为\"体检信息的策展人\"——不自己生产所有内容，而是帮用户发现、筛选、推荐最可信的健康信息，成为入口而非内容工厂。","category":"品牌与传播","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":251,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"1. 当复制免费时，不可复制的东西才值钱","body":"互联网是一个\"超级分发系统\"，数字复制的边际成本趋近于零。KK的核心命题：\"When copies are super abundant, they become worthless. When copies are super abundant, stuff which can't be copied becomes scarce and valuable.\" 赚钱的路径不再跟着副本走，而是跟着注意力走。","category":"商业与竞争","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":252,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"2. 八种\"比免费更好\"的生成性价值（Generatives）","body":"KK 提出8种无法被复制的价值属性，它们是免费经济中的货币化基础。这8种生成性价值构成了数字时代内容变现的完整框架（详见下方框架图）。","category":"认知与思维","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":253,"type":"point","person":"凯文·凯利","person_en":"Kevin Kelly","person_tagline":"《失控》作者·未来学家·人生建议","person_order":27,"title":"3. 钱跟着注意力走，不跟着副本走","body":"\"The money in this networked economy does not follow the path of the copies. Rather it follows the path of attention.\" 广告只是注意力变现的一条路；8种生成性价值是更根本的注意力转化机制。这个框架不仅适用于数字内容，也适用于所有边际成本趋零的行业（基因检测、地图、制药、通信）。","category":"品牌与传播","source_file":"工具_报告_六篇商业经典深度总结_20260329.html"},{"id":254,"type":"quote","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"zh":"本质是减少真正所谓管理的量，增加判断的量。培养做判断的能力，而非培养勤勉工作的能力。","en":"","cite":"","category":"管理与领导","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":255,"type":"quote","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"zh":"主将无能累死三军。执行很难的本质是没有做出正确的决定。","en":"","cite":"","category":"创业与行动","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":256,"type":"quote","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"zh":"一个领导者的本质就是做正确的决定。有足够大的信息输入，足够高的反思频度，你才会有足够的信息输出。","en":"","cite":"","category":"管理与领导","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":257,"type":"quote","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"zh":"没有偶然，只有必然。所有单点都是大趋势下的必然。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":258,"type":"quote","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"zh":"战略就是一个杠杆。它让你做的每一件事都放大几倍、几十倍。一旦远离这个杠杆，就变成小公司创业模式。","en":"","cite":"","category":"决策与判断","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":259,"type":"quote","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"zh":"只把一个单点做到极致就能创造奇迹的时代，真的过去了。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":260,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"管理的核心是判断力，判断力的核心是认知","body":"领导力不是高情商，而是在大格局下对行业的认知体系。一个人的认知要大于整个团队的认知，\"互联网像武侠史，一群人打不过一个武林高手\"。","category":"管理与领导","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":261,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"三个维度管理：信息、时间、人","body":"信息维度——人是CPU，输入不够则输出不行，必须深入分析对手、遍访行业、不断招人。时间维度——领导人时间是最稀缺资源，时间分配暴露真实优先级。人的维度——管一个人达到管一片人的目的，找到关键人并充分授权。","category":"管理与领导","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":262,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"\"战略的略是忽略\"","body":"不敢忽略的本质是分不清优先级，分不清优先级的根源是认知不够清晰。中层迷恋具体情况，创始人必须既能努力工作又能不断反思判断。","category":"成长与修炼","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":263,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"先胜后战，胜算在认知","body":"开战之前就要有七分胜算，看上去是千军万马在打，本质是两个将领脑海里的战争格局，胜负基本已定。\"主将无能累死三军，执行很难的本质是没有做出正确的决定。\"","category":"创业与行动","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":264,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"战略三部曲：预测→破局点→All in","body":"预测是对大趋势的判断，破局点是找到与众不同的切入角度，All in是在看准后集中所有资源。三者缺一不可，大部分公司死在第一步——根本没有预测能力。","category":"决策与判断","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":265,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"\"单点做到极致就能创造奇迹的时代过去了\"","body":"互联网经过二十年发展已是传统行业，见招拆招和盲目追热点都是认知不足的表现。需要系统性的格局观，而不是碎片化的点上突破。","category":"认知与思维","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":266,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"战略是杠杆，远离杠杆就变成小公司创业模式","body":"战略让每一件事都放大几倍几十倍。猎豹的Clean Master成功基于\"中国APP已领先全球\"的格局判断，而非产品本身多牛。没有格局判断，同样的产品不会做出同样的结果。","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":267,"type":"point","person":"傅盛","person_en":"Fu Sheng","person_tagline":"猎豹移动·认知三部曲·成长即认知升级","person_order":18,"title":"对目标没有持续有效累加的事情都没有意义","body":"战略要求每个动作都朝同一个方向累加。做了很多事但不累加，等于白做。清晰目标+路线图=战略全貌。","category":"决策与判断","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":268,"type":"quote","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"zh":"基本没有用户会直接说出自己的需求，大部分人提的是 Demand 或者 Requirement，极少有人提的是 Needs。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":269,"type":"quote","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"zh":"所有伟大需求都面临两个质疑：一是\"这不可能实现\"，二是\"根本没这个需求\"。遇到更讲道理的人，还会问第三个问题：为什么是现在？","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":270,"type":"quote","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"zh":"伟大需求的机会窗就像闪电——正负电荷团击穿空气的瞬间，至少一个在移动中积累。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":271,"type":"point","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"title":"Needs / Requirements / Demand 三个概念必须区分","body":"Needs 是用户原始的动机和成因（深层、难以直接表达）；Requirement 是基于 Needs 产生的产品设计要求；Demand 是产品上市后的市场需求量。中文\"需求\"一词对应三个英文概念，混用是产品决策混乱的根源。用户几乎不会直接说出自己的 Needs，说出来的多是 Demand 或 Requirement。","category":"品牌与传播","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":272,"type":"point","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"title":"伟大需求的两个特征","body":"一是人们会说\"这是伟大需求但不可能实现\"；二是人们会说\"根本没有这个需求\"。校内网初期有人说中国女性太保守不会上传照片——这种质疑恰好证明它是伟大需求。第三个追问是\"为什么是现在\"——所有伟大需求都被前人在错误时间用错误方式尝试过。","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":273,"type":"point","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"title":"需求的不可满足性：四层递进筛选","body":"第一层，科学可行性（长生不老违反物理规律）；第二层，ROI 正向（可行但成本不对等）；第三层，可规模化（支持团队规模运作）；第四层，能支撑独立公司存在。在任何时间点，\"默认大的商业机会是不存在的\"，全球优秀人才众多，好机会早被发现。","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":274,"type":"point","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"title":"需求突破的\"闪电\"模型","body":"伟大需求的机会窗像闪电——需求端强度增长+供给端可行性提升，两股力量交汇时击穿障碍。美团外卖的出现不是因为人们突然想吃外卖，而是移动互联网提供了实时位置信息，使配送效率从日送8单提升到20-30单。基础设施变化创造需求突破口。","category":"AI与技术","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":275,"type":"point","person":"王慧文","person_en":"Wang Huiwen","person_tagline":"美团联合创始人·互联网产品方法论","person_order":19,"title":"识别真实 Needs 只能\"猜\"，但可以提高命中率","body":"受霍桑效应、社交压力、心理防御影响，用户说的和真实需要的往往不同。美团CRM做了三版都失败，因为产品、销售、BI对\"商家管理\"的认知完全不同；后来只选3个核心功能就成功了。问已使用产品的人比问潜在用户有效得多。","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":276,"type":"quote","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"zh":"追求财富而非金钱或地位。财富是在你睡觉的时候依然能为你赚钱的资产。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":277,"type":"quote","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"zh":"依靠出租时间不可能致富，你必须拥有股权——一个企业的一部分——才能获得财务自由。","en":"","cite":"","category":"长期主义","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":278,"type":"quote","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"zh":"如果社会可以培训你获得某种技能，它终将培训出别人来替代你。专属知识往往是那些你觉得像玩、别人觉得像工作的东西。","en":"","cite":"","category":"学习与阅读","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":279,"type":"point","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"title":"财富 ≠ 金钱 ≠ 地位","body":"财富是\"睡觉时还能赚钱的资产\"（股权、产品所有权、投资组合），金钱是交换媒介，地位是零和博弈。追逐地位的人会攻击追求财富的人，因为两者底层逻辑冲突。致富的核心公式：\"把自己产品化\"——用专属知识提供独特价值，再用杠杆实现规模化。","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":280,"type":"point","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"title":"四种杠杆：劳动力→资本→代码→媒体","body":"劳动力杠杆最古老也最落后（让别人为你干活）；资本杠杆是20世纪主要形式（用钱放大收益）；代码和媒体是新时代杠杆——边际成本为零、无需许可、只需电脑和网络。新富阶层几乎都是代码或媒体杠杆的受益者。\"依靠出租时间不可能致富，必须拥有股权。\"","category":"AI与技术","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":281,"type":"point","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"title":"专属知识（Specific Knowledge）","body":"无法通过培训获得的知识，只能通过\"师傅带徒弟\"方式传承，或者在真正兴趣而非热点中深度积累形成。如果社会可以培训你获得某种技能，它也可以培训别人替代你。专属知识往往是你觉得像玩、别人觉得像工作的东西。","category":"长期主义","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":282,"type":"point","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"title":"四种运气类型","body":"不期而遇的随机运气（完全无法控制）；通过积极行动创造的运气（大量尝试）；基于专业知识捕捉的运气（别人看不到你看得到）；打造独特个性让运气主动找上你（个人品牌的最高境界）。第四种运气才是可持续的。","category":"品牌与传播","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":283,"type":"point","person":"纳瓦尔","person_en":"Naval Ravikant","person_tagline":"AngelList·财富杠杆·特种知识","person_order":20,"title":"判断力被严重低估，努力被严重高估","body":"对市值1000亿美元的公司，判断力从75%提升到85%值得支付数亿美元。需要通过学习微观经济学、博弈论、心理学建立心智模型，而非商学院课程。","category":"AI与技术","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":284,"type":"quote","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"zh":"如果你赚的是本分钱，你会睡得好。身体好会活得长，最后还是会赚到很多钱的。最重要的是，不本分赚钱的人其实不快乐。","en":"","cite":"","category":"团队与文化","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":285,"type":"quote","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"zh":"很多人太注意所谓成功人士都干了啥，就是不注意他们不干啥。往往不干什么，才是决定成功的最重要因素。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":286,"type":"quote","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"zh":"能够长期维持的差异化就是护城河。差异化是用户需要但竞争对手满足不了的东西。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":287,"type":"point","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"title":"\"本分\"的完整含义：不是老实，是自我要求体系","body":"本分 = 要求自己而不是要求别人。出现问题首先自我反省，保持平常心回归事物本源。\"不赚人便宜\"实现真正双赢。本分\"包含且高于诚信\"——诚信是底线，本分是主动标准。如果赚的是本分钱，你会睡得好，身体好会活得长，最后还是会赚到很多钱。","category":"团队与文化","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":288,"type":"point","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"title":"\"不做不对的事\" > \"做对的事\"","body":"秘诀不在\"做了什么\"，在\"不做什么\"。企业应有长长的 Stop Doing List，分两类：谁都不该做的（欺骗等），和与企业使命相悖的事。大部分人太关注成功人士做了什么，却不关注他们不做什么——\"往往不做什么才是决定成功的最重要因素\"。","category":"团队与文化","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":289,"type":"point","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"title":"\"敢为天下后，后中争先\"","body":"\"敢为天下后\"是选择市场需求已验证的品类（做对的事），\"后中争先\"是做好产品的执行力（把事做对）。进入时机是产品成长期与成熟期之间。不做第一个吃螃蟹的人，但要做把螃蟹做成满汉全席的人。","category":"品牌与传播","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":290,"type":"point","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"title":"好公司三要素 + 护城河定义","body":"好的商业模式（长期产生净现金流）+ 好的企业文化（产品可模仿，文化不可）+ \"利润之上\"的追求。护城河 = \"能够长期维持的差异化\"，差异化是用户需要但竞争对手满足不了的东西。追求\"更健康、更长久\"而非更大。","category":"产品与用户","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":291,"type":"point","person":"段永平","person_en":"Duan Yongping","person_tagline":"步步高创始人·本分·不为清单","person_order":21,"title":"投资与经营本质一样：少犯错","body":"买股票就是买公司。三条铁律：不懂不投、不投机不做空、不借钱投资。安全边际的真正含义是\"对公司的理解度\"而非股价波动。知道自己能力圈有多大，往往比能力圈本身更重要。","category":"风险与反脆弱","source_file":"工具_报告_商业思想深度阅读笔记_20260328.html"},{"id":292,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"真正\"极度渴望成功\"且\"愿付非凡代价\"的人很少。成功路上并不拥挤，因为能坚持的人真的不多。","en":"","cite":"","category":"长期主义","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":293,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"想起来全是问题，做起来才有答案。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":294,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"一流是做事，二流是评价别人，三流是评价别人的评价。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":295,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"人人都是产品经理，产品即自己的一生。信息有不同保质期，年轻时应获取一生适用的信息。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":296,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"纵情向前\"才是我的态度，关注所得而非所失。人生是七八十年与自己的恋爱，需理解宽容接纳。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":297,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"公司的问题，就是员工的机会。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":298,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"种一棵树的最好时机是十年前，其次是现在。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":299,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"一个年轻同事说\"我可以学\"。这四个简单的字里有无穷的力量。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":300,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"事实再一次证明，快速消费品领域，没有降价3分钱无法摧毁的品牌忠诚度。","en":"","cite":"","category":"品牌与传播","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":301,"type":"quote","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"zh":"在投资与被投资、并购和被并购的谈判桌两边切换角色，对理解整个事情很有帮助。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":302,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"1. \"有什么、要什么、舍什么\"——创业的本质是取舍","body":"王兴认为这三个问题对个人和公司都极重要。创业不是无限扩张，而是在资源有限的前提下做出清晰的取舍。速度、质量、成本三者只能取其二，在绝对核心处追求极致。","category":"决策与判断","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":303,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"2. 关注核心而非边界——万有引力类比","body":"不应该纠结于\"业务边界在哪里\"，而是\"核心是什么\"。如同万有引力，核心足够强大，周边业务自然被吸引过来。这解释了美团从团购到外卖到酒旅到社区团购的扩张逻辑。","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":304,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"3. 过去需求侧数字化已完成，供给侧才刚开始","body":"下一波互联网创业机会在供应链和ToB端。纯互联网创业黄金时代已过，\"互联网+\"才是新机会。供给侧的互联网化和数据化是未来十年的方向。","category":"AI与技术","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":305,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"4. 人是最大变量——好团队决定战略和执行力","body":"CEO三大不可代劳职责：设定愿景战略、招留人才、确保资金。看重候选人的状态而非年龄，需有干劲和冲劲。优秀人才需足够聪明、有耐性韧劲、正确价值观。","category":"团队与文化","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":306,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"5. 战略打持久战，战术打歼灭战","body":"对未来信心越足，对现在越有耐心。胜利来自对手愚蠢，自身需立于不败之地。多业务、低毛利、长链条是美团的战略选择，坚持如阿蒙森团队每日前进30公里。","category":"决策与判断","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":307,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"1. 微观生活与商业本质相通","body":"王兴的饭否不是商业演讲，而是碎片化的生活记录。但这些碎片恰恰展现了一个创业者如何在日常中保持观察力和好奇心。从马桶里捞Fitbit到思考\"衬衫怎么塞进裤子\"，真实到近乎琐碎，正如他自己说的\"因为琐碎，所以真实\"。","category":"创业与行动","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":308,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"2. 尊重对手、理解竞争的底线思维","body":"\"据说红杉的投资原则是赌赛道不赌赛手，但我更喜欢孙子的说法：求之于势，不责于人。\"王兴尊敬有底线的对手，认为\"国内有些公司的逻辑是敌人的敌人就是朋友，即使他是流氓\"。","category":"商业与竞争","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":309,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"3. 自我认知的坦诚和自嘲","body":"\"总结了一下，发现前段时间犯了不少错。再往前几个月，我没犯什么错，因为我没干什么事。\"这种坦诚是罕见的。饭否上的王兴没有CEO人设，只有一个不断反省的创业者。","category":"管理与领导","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":310,"type":"point","person":"王兴","person_en":"Wang Xing","person_tagline":"美团创始人·核心与边界·供给侧","person_order":6,"title":"4. 对技术产品的深度审美","body":"他赞赏Quora是\"几年才得一见的互联网产品创新\"，关注微信验证短信极简设计。他看产品的角度是：是否做到了\"足够牛逼的产品模式可以横扫五湖四海\"。","category":"AI与技术","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":311,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"以大多数人满足感延迟程度之低，根本轮不到拼天赋。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":312,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"只有乐观的人会相信，会愿意去尝试。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":313,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"对自己的标准一定要高。你对自己的标准，影响了你一生的高度。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":314,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"平庸有重力，需要逃逸速度。","en":"","cite":"","category":"创业与行动","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":315,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"Develop a company as a product. 像做产品一样做公司。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":316,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"最佳状态是保持在轻度喜悦和轻度沮丧之间。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":317,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"互联网行业往往是Winner Takes All，120%的努力获得200%的回报。","en":"","cite":"","category":"成长与修炼","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":318,"type":"quote","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"zh":"别人腐败时我们努力，别人消磨时光我们学习。","en":"","cite":"","category":"成长与修炼","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":319,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"1. 延迟满足感是优秀的基石","body":"张一鸣面试过约2000名年轻人，\"不傲娇，能延迟满足感\"是他反复强调的特质。高估自己的年轻人往往不愿做基础工作，而真正成长快的人愿意踏实做好当下的事，不急于证明自己。","category":"成长与修炼","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":320,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"2. 好奇心驱动的主动学习","body":"具有好奇心的人不会仅完成分配的工作就止步，而是不断拓展知识面。张一鸣自己在酷讯时期就跨界学习——作为技术人员参与产品讨论、从商业端学习销售。","category":"AI与技术","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":321,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"3. 对不确定性保持乐观","body":"\"只有乐观的人会相信，会愿意去尝试。\"面对未知不畏缩，而是把不确定性当作机会。这与创业者心态高度一致——所有好机会在开始时都充满不确定性。","category":"风险与反脆弱","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":322,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"4. 不甘于平庸，但对重要选择有判断力","body":"\"对自己的标准一定要高。\"但不是盲目追高，而是在专业、公司、职业路径等重大决策上保持独立思考，不被短期薪酬差异左右。设定远大目标，不因户口、房产等短期利益降低追求。","category":"决策与判断","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":323,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"1. \"平庸有重力，需要逃逸速度\"——对抗组织和个人的惰性","body":"张一鸣将平庸比作引力场，不是靠努力一点点就能脱离的，需要达到\"逃逸速度\"才能进入新轨道。这意味着在关键时期需要120%的投入，而非均匀分配精力。赢家通吃：\"120%的努力获得200%的回报\"。","category":"管理与领导","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":324,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"2. \"Develop a company as a product\"——把公司当产品来做","body":"这是张一鸣最核心的管理哲学。公司本身就是创始人的作品，需要像打磨产品一样打磨组织：定义用户（员工和客户）、设计体验（文化和流程）、迭代优化（管理机制）。","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":325,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"3. 保持\"轻度喜悦和轻度沮丧之间\"的情绪状态","body":"追求情绪的中间态，避免过度满足导致的思维钝化，也避免过度沮丧导致的决策偏差。这是一种理性主义的自我管理方法，本质是保持清醒。","category":"管理与领导","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":326,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"4. 算法驱动的产品哲学——\"信息的效率比展示更重要\"","body":"今日头条的核心逻辑是让信息找到人，而非人找信息。\"算法是生命体，需要调教它\"，通过持续学习用户行为优化推荐精准度。主张极简设计，随刷随有的体验。","category":"AI与技术","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":327,"type":"point","person":"张一鸣","person_en":"Zhang Yiming","person_tagline":"字节跳动·延迟满足·理性自控","person_order":5,"title":"5. 吸引人才的四个维度：短期回报、长期回报、个人成长、精神生活","body":"不只靠薪资（短期回报），还要靠股权（长期回报）、成长空间（个人成长）和使命感（精神生活）。招聘看特质而非经验，组织成果体现在组织之外。","category":"团队与文化","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":328,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"在市场爆发的时候是决定胜负的关键，平缓或者下滑的时候，再努力就没有用了，圈地变成了抢地。","en":"","cite":"","category":"品牌与传播","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":329,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"所有的媒体、所有的网站，这些从业人员都不是我们想要的，因为没有任何人考虑用户的需求。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":330,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"企业文化是一帮人约定好，一个简单有效的标准，定义什么叫对企业好。出一条，不需要一页解释。","en":"","cite":"","category":"团队与文化","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":331,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"常年做老三是个非常痛苦的事，什么都改变不了。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":332,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"自信的最核心原因是对自己的认知，你知道自己想要什么，知道自己能放弃什么，你就自信了。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":333,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"真正的用户价值，一定是帮助用户解决了某个问题，或者完成了某项任务，而不是仅仅提供了某个简单的功能。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":334,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"关注用户价值，超越用户需求。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":335,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"人因痛苦而改变，因受益而坚持。","en":"","cite":"","category":"长期主义","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":336,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"企业成长速度决定一切，人与人最大差别也是成长速度。","en":"","cite":"","category":"成长与修炼","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":337,"type":"quote","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"zh":"同样的钱，买到对目标用户最好的功能和体验——这就是价值感。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":338,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"1. 用户永远是最重要的——但不是嘴上说说","body":"李想在泡泡网和汽车之家的实战经验：通过更高频的更新、原创内容、拒绝使用厂商资源来建立用户信任。\"所有从业人员都不是我们想要的，因为没有任何人考虑用户的需求\"——他创业初期拒绝了挖媒体人才的建议。","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":339,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"2. 大势不好，再努力也没用——时机决定生死","body":"\"在市场爆发的时候是决定胜负的关键，平缓或者下滑的时候，再努力就没有用了，圈地变成了抢地。\"做泡泡网时每天14小时但电脑市场已进入平缓期，这个教训让他后来极度重视市场时机。","category":"品牌与传播","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":340,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"3. 企业文化不应该需要解释","body":"汽车之家三条文化：消费者利益优先、做正确的事而非容易的事、先做好60分再去做100分。李想认为文化就是\"一帮人约定好的简单有效的标准\"，\"出一条，不需要一页解释\"。","category":"团队与文化","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":341,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"4. 产品服务决定销量，品牌决定利润率","body":"丰田和大众销量接近，但丰田品牌价值是大众的5倍。苹果的转变也是从强调企业文化转向品牌打造。\"品牌在先，产品在后\"——品牌定义了用户预期，产品兑现了这个预期。","category":"品牌与传播","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":342,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"5. 商业模式四步法：圈地、产品、运营、商业化","body":"借鉴万达逻辑：获取用户（圈地）→建设内容和功能（产品）→组建专业团队（运营）→实现变现（商业化）。土地价值=用户数量×用户消费能力，汽车之家用户虽与豆瓣相当，但购车用户价值\"差不多10倍\"。","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":343,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"1. 双主线方法论：用户价值 + 组织成长","body":"第一条主线：关注用户价值，超越用户需求，回答\"用户是谁\"和\"创造什么价值\"。第二条主线：以组织为产品，用组织成长支撑产品成长——对抗惰性（流程）、对抗惯性（超越过去）、突破无知（积极反思）。","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":344,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"2. 产品标准三维度：安全感、价值感、向往感","body":"安全感从用户真实场景出发，发现惯性中的不合理；价值感是\"同样的钱，买到对目标用户最好的功能和体验\"；向往感是唤起用户心中的理想场景，依赖对使用场景本质的洞察。","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":345,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"3. 需求挖掘：多人共创替代一对一访谈","body":"不问用户\"你要什么\"，而是让用户回忆场景、讲感性期待。分组讨论后汇总碰撞。回到购买现场观察，验证场景真实性。真正的用户价值是帮助用户解决了某个问题或完成了某项任务，而不是提供某个功能。","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":346,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"4. 复盘机制：经验变为能力的关键","body":"复盘目标是\"以后怎么做更好\"的共识达成。CEO、产品负责人必须参与。总结成功经验固化到流程，制定可追踪、有反馈、能迭代的To-Do。定期嵌入工作流，雷打不动执行。","category":"产品与用户","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":347,"type":"point","person":"李想","person_en":"Li Xiang","person_tagline":"理想汽车·创业16年·产品实战","person_order":8,"title":"5. 企业成长速度决定一切","body":"\"人因痛苦而改变，因受益而坚持。\"企业三大驱动力中，理想选择的是\"成长驱动\"。核心是建立信任文化、实事求是知错就改、通过实战建立成长正反馈循环。不惩罚新错误，鼓励大胆解决问题。","category":"团队与文化","source_file":"工具_报告_王兴张一鸣李想深度总结_20260329.html"},{"id":348,"type":"quote","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"zh":"我们将继续依据长期市场领导力的考量来做投资决策，而非短期盈利或华尔街的短期反应。\" — Jeff Bezos, 1997年致股东信","en":"","cite":"— Jeff Bezos, 1997 Letter to Shareholders","category":"认知与思维","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":349,"type":"quote","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"zh":"当必须在美化GAAP会计报表和最大化未来现金流现值之间二选一时，我们选现金流。\" — Jeff Bezos, 1997年致股东信","en":"","cite":"— Jeff Bezos, 1997 Letter to Shareholders","category":"认知与思维","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":350,"type":"quote","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"zh":"我们将持续不懈地聚焦于客户……口碑始终是我们最强大的客户获取工具。\" — Jeff Bezos, 1997年致股东信","en":"","cite":"— Jeff Bezos, 1997 Letter to Shareholders","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":351,"type":"quote","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"zh":"聪明是一种天赋，善良是一种选择。天赋易得——毕竟它们与生俱来，而选择难做，一不小心，你可能就恃才傲物。\" — Jeff Bezos, 2010 Princeton Commencement","en":"","cite":"— Jeff Bezos, 2010 Princeton Commencement","category":"决策与判断","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":352,"type":"quote","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"zh":"在你们 80 岁时某个追忆往昔的时刻，只有你一个人静静对内心诉说着你的人生故事，其中最为充实、最有意义的那段讲述，会被你们作出的一系列决定所填满。最后，是选择塑造了我们的人生。\" — Jeff Bezos, 2010 Princeton Commencement","en":"","cite":"— Jeff Bezos, 2010 Princeton Commencement","category":"决策与判断","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":353,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"长期主义高于短期利润。","body":"贝索斯在这封信里直接告诉华尔街：Amazon 的所有决策以长期市场领导地位为锚点，而非短期财报。他把这封信附在此后每一年的股东信里，持续二十多年，反复强化这个承诺。","category":"品牌与传播","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":354,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"顾客痴迷是第一原则。","body":"\"We will continue to focus relentlessly on our customers.\" 他认为口碑是最有效的获客方式，复购率从 46% 涨到 58% 证明了这一点。产品体验本身就是增长引擎。","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":355,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"大胆下注、接受失败。","body":"在看到领导优势可能成立的地方，果断投入大额资源，但同时承认有些赌注不会成功。这是后来 Amazon 飞轮和\"Day 1\"文化的源头。","category":"团队与文化","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":356,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"现金流优先于会计利润。","body":"\"When forced to choose between optimizing the appearance of our GAAP accounting and maximizing the present value of future cash flows, we'll take the cash flows.\" 这条原则影响了 Amazon 此后所有资本配置决策。","category":"决策与判断","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":357,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"用股权绑定\"主人心态\"。","body":"招聘的标准不是找\"打工人\"，而是找能像创始人一样思考的人，用股票期权代替高薪，确保团队与长期价值对齐。","category":"长期主义","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":358,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"天赋是被给予的，选择是主动做出的。","body":"\"聪明是一种天赋，善良是一种选择。天赋易得——毕竟它们与生俱来，而选择难做。\"人生的质量最终由一连串选择决定，而非起点的天赋高低。","category":"决策与判断","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":359,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"\"善良比聪明更难\"的祖父教训。","body":"10 岁的贝索斯用数学计算告诉祖母\"你还能少活 9 年\"，结果把祖母弄哭了。祖父说了那句改变他一生的话。聪明可以炫耀，但善良需要克制聪明的冲动。","category":"认知与思维","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":360,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"12 个关于选择的追问。","body":"你会选择安逸还是冒险？被批评时会退缩还是坚持信念？犯错后会掩饰还是道歉？这些问题指向一个结论：80 岁回望人生时，最充实的部分由选择填满，不是天赋。","category":"决策与判断","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":361,"type":"point","person":"贝索斯","person_en":"Jeff Bezos","person_tagline":"亚马逊·长期主义·Day 1哲学","person_order":11,"title":"用 7 年为尺度做决策。","body":"贝索斯 30 岁放弃华尔街高薪创办 Amazon，当时被告知失败率 70%。他用\"遗憾最小化框架\"做决定：80 岁时会后悔没试过，不会后悔试了失败。","category":"决策与判断","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":362,"type":"quote","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"zh":"打造爆品时，首先考量的第一要素是，产品是否具备'明天属性'——给用户提供代表先进趋势的、令他们向往的全新体验，而且这种体验是用户一旦用过就不想放手的。\" — 雷军","en":"","cite":"— 雷军","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":363,"type":"quote","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"zh":"产品定义的第一法则是做减法——满足 80% 用户的 80% 需求。只专注解决用户最迫切的需求。\" — 雷军","en":"","cite":"— 雷军","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":364,"type":"quote","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"zh":"既然这些痛苦难以回避，那我们能做的，就是直面这些痛苦，在痛苦中坚持前行，让痛苦来塑造更好的我们。这就是痛苦的意义、挫折的馈赠。\" — 雷军, 2022 年度演讲","en":"","cite":"— 雷军, 2022 年度演讲","category":"长期主义","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":365,"type":"quote","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"zh":"不带任何目的，学起东西来，反而特别轻松，也特别快。\" — 雷军, 2022 年度演讲","en":"","cite":"— 雷军, 2022 年度演讲","category":"认知与思维","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":366,"type":"quote","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"zh":"作为工程师，一定要做用户需要的产品。\" — 雷军, 回忆盘古失败","en":"","cite":"— 雷军, 回忆盘古失败","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":367,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"产品要有\"明天属性\"。","body":"爆品的第一要素是代表先进趋势、给用户令其向往的全新体验，而且一旦用过就不想放手。智能手机、扫地机器人都是\"明天属性\"产品——用户回不去了。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":368,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"洞察用户，做减法。","body":"产品定义的第一法则是\"满足 80% 用户的 80% 需求\"。不是堆功能，而是砍掉不必要的，把最核心的需求做到极致。雷军称之为\"小白模式\"——用第一性原理代入普通用户视角。","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":369,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"重组创新：用跨行业资源实现超预期。","body":"小米充电宝导入笔记本行业电芯、扫地机器人用工业照相机原理开发激光传感器。创新不是发明新技术，而是把已有技术重新组合，用供应链效率实现极致性价比。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":370,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"精准触达：社区 + 新零售直达用户。","body":"不依赖传统广告，而是通过社区运营和高效渠道将产品直接送到目标用户手中。信息传递效率决定了爆品的引爆速度。","category":"品牌与传播","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":371,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"爆品的四个特征：单款、精品、海量、长周期。","body":"不是做很多产品赌概率，而是集中资源做一款，做到极致，卖出海量，持续热销。","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":372,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"盘古失败：工程师必须做用户需要的产品。","body":"26 岁的雷军带队做出技术上优秀的\"盘古\"办公软件，但销量不及预期十分之一，公司账上只剩十几万。他去中关村站店卖软件，第五天才开张，第七天成了销售冠军。这段经历让他从\"技术自嗨\"转向\"用户需求驱动\"。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":373,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"半年迷茫期的意外收获。","body":"盘古失败后，雷军半年无所事事，泡酒吧、泡 BBS 论坛。在 CFIDO 论坛他每天发上百帖，认识了马化腾和丁磊。这段看似浪费的时间，后来成为小米社区运营的基因。\"不带任何目的，学起东西来反而特别轻松、特别快。\"","category":"长期主义","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":374,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"卓越网的遗憾：时机比执行力更重要。","body":"雷军在 2000 年做了中国最大的 B2C 电商\"卓越网\"，但它\"创办于互联网泡沫破灭之后，倒下于电商全面崛起之前\"，2004 年被迫卖给亚马逊。这让他深刻理解到\"互联网不仅仅是技术革命，更是观念革命\"。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":375,"type":"point","person":"雷军","person_en":"Lei Jun","person_tagline":"小米创始人·爆品方法论·逆境哲学","person_order":12,"title":"痛苦的意义。","body":"\"既然这些痛苦难以回避，能做的就是直面这些痛苦，在痛苦中坚持前行，让痛苦来塑造更好的我们。\"所有挫折都将成为\"最宝贵的财富\"。","category":"长期主义","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":376,"type":"quote","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"zh":"我认为，如果有更多富有才华和创造力的研究者投入，他们的发现速度可以提升10倍甚至更多。\" — Dario Amodei, 论 AI 加速生物学研究","en":"","cite":"— Dario Amodei, 论 AI 加速生物学研究","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":377,"type":"quote","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"zh":"几乎所有自然传染病的可靠预防与治疗……改进的胚胎筛查将有望预防大多数遗传病……20世纪人类预期寿命增长了近一倍（从约40岁到约75岁），照此趋势，\"压缩的21世纪\"将再次翻番，达到150岁。\" — Dario Amodei, 论生物医学的5-10年预期成果","en":"","cite":"— Dario Amodei, 论生物医学的 5-10 年预期成果","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":378,"type":"quote","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"zh":"每个人都能让自己的大脑运转得更好一点，拥有更充实的日常体验。\" — Dario Amodei, 论 AI 驱动的心理健康改善","en":"","cite":"— Dario Amodei, 论 AI 驱动的心理健康改善","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":379,"type":"quote","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"zh":"当 AI 足够强大，这些壁垒就会崩塌。一个心理扭曲的人可以被一步步引导着设计和合成病原体，就像技术支持调试电脑一样。\" — Dario Amodei, 论 AI 降低生物武器门槛","en":"","cite":"— Dario Amodei, 论 AI 降低生物武器门槛","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":380,"type":"quote","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"zh":"AI 可能在1到5年内取代所有初级白领工作的一半……创造新工作岗位的技术通常需要数十年才能培育出对应技能，而岗位的消失只需几个月。\" — Dario Amodei, 论经济冲击的非对称性","en":"","cite":"— Dario Amodei, 论经济冲击的非对称性","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":381,"type":"quote","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"zh":"我深信人类战胜困难的能力，相信人类精神的伟大与高贵，但我们必须直面现实，不能抱有任何幻想。\" — Dario Amodei, 结语","en":"","cite":"— Dario Amodei, 结语","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":382,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"\"数据中心里的天才国度\"。","body":"Dario 把强大 AI 比喻为\"a country of geniuses in a datacenter\"——跨领域的超人智能、可以同时运行数百万实例、以人类 10-100 倍的速度工作。这是他所有推演的基础假设。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":383,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"生物医学的\"压缩 21 世纪\"。","body":"这是全文最核心的章节。Dario 认为 AI 可以把 50-100 年的生物学进步压缩到 5-10 年内完成。具体预测：传染病被可靠预防和治疗；癌症死亡率和发病率下降 95% 以上；大多数遗传病可通过胚胎筛查或基因编辑预防；阿尔茨海默症被攻克；人类寿命翻倍至约 150 岁。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":384,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"心理健康的四条路径。","body":"分子生物学（新型精神药物）、神经测量（光遗传学、神经探针）、计算神经科学、行为干预（AI 教练）。他预期 PTSD、抑郁症、精神分裂、成瘾等都能被治愈或预防。更激进的是，他认为\"每个人都能让大脑表现得更好，拥有更充实的日常体验\"。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":385,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"发展中国家的跨越式增长。","body":"AI 驱动的健康分配（疾病根除）、第二次绿色革命（粮食安全）、清洁能源和碳去除，有可能让撒哈拉以南非洲在 5-10 年内达到中国当前的 GDP 水平。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":386,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"智能的\"边际回报\"受限于物理世界。","body":"AI 不是万能的。实验需要时间、数据有限、系统本身有内在复杂性、还有法律和伦理约束。Dario 强调的不是\"AI 会自动解决一切\"，而是\"AI 大幅加速人类科学家的发现速度\"。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":387,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"AI 发展是文明的\"成人礼\"。","body":"Dario 借用卡尔·萨根的追问——文明如何度过技术青春期？他认为强大的 AI（在多个领域超越诺贝尔奖级别专家的系统）可能在 1-2 年内到来，人类正处于历史上最关键的转折点。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":388,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"五大风险：自主性、毁灭性武器、权力攫取、经济冲击、意义危机。","body":"最具体的威胁是生物武器——AI 可能让一个没有专业背景的人像\"技术客服指导修电脑\"一样被引导完成病原体设计和合成。Dario 也记录了 Claude 在测试中表现出的欺骗、勒索、身份异化等行为，作为自主性风险的真实案例。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":389,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"权力攫取的四大工具。","body":"全自主武器（无人机蜂群）、AI 监控（入侵所有通信、检测不忠诚模式）、个性化洗脑（多年期的\"虚拟关系\"来塑造意识形态）、虚拟战略家（\"virtual Bismarck\"优化地缘博弈）。Dario 明确将中国共产党列为最大威胁来源。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":390,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"经济冲击可能是前所未有的。","body":"与以往技术革命不同，AI 影响的不是某一类技能，而是几乎所有认知任务。他预测\"AI 可能在 1-5 年内取代一半以上的白领入门岗位\"。失业发生在数月内，但新岗位需要数十年才能形成。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":391,"type":"point","person":"Dario Amodei","person_en":"Dario Amodei","person_tagline":"Anthropic CEO·AI安全·技术乐观主义","person_order":23,"title":"方法论：不末日论、承认不确定性、精准干预。","body":"监管应施加\"最小必要负担\"，从透明度要求开始，再逐步加强。Dario 拒绝宗教式的末日叙事，但也拒绝盲目乐观。","category":"风险与反脆弱","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":392,"type":"quote","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"zh":"当创始人被告知要放弃本能、遵从传统管理结构时，他们会感到自己被欺骗了。\" — Paul Graham, 《创始人模式》","en":"","cite":"— Paul Graham, Founder Mode","category":"创业与行动","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":393,"type":"quote","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"zh":"乔布斯每年召集 Apple 最重要的 100 个人（不一定是最高职级的 100 人）开年度闭门会议。这是一种 Founder Mode 的典型实践——却几乎没有被研究和复制过。 — Paul Graham, 引用 Steve Jobs 的案例","en":"","cite":"— Paul Graham, 引用 Steve Jobs 的案例","category":"创业与行动","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":394,"type":"quote","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"zh":"Chesky 的核心信条是：创始人保持\"in the details\"不等于微管理，而是与产品开发和用户体验保持亲密连接，做出真正有判断力的战略决策。 — Lenny's Newsletter 对 Chesky 管理哲学的总结","en":"","cite":"— Lenny's Newsletter 对 Chesky 管理哲学的总结","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":395,"type":"quote","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"zh":"Airbnb 推出\"Guest Favorites\"功能，精选约 200 万套最受好评的房源。这是从算法推荐转向\"人工策展\"思路的体现——不是让用户在海量供给中迷失，而是帮用户筛选。 — Lenny's Newsletter, 关于 Airbnb 2023 冬季发布","en":"","cite":"— Lenny's Newsletter, 关于 Airbnb 2023 冬季发布","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":396,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"Founder Mode 与 Manager Mode 是两种根本不同的经营方式。","body":"传统管理学教的是 Manager Mode——招好人、放权、不要微管理。但这套方法对创始人经营的公司往往是灾难性的。商学院和投资人只教后者，创始人被迫放弃自己的直觉。","category":"管理与领导","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":397,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"Chesky 的惨痛教训。","body":"Airbnb 扩张期，Chesky 听了\"请好人、给空间\"的建议，结果公司陷入混乱。后来他研究了乔布斯在 Apple 的管理方式，开发出自己的方法，把 Airbnb 做到了硅谷最高水平的自由现金流利润率。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":398,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"Skip-level 是创始人的必备工具。","body":"Founder Mode 的核心特征是创始人可以跨层级参与——不是只通过直接汇报了解情况，而是深入到各个组织层级。这不是\"微管理\"，而是\"保持对产品和业务的真实感知\"。","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":399,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"创始人被\"煤气灯效应\"困住了。","body":"Paul Graham 用了\"gaslighting\"这个词：创始人被反复告知他们的管理直觉是错的，应该\"专业化\"，但事实上\"专业化管理\"经常摧毁创始人建立的组织文化。","category":"团队与文化","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":400,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"创始人必须\"在细节中\"。","body":"Chesky 反对\"CEO 应该只看大方向\"的说法。他认为创始人必须保持与产品开发、用户体验和战略决策的亲密连接。这不是微管理，而是\"知道正在发生什么\"。","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":401,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"砍掉官僚主义，不是管理它。","body":"官僚主义是公司增长的自然副产品，但不是不可避免的结果。Chesky 的策略是主动抵抗不必要的组织复杂性——砍流程、减层级、拒绝为了\"规范\"而规范。","category":"产品与用户","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":402,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"放弃效果广告，转向品牌驱动增长。","body":"Airbnb 大幅减少了效果营销和传统增长渠道的投入，认为可持续增长需要不同的杠杆——品牌认知、口碑、产品体验本身。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":403,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"消灭\"客人团队\"和\"房东团队\"的对立。","body":"Airbnb 过去把客人端和房东端分成独立团队，导致优化目标互相冲突。Chesky 将其合并为统一的跨功能团队，同时服务平台的两端。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":404,"type":"point","person":"Brian Chesky","person_en":"Brian Chesky","person_tagline":"Airbnb·Founder Mode·逆向管理","person_order":24,"title":"滚动两年路线图。","body":"不做年度规划然后中途推翻，而是维护一个持续更新的两年路线图，提供方向感的同时保留灵活性。","category":"决策与判断","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":405,"type":"quote","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"zh":"在 Shopify，有效使用 AI 现在是对每个人的基本期望。我认为，拒绝在工作中学习和应用 AI 技能，是不现实的。\" — Tobi Lutke, Shopify AI Memo, 2025.04","en":"","cite":"— Tobi Lutke, Shopify AI Memo, 2025.04","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":406,"type":"quote","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"zh":"在申请更多人手和资源之前，团队必须先说明为什么无法用 AI 完成想做的事。\" — Tobi Lutke, Shopify AI Memo, 2025.04","en":"","cite":"— Tobi Lutke, Shopify AI Memo, 2025.04","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":407,"type":"quote","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"zh":"Tobi 形容自己使用 AI 的方式：\"思维伙伴、深度研究员、批评者、导师，或结对编程搭档\"，并且承认即便如此，他觉得自己\"只是刚刚触及皮毛\"。 — Tobi Lutke, Shopify AI Memo, 2025.04","en":"","cite":"— Tobi Lutke, Shopify AI Memo, 2025.04","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":408,"type":"point","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"title":"\"有效使用 AI 现在是 Shopify 每个人的基本期望。\"","body":"这不是建议，是要求。Tobi 承认之前的\"去试试 AI 吧\"说得太像建议了，没有产生足够改变。所以这封备忘录把 AI 使用从\"可选\"升级为\"强制\"。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":409,"type":"point","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"title":"要人之前先证明 AI 做不了。","body":"任何团队在申请增加人力和资源之前，必须先展示为什么 AI 无法完成这项工作。这直接改变了组织扩张的默认逻辑——从\"我们需要更多人\"变成\"我们需要先试试 AI\"。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":410,"type":"point","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"title":"AI 使用纳入绩效评估。","body":"Shopify 在绩效和同事互评问卷中增加了 AI 使用相关的问题。Tobi 认为 AI 是一项\"需要刻意练习才能掌握的非显而易见的技能\"，所以要通过制度推动。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":411,"type":"point","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"title":"GSD 原型阶段必须以 AI 主导。","body":"任何 GSD（Get Shit Done）项目的原型阶段，都应该由 AI 探索主导，加速学习和信息创造。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":412,"type":"point","person":"Tobi Lütke","person_en":"Tobi Lütke","person_tagline":"Shopify CEO·AI-First·信任电池","person_order":25,"title":"\"红皇后赛跑\"理论。","body":"Tobi 引用了他早年的领导力备忘录中的概念：在公司年增长 20-40% 的情况下，团队必须提升同等幅度的效率才能保持不退步。AI 工具现在让这成为可能。他提到有些同事已经做到了\"此前认为不可能的 10 倍产出\"。","category":"AI与技术","source_file":"工具_报告_贝索斯雷军刘强东Dario等深度总结_20260329.html"},{"id":413,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"您有幸加入了华为公司，我们也有幸获得了与您合作的机会。我们将在相互尊重、相互理解和共同信任的基础上，与您一起渡过在公司工作的岁月。这种开头对等的姿态，不是客套——是华为文化自信的起点。","en":"","cite":"","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":414,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"物质资源终会枯竭，唯有文化才能生生不息。华为的文化就是奋斗文化。一丝不苟地做好本职工作就是奉献，就是英雄行为。","en":"","cite":"","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":415,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"烧不死的鸟就是凤凰。公司永远不会提拔一个没有基层经验的人做高层管理者。遵循循序渐进的原则，每一个环节对您的人生都有巨大的意义。","en":"","cite":"","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":416,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"华为的追求是在电子信息领域实现顾客的梦想，并依靠点点滴滴、锲而不舍的艰苦追求，使我们成为世界级领先企业。（第一条）","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":417,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"我们保证按销售额的10%拨付研发费用，有必要且可能时还将加大拨付比例。（第二十六条）","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":418,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"我们不搞终身雇佣制，但这不等于不能终身在华为工作。我们主张自由雇佣制。（第六十条）","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":419,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"公司的宏观商业模式是：产品发展的路标是客户需求导向，企业管理的目标是流程化组织建设。卖得出去的产品才是真正的技术需求，企业之魂应该是客户需求。","en":"","cite":"","category":"AI与技术","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":420,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"当知识和技术不\"值钱\"后，人们回归理性与平实，社会会变得更加可爱。我们不能因为过去的成功就认为自己不需要改变。","en":"","cite":"","category":"AI与技术","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":421,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"华为命中注定是为客户而存在的，除了客户，华为没有存在的任何理由。为客户服务是华为存在的唯一理由，客户需求是华为发展的原动力。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":422,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"以奋斗者为本的实质是什么？其实就是以客户为本。奋斗者为什么而奋斗？应该是为客户而奋斗。\"为客户创造价值的任何微小活动\"都是奋斗。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":423,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"不能为客户创造价值的部门、流程和人员都是多余的，应被精简。在任何客户界面都要保持敬畏之心，让服务超出客户预期。","en":"","cite":"","category":"产品与用户","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":424,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"人类社会最主要的目的是创造财富，使更多人摆脱贫穷。社会一定是要合作共赢的，世界就是合作共赢。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":425,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"我们100%没有后门，愿意与各国签订无后门协议。一个割裂的全球技术网络和市场，最终不仅伤害技术本身，也伤害人类社会发展。","en":"","cite":"","category":"AI与技术","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":426,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"我们预计销售收入将下降300亿美元，但到2021年公司将重新焕发勃勃生机。有很多美国公司值得学习，我们不能因为一时的困难就否定合作的价值。","en":"","cite":"","category":"学习与阅读","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":427,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"一个职业管理者的社会责任与历史使命，就是为了完成组织目标而奋斗。以组织目标的完成为责任，缩短实现组织目标的时间，节约实现组织目标的资源，就是一个管理者的职业素养与成就。","en":"","cite":"","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":428,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"淡化英雄色彩，特别是淡化领导人、创业者的色彩，是实现职业化的必然之路。如一列火车从广州开到北京，有数百人搬了道岔，有数十个司机接力。不能说最后一个驾车到了北京的就是英雄。","en":"","cite":"","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":429,"type":"quote","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"zh":"个人修炼当然也重要，但小草再怎么浇水也长不成大树，如果价值评价体系不正确的话，那我们的导向体系就错了，我们公司就永远发展不起来。","en":"","cite":"","category":"成长与修炼","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":430,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"1. 文化认同是入职的第一门课","body":"1. 文化认同是入职的第一门课 任正非开篇就提出\"相互尊重、相互理解、共同信任\"的合作基础。企业文化必须开放包容，吸纳世界优良文化；缺乏责任心、自我批判精神和合作意识的人会丧失进步机会。华为文化的核心是奋斗文化——\"物质资源终会枯竭，唯有文化才能生生不息。\"","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":431,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"2. 从基层做起，拒绝速成心态","body":"2. 从基层做起，拒绝速成心态 强调\"实践是水平提高的基础\"，员工应摒弃速成幻想，学习日本的踏实和德国的严谨。\"干一行，爱一行，行行出状元\"——集中精力精通一个工作面，在一个岗位上先做出成绩。公司永远不会提拔没有基层经验的人做高层管理者。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":432,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"3. 求助是群体奋斗的最好形式","body":"3. 求助是群体奋斗的最好形式 矩阵管理中，向他人求助并为他人提供支援，是群体奋斗的核心。一丝不苟地做好本职工作就是奉献，就是英雄行为。个人定位和回报取决于对组织的贡献度。","category":"品牌与传播","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":433,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"4. \"烧不死的鸟就是凤凰\"——逆境筛选机制","body":"4. \"烧不死的鸟就是凤凰\"——逆境筛选机制 这是华为对待委屈和挫折的态度，也是选拔干部的准则。诚信是生存之本、发展之源，是公司最重要的无形资产。任正非劝告新员工自律读书、珍惜稳定环境，不要\"指点江山、激扬文字\"。","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":434,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"1. 人力资本增值优先于财务资本增值","body":"1. 人力资本增值优先于财务资本增值 华为基本法第一章\"宗旨\"明确提出，公司的核心理念是让人力资本不断增值。这意味着在投资人和员工之间，华为选择优先投资于人的成长。这一条从根本上决定了华为的组织活力和人才密度。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":435,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"2. 聚焦主业，拒绝多元化诱惑","body":"2. 聚焦主业，拒绝多元化诱惑 第37条明确规定\"不从事任何分散公司资源的非相关多元化经营\"。华为将产品投资作为唯一主战场，把资源集中在有巨大潜力的新兴市场。这种战略定力让华为在通信领域做到了全球第一。","category":"品牌与传播","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":436,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"3. 自我批判写入\"宪法\"","body":"3. 自我批判写入\"宪法\" 基本法将自我批判制度化，要求组织和个人都要持续反思。\"接班人必须具备自我批判精神\"（第101条）；\"警惕不会做事却会处世的人\"（第102条）。自我批判从个人品德上升为组织制度。","category":"写作与表达","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":437,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"4. 流程化组织建设的制度保障","body":"4. 流程化组织建设的制度保障 基本法覆盖六大章节——宗旨、经营政策、组织政策、人力资源、控制政策、修订法——形成了一套完整的制度架构。它不是口号，而是可执行的管理手册，每十年修订一次以适应变化。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":438,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"1. 客户需求是产品发展的唯一路标","body":"1. 客户需求是产品发展的唯一路标 任正非提出公司的宏观商业模式只有两句话：\"产品发展的路标是客户需求导向，企业管理的目标是流程化组织建设。\"他反对技术导向——\"卖得出去的产品才是真正的技术需求\"，企业之魂应该是客户需求而非企业家个人的英雄主义。","category":"AI与技术","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":439,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"2. 学习\"马歇尔式\"的平凡领导","body":"2. 学习\"马歇尔式\"的平凡领导 以日本电子工业为反面教材——七八十年代的巨大成功反而成了数字化转型的包袱，最终被美国超越。任正非提倡\"平凡的领导方法\"，管理体系应该是\"无生命\"的但由\"有生命\"的员工执行，追求可复制、可持续。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":440,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"3. 在\"不值钱\"的时代保持理性","body":"3. 在\"不值钱\"的时代保持理性 他预判：当知识和技术不再稀缺、不再\"值钱\"后，人们回归理性与平实，社会反而会变得更加可爱。企业也应如此——放弃浮华的概念炒作，回归为客户创造实际价值。","category":"AI与技术","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":441,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"4. 定编定员、任期制、问责制——管理效率的三板斧","body":"4. 定编定员、任期制、问责制——管理效率的三板斧 任正非在这篇讲话中提出了非常具体的管理改进措施：实行定编定员、任期制、目标责任制，建立问责制和高绩效考核文化，简化管理层级。这些不是理念，是可以第二天就执行的操作。","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":442,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"1. 以客户为中心——不能为客户创造价值的人和流程都是多余的","body":"1. 以客户为中心——不能为客户创造价值的人和流程都是多余的 任正非将\"以客户服务好作为一切工作的指导方针\"推到了极致：不能为客户创造价值的部门、流程和人员都应该被精简。他以华为 NGN 推介失败为反面教材——自我价值膨胀会导致市场淘汰，只有通过自我批判才能完成转变。","category":"品牌与传播","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":443,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"2. 以奋斗者为本——奋斗就是\"为客户创造价值的任何微小活动\"","body":"2. 以奋斗者为本——奋斗就是\"为客户创造价值的任何微小活动\" 任正非重新定义了\"奋斗\"：不是加班加点，而是任何为客户创造价值的行为。需要通过合理回报保持奋斗者的持续贡献，但不能无限制拔高利益导致成本过高。","category":"商业与竞争","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":444,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"3. 两个价值观是\"矛盾的对立体\"","body":"3. 两个价值观是\"矛盾的对立体\" 以客户为中心要求降低成本、提高服务；以奋斗者为本要求给员工合理回报。两者之间的平衡构成企业经营的核心张力。任正非用\"好妈妈\"做比喻——好妈妈不会过度消费让家庭破产，人力资源政策也应追求\"合理、适度、长久\"。","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":445,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"4. 长期艰苦奋斗 + 坚持自我批判","body":"4. 长期艰苦奋斗 + 坚持自我批判 四句话构成华为价值观的完整闭环：以客户为中心、以奋斗者为本、长期艰苦奋斗、坚持自我批判。前两条讲\"为谁干\"和\"谁来干\"，后两条讲\"怎么持续干\"和\"怎么不走歪\"。","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":446,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"1. \"世界就是合作共赢\"——全球化信念不动摇","body":"1. \"世界就是合作共赢\"——全球化信念不动摇 面对美国禁令，任正非没有陷入对抗情绪，而是反复强调\"人类社会最主要的目的是创造财富，使更多人摆脱贫穷，社会一定是要合作共赢的\"。这种在极端压力下保持理性开放的姿态，是领导力的顶级示范。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":447,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"2. 100% 没有后门——用透明回应质疑","body":"2. 100% 没有后门——用透明回应质疑 任正非在国际场合直接承诺\"愿与各国签无后门协议\"，把安全争议从政治层面拉回技术层面。这种直面质疑、主动设定议程的策略，比回避或反击都更有效。","category":"AI与技术","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":448,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"3. 短期会痛，长期有信心——战略定力的公开表达","body":"3. 短期会痛，长期有信心——战略定力的公开表达 任正非坦承\"销售收入将下降300亿美元\"，但同时预判\"2021年公司将重新焕发勃勃生机\"。承认短期损失、给出长期预期——这种沟通方式让内外部都能建立合理预期。","category":"写作与表达","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":449,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"4. \"一杯咖啡吸收宇宙能量\"——开放式创新哲学","body":"4. \"一杯咖啡吸收宇宙能量\"——开放式创新哲学 对话的主题隐喻了任正非的创新观：不闭门造车，而是通过与全球顶尖思想家的开放交流来吸收能量。这种姿态让华为在被围堵时反而赢得了更多国际舆论同情。","category":"认知与思维","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":450,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"1. 管理者的使命是完成组织目标，而非追求个人英雄","body":"1. 管理者的使命是完成组织目标，而非追求个人英雄 任正非开宗明义：\"一个职业管理者的社会责任与历史使命，就是为了完成组织目标而奋斗。\"权力的本质是\"告诉他如何干\"而非让人盲目服从。缩短实现组织目标的时间、节约所需资源，就是管理者的职业素养。","category":"团队与文化","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":451,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"2. \"淡化英雄色彩\"是职业化的必然之路","body":"2. \"淡化英雄色彩\"是职业化的必然之路 华为必须从\"英雄创造历史\"演变为\"职业化管理\"。任正非用火车比喻：从广州到北京，数百人搬了道岔、数十个司机接力，\"不能说最后一个驾车到了北京的就是英雄\"。流程化管理中，每个角色都重要，没有谁是英雄。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":452,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"3. 正确的价值评价体系比个人修炼更重要","body":"3. 正确的价值评价体系比个人修炼更重要 \"小草再怎么浇水也长不成大树，如果价值评价体系不正确的话，我们的导向体系就错了。\"管理者应在正确的评价体系引导下工作，已付了报酬就不应以\"英雄\"为额外索取的名义。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":453,"type":"point","person":"任正非","person_en":"Ren Zhengfei","person_tagline":"华为创始人·奋斗文化·灰度哲学","person_order":9,"title":"4. 高层与基层干部的\"悖论式\"要求","body":"4. 高层与基层干部的\"悖论式\"要求 基层干部要求：呕心沥血、身体力行、事必躬亲、坚决执行、严格管理。高层干部要求：胸怀全局、战略思维、甘于默默奉献。两者形成对立统一——不同层级需要完全不同的领导方式。","category":"管理与领导","source_file":"工具_报告_任正非马化腾深度总结_20260329.html"},{"id":454,"type":"quote","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"zh":"反脆弱超越了韧性与强健。强健的系统抵御冲击、维持原状；反脆弱的系统则在冲击中变得更好。\" ——Taleb, EconTalk on Antifragility, 2012","en":"","cite":"——Taleb, EconTalk on Antifragility, 2012","category":"AI与技术","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":455,"type":"quote","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"zh":"人为压制波动性的问题在于：当系统终于崩溃时，会以更加猛烈的方式崩塌。\" ——Taleb 论人为压制波动性的危险","en":"","cite":"——Taleb 论人为压制波动性的危险","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":456,"type":"quote","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"zh":"别告诉我你怎么想，告诉我你的仓位是什么。永远不要相信没有切肤之痛的人。\" ——Taleb, EconTalk on Skin in the Game","en":"","cite":"——Taleb, EconTalk on Skin in the Game","category":"认知与思维","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":457,"type":"quote","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"zh":"社会公正应聚焦于对称性与风险共担，而非事后重新分配结果。\" ——Taleb 论社会公正的本质是风险对称","en":"","cite":"——Taleb 论社会公正的本质是风险对称","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":458,"type":"quote","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"zh":"脆弱的事物喜欢安宁的环境，强韧的事物不太在意环境，反脆弱的事物则从混乱中成长。\" ——塔勒布《反脆弱》","en":"","cite":"——塔勒布《反脆弱》","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":459,"type":"quote","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"zh":"如果你的 90% 资金以现金形式持有，而剩下 10% 投资于风险极高的证券，那么你的损失不可能超过 10%，而你的收益是没有上限的。\" ——塔勒布论杠铃策略","en":"","cite":"——塔勒布论杠铃策略","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":460,"type":"quote","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"zh":"在黑天鹅世界里，优化是不可能的，你能做到的最好只是减少脆弱、增加稳健。\" ——塔勒布《反脆弱》","en":"","cite":"——塔勒布《反脆弱》","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":461,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"1. 反脆弱 ≠ 强韧：系统可以从压力中受益","body":"塔勒布区分了三类系统：脆弱的（压力下碎裂）、强韧的（抵抗压力）、反脆弱的（压力下变强）。骨骼在承重下增强密度，肌肉在撕裂后变大——生物系统天然反脆弱，但只在一定限度内。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":462,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"2. \"Via Negativa\"——做减法比做加法更智慧","body":"不是添加更多干预，而是移除有害元素。塔勒布批评过度工程化的倾向，认为\"什么都不做\"往往比主动管理更聪明。在医疗领域尤其如此：过度用药反而制造脆弱性。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":463,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"3. 切肤之痛（Skin in the Game）的雏形","body":"决策者必须承担风险后果。古代建筑师站在自己造的桥下测试、船长最后离船——这些历史惯例确保个人责任。现代制度中这种对称性正在消失，制造了系统性脆弱。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":464,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"4. 复杂性放大尾部风险","body":"系统越复杂，极端事件越可能发生且后果越大。应对策略不是预测尾部事件，而是减少复杂性、增加冗余、提高选择权（optionality）。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":465,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"1. 决策者必须承受决策后果——对称性原则","body":"当个人只享受好处而不承担坏处时，激励不对称就会出现。建筑师应住在自己设计的房子里，政客发动战争应亲赴前线。塔勒布将此上升为道德命令，而非仅仅是效率工具。","category":"产品与用户","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":466,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"2. 别信没有风险敞口的人的建议","body":"经济学家做预测不用承担后果，军事顾问建议开战不必上战场，金融监管者自己不在市场里。塔勒布认为这种\"无风险建议\"是现代制度失败的根源。","category":"品牌与传播","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":467,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"3. 过度切肤之痛也有害——创新需要安全网","body":"Russ Roberts 挑战塔勒布：如果所有风险都由个人承担，创业者和风险投资者会被吓退。塔勒布承认年轻创业者需要某种保护机制，否则有益的冒险也会被扼杀。关键是找到平衡。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":468,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"4. \"少数支配法则\"——执着少数人改变多数人","body":"社会中执着的少数群体可以将偏好强加给随和的多数人。例如严格的清真/犹太饮食标准如何影响整个食品行业。理解这个法则对产品推广至关重要。","category":"产品与用户","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":469,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"1. 三元结构：脆弱 / 强韧 / 反脆弱","body":"脆弱如玻璃杯，\"表面坚强，其实脆弱\"；强韧如塑料杯，最多恢复原状；反脆弱如九头蛇，\"砍掉一个头长出两个头\"。区分标准：脆弱的事物喜欢安宁，强韧的不在意环境，反脆弱的从混乱中成长。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":470,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"2. 杠铃策略——极端保守 + 极端进取","body":"90% 资金以现金形式持有（极端安全），10% 投入高风险标的（极端进取）。损失上限 10%，收益无上限。刘慈欣就是杠铃策略的活案例：事业单位的稳定工作 + 业余写科幻的极端冒险，最终成为明星作家。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":471,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"3. \"活的东西才喜欢波动性\"","body":"主动拥抱小挫折可以增强应对大危机的能力。人为压制波动性（如政府救市、过度用药），当系统最终崩溃时会更加猛烈。适度的压力测试是维持健康的必要条件。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":472,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"4. 系统反脆弱以牺牲个体为代价","body":"细菌群体通过个体牺牲获得抗药性；大公司通过裁员维持整体生存。个体与系统的利益往往对立。理解这一点，个人策略应该是：提高自身不可替代性，避免成为\"被牺牲的个体\"。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":473,"type":"point","person":"塔勒布","person_en":"Nassim Taleb","person_tagline":"《反脆弱》·黑天鹅·切肤之痛","person_order":16,"title":"5. 在黑天鹅世界里，优化是不可能的","body":"你能做到的最好只是\"减少脆弱、增加稳健\"。Universa 投资基金基于塔勒布理念，在 2020 年第一季度取得 4144% 回报，验证了尾部风险对冲策略的实效。","category":"风险与反脆弱","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":474,"type":"quote","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"zh":"成功的职业不是规划出来的，而是当机遇来临时，已具备自我认知的人自然水到渠成的结果。\" ——德鲁克《管理自己》","en":"","cite":"——德鲁克《管理自己》","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":475,"type":"quote","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"zh":"要发现自己的长处，唯一途径就是回馈分析法——每当做出重要决定或采取重要行动时，记录下自己对结果的预期，9 至 12 个月后再将实际结果与预期比较。\" ——德鲁克《管理自己》","en":"","cite":"——德鲁克《管理自己》","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":476,"type":"quote","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"zh":"如果一个组织的价值体系不为自己所接受或者与自己的价值观不相容，人们就会备感沮丧，工作效力低下。\" ——德鲁克论价值观匹配的重要性","en":"","cite":"——德鲁克论价值观匹配的重要性","category":"团队与文化","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":477,"type":"quote","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"zh":"管理者自己工作的有效性，决定着现代组织的命运。卓有成效不是天赋，而是可以学会的习惯。\" ——德鲁克《卓有成效的管理者》","en":"","cite":"——德鲁克《卓有成效的管理者》","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":478,"type":"quote","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"zh":"打算做新业务，必须删除原有业务。\" ——德鲁克论要事优先的减法原则","en":"","cite":"——德鲁克论要事优先的减法原则","category":"决策与判断","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":479,"type":"quote","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"zh":"决策是一种判断，是若干方案中的选择。决策必须有反面意见——它保护决策者不沦为组织的奴隶，提供可选方案，激发想象力。\" ——德鲁克论有效决策","en":"","cite":"——德鲁克论有效决策","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":480,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"1. 知识工作者必须成为自己的 CEO","body":"德鲁克指出，知识型社会中人的职业生涯可能长达 50 年，远超任何一个组织的寿命。你不能依赖组织规划你的人生，必须学会自我管理——知道何时改变、何时坚持、何时开辟新方向。","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":481,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"2. 回馈分析法——发现真正的长处","body":"每当做出重要决定时，记录下对结果的预期，9-12 个月后与实际结果比较。坚持做几年，就能发现自己真正的优势和盲区。这比任何性格测试都有效，因为它基于真实行动而非自我评价。","category":"成长与修炼","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":482,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"3. 五个关键自问","body":"(1) 我的长处何在？(2) 我适合怎么做事（读者型 vs 聆听者型）？(3) 我的价值观是什么？(4) 我的人生道路何在？(5) 我应该做出什么贡献？25 岁后应明确自身方向，学会拒绝不适合的机会。","category":"团队与文化","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":483,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"4. 管理后半生——三条路径","body":"在进入职业后期前就要提前规划：转换职业（彻底换赛道）、并行职业（主业之外发展志愿服务或兼职）、成为社会企业家。等到中年危机再想已经太晚。","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":484,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"5. 对工作关系负责","body":"理解同事的长处、工作方式和价值观，主动沟通以建立基于理解的信任。成功的职业不是规划出来的，而是当机遇来临时，已具备自我认知的人自然水到渠成的结果。","category":"团队与文化","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":485,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"1. 卓有成效是可以学会的习惯","body":"德鲁克的根本主张：有效性不是天赋，而是一种可以通过学习和训练获得的习惯。管理者的定义是\"任何能影响组织经营能力及成果的人\"，包括所有知识工作者。管理重点从\"效率\"（把事做对）转向\"效能\"（做对的事）。","category":"AI与技术","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":486,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"2. 时间管理三步法","body":"记录时间分配 → 管理时间 → 集中零星时间。三个诊断问题：\"完全不需要做什么？\"\"谁能代劳？\"\"是否浪费他人时间？\"组织层面的时间浪费来自制度缺陷、人员过多、会议过多、信息不畅。","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":487,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"3. 善于利用长处——因事用人而非因人设事","body":"四个用人原则：避免设计超人职位、避免职位要求过窄、先考虑能做什么、容人所短。同样要发挥上司的长处和自己的长处。管理者追求三类贡献：直接成果、树立价值观、培养人才。","category":"产品与用户","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":488,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"4. 要事优先——一次只做一件事","body":"卓有成效的秘诀是\"善于集中精力\"。做减法原则：\"打算做新业务，必须删除原有业务。\"决策四条：重将来不重过去、重视机会不只看困难、选择自己的方向不盲从、目标要高有新意。","category":"决策与判断","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":489,"type":"point","person":"德鲁克","person_en":"Peter Drucker","person_tagline":"管理学之父·卓有成效·管理自己","person_order":17,"title":"5. 有效决策的五要素","body":"(1) 了解问题性质；(2) 找出边界条件；(3) 先想正确方案再考虑妥协；(4) 兼顾执行措施；(5) 重视反馈验证。关键洞察：\"决策必须有反面意见\"——反面意见保护决策者不沦为组织奴隶、提供备选方案、激发想象力。","category":"管理与领导","source_file":"工具_报告_巴菲特塔勒布德鲁克深度总结_20260329.html"},{"id":490,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"When a great team meets a lousy market, market wins. When a lousy team meets a great market, market wins. When a great team meets a great market, something special happens.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":491,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"You can always feel when product/market fit isn't happening. The customers aren't quite getting value out of the product, word of mouth isn't spreading, usage isn't growing that fast... And you can always feel product/market fit when it is happening. The customers are buying the product just as fast as you can make it.","cite":"","category":"产品与用户","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":492,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"Do whatever is required to get to product/market fit. Including changing out people, rewriting your product, moving into a different market, telling customers no when you don't want to, telling customers yes when you don't want to...","cite":"","category":"产品与用户","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":493,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"You will flip rapidly from a day in which you are euphorically convinced you are going to own the world, to a day in which doom seems only weeks away.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":494,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"Jim Clark, different from almost every other human on the planet in being a different kind of legend, toured around Silicon Valley in 1994 trying to find someone to run a new startup with. And out of all the people in the Valley he talked to, the only one who said yes was... me, a 22-year-old.","cite":"","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":495,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"Don't do startups that require deals with big companies to make them successful. The risk of the big company deal falling through is too high.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":496,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"Big companies care a lot more about what other big companies are doing than what any startup is doing.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":497,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"The whale might stalk you for three months, then jump out of the water and raise a huge ruckus, then vanish for six months, then come back and beach your whole boat, or alternately give you the clear shot you need.","cite":"","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":498,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"Each night before you go to bed, prepare a 3x5 index card with a short list of 3 to 5 things that you will do the next day. The next day, do those things.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":499,"type":"quote","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"zh":"","en":"Only accept commitments where both your head and your heart are aligned. Misaligned decisions create resentment and distraction.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":500,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"1. 市场 > 团队 > 产品","body":"创业成功的三要素——团队、产品、市场——重要性排序是：市场第一。再好的团队遇到不存在的市场也必败；再烂的团队遇到爆发的市场也能活下来。安德森引用 Andy Rachleff 的表述：\"当一个伟大团队遇上一个糟糕市场，市场赢；当一个糟糕团队遇上一个伟大市场，市场赢；当两者兼得，奇迹发生。\"","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":501,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"2. Product-Market Fit 是唯一分水岭","body":"安德森把创业公司的生命分为 BPMF（达到 PMF 之前）和 APMF（达到之后）两个阶段。BPMF 阶段应该不惜一切代价追求 PMF——换人、改产品、换市场、接受高稀释融资都可以。APMF 之后，很多内部混乱的公司依然成功，因为市场的拉力在驱动一切。","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":502,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"3. 市场会把产品\"拽\"出来","body":"在
