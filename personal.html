一个真正旺盛的市场里，客户主动找上门，产品只需满足基本功能就能卖出去。市场力量甚至能帮团队快速升级能力。相反，在没有需求的市场里，再精致的产品也只是自嗨。","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":503,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"4. PMF 有没有，你一定知道","body":"没有 PMF 的感觉：客户感知不到价值、口碑传不动、用量增长慢、销售周期长。有 PMF 的感觉：产能跟不上客户涌入、账上现金飞速增长、疯狂招人、媒体主动来报道。如果你需要问\"我们有没有 PMF\"——那就是没有。","category":"产品与用户","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":504,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"5. 成功归因的错觉","body":"管理精良但市场选错的公司频繁死亡；管理混乱但踩对市场的公司活得好好的。创始人常把成功归因于文化、管理、执行力，实际上根因是市场选对了。这是一个反直觉但极其重要的认知。","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":505,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"1. 创业是极端的情绪过山车","body":"创始人每天在\"我们要统治世界\"和\"公司几周内就要完蛋\"之间反复横跳。这种情绪震荡来源于全方位的不确定性——产品方向、竞争格局、融资、招聘、市场接受度，全部未知。安德森说这不是比喻，是字面意义上的日常。","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":506,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"2. 没有你，什么都不会发生","body":"大公司有惯性——即使你不在，系统还在运转。创业公司没有这个。代码不会自己写，设计不会自己做，客户不会自己来。创始人必须亲手推动每一件事，包括最琐碎的运营细节。","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":507,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"3. 招人极其困难，且失败率 50%","body":"很多人口头说愿意加入创业公司，但当真正需要辞掉大厂稳定工作时就退缩了。安德森引用 Jim Clark 创办 Netscape 的例子：以 Clark 的传奇地位，走遍硅谷，最终只有22岁的安德森愿意跟他干。即便招到人，有经验的创始人成功率也只有 50%。","category":"创业与行动","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":508,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"4. 创业时间之外，还没谈到真正的难题","body":"安德森特意指出：以上八大挑战（情绪、孤军奋战、被拒绝、招人难、招高管更难、工时极长、文化崩塌风险、不可控外部因素）还没有包含创业的核心难题——决定做什么产品、怎么做出来、怎么卖出去、怎么赢过竞争对手。这些才是真正的战场。","category":"产品与用户","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":509,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"1. 大公司的行为从外部看完全不可预测","body":"安德森用白鲸比喻大公司：它可能追你三个月然后消失半年，也可能突然翻船或给你完美机会。关键认知是——即使大公司内部的高管也常常不知道自己组织会做什么决定。决策涉及数百人的共识博弈、政治斗争、部门利益。IBM 曾有一个叫\"concurrence\"的流程，任何决策需要约50个高管书面同意，任何一人有否决权。","category":"管理与领导","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":510,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"2. 不要建立依赖大公司合作才能成功的创业公司","body":"这是最核心的建议。如果你的商业模式必须拿到某个大公司的合作才能运转，你就把命运交给了白鲸。安德森见过太多创业公司因为一个大公司合作谈崩了而死亡。","category":"创业与行动","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":511,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"3. 大公司更关注其他大公司，而非你","body":"创业者常高估自己在大公司视野中的重要性。事实是，大公司的注意力层级是：其他大公司 > 行业趋势 > 创业公司。你可能连他们的视野都不在。","category":"管理与领导","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":512,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"4. 不要变成亚哈船长","body":"《白鲸》里亚哈被鱼叉绳缠住拖入海底——这是创始人被大公司合作谈判拖死的完美隐喻。保持灵活性，随时能放弃谈判回归核心业务。","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":513,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"1. 不排日程表——保持每天做最重要事的自由度","body":"安德森最激进的建议：拒绝提前承诺会议，这样每天醒来都可以做当下最重要的事。他承认这需要一定的职业自由度，不适用于所有人，但核心思想是——日程表越满，你越容易成为别人优先级的执行者而非自己的。","category":"决策与判断","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":514,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"2. 只维护三个列表 + 每天一张小卡片","body":"Todo（必须做的）、Watch（需要跟进的）、Later（以后再说的）。然后每天晚上在一张 3x5 索引卡上写明天的 3-5 个具体任务。卡片背面记录当天实际完成的事情（Anti-Todo List），提供心理正反馈。这套系统的精髓是极度简化。","category":"写作与表达","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":515,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"3. 结构化拖延和战略性无能","body":"利用逃避心理做正事：拖延大任务时顺手把小任务做了。\"战略性无能\"更有趣——故意把不想做的事做得很差，以后就不会被分配到这类事。这是一种资源保护策略，把精力留给真正重要的事。","category":"人性与心理","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":516,"type":"point","person":"马克·安德森","person_en":"Marc Andreessen","person_tagline":"a16z·PMF理论·大公司白鲸","person_order":22,"title":"4. 头脑和心灵必须同时同意","body":"只接受理性和情感都认同的承诺。如果理性告诉你应该做但内心抗拒，或者情感上想做但理性觉得不对，都不要接。错位的决定会制造持续的内耗和分心。","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":517,"type":"quote","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"zh":"如果别人工作50小时而你工作100小时，即使做同样的事，你一年中的工作量将是另一家公司的两倍。","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":518,"type":"quote","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"zh":"我们从不在广告上花钱，我们把所有的钱都投在了产品研发及更好的产品设计上。","en":"","cite":"","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":519,"type":"quote","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"zh":"现在就去冒险吧，在你拥有那些义务之前。随着年龄增长，你的义务会增加。在你有了孩子之后，承担风险就不只是代表你自己了。","en":"","cite":"","category":"风险与反脆弱","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":520,"type":"quote","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"zh":"通过第一性原理，我把事情升华到最根本的真理，然后从最核心处开始推理。 —— 埃隆·马斯克","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":521,"type":"quote","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"zh":"未来十年什么不变？这个问题比\"什么会变\"重要得多。你可以围绕不变的东西制定商业战略。 —— 杰夫·贝索斯","en":"","cite":"","category":"决策与判断","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":522,"type":"quote","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"zh":"物理学定律是不可变更的金科玉律。至于别人怎么做的、此前的惯常做法是怎样的，这些都只能当做参考建议。 —— 埃隆·马斯克","en":"","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":523,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"1. 极度努力工作是基本门槛","body":"马斯克回忆创业初期和弟弟共用一台电脑——白天跑网站，晚上写代码，一周七天。他给出一个简洁的数学：\"如果别人工作50小时，你工作100小时，你一年完成的工作量是别人的两倍。\"这不是鸡汤，是他认为最基础的竞争策略。","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":524,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"2. 吸引优秀人才是最高优先级","body":"\"企业的成功大部分情况下都是一群优秀的人汇聚到一起做成了一个伟大的产品。\"团队的人才密度决定上限。创业者应该用一切手段去吸引人才，并确保所有人朝同一个方向使劲。","category":"产品与用户","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":525,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"3. 把钱花在产品上，不是广告上","body":"以特斯拉为例：\"我们从不在广告上花钱，所有钱都投在了产品研发和更好的产品设计上。\"他建议创业者持续追问：\"你们做的这些努力是否让产品或服务变得更好了？\"如果答案模糊，可能在浪费资源。","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":526,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"4. 用物理学第一原理思考，不随波逐流","body":"\"通过你认为最本质的元素去推论\"，而不是\"别人在做什么我也做什么\"。类比思维只能产生微小的迭代改进，第一性原理才能产生颠覆。","category":"创业与行动","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":527,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"5. 趁年轻冒险","body":"\"现在就去冒险吧，在你拥有那些义务之前。\"年龄增长带来的家庭责任、房贷、养育压力会大幅降低你的风险承受能力。年轻时失败的代价最低。","category":"风险与反脆弱","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":528,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"1. 第一性原理 = 回到事物不可再分的基本真相","body":"源自亚里士多德：\"每个系统中存在一个最基本的命题，它不能被违背或删除。\"马斯克的表述更直接：\"一层层拨开事物表象，看到里面的本质，再从本质一层层往上走。\"这不是做减法，而是做除法——从众多因素中提炼出那个唯一的根本原因。","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":529,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"2. 类比思维 vs 第一性思维的根本区别","body":"类比思维是\"别人怎么做我也怎么做\"——只能产生微小迭代。第一性思维是\"这件事的物理学/化学/经济学基本约束是什么\"——能产生十倍改进。iPhone 去掉键盘不是改良手机，是重新定义了手机的交互方式。","category":"产品与用户","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":530,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"3. 特斯拉电池案例是经典应用","body":"当所有人说\"电池太贵了\"，马斯克问：电池由什么材料组成？碳、镍、铝的原材料市场价是多少？答案是每千瓦时约80美元，而成品电池卖600美元。差距不是物理定律造成的，是产业链效率造成的——那就可以打破。自建工厂后成本降低30%。","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":531,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"4. 贝索斯的\"不变量\"是另一种第一性原理","body":"贝索斯不问\"未来十年什么会变\"，而问\"什么不变\"。他找到三个不变量：无限选择、最低价格、最快配送。然后把所有资源押注在这些不会过时的基本真相上。这和马斯克殊途同归——都是找到底层不可动摇的东西，从那里出发。","category":"决策与判断","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":532,"type":"point","person":"马斯克","person_en":"Elon Musk","person_tagline":"Tesla/SpaceX·第一性原理·超级努力","person_order":14,"title":"5. 实践三原则","body":"第一，以最基本、不可改变的条件为起点；第二，推演过程要有严密逻辑，减少估计和假设；第三，不参照已有方案，屏蔽\"行业通常做法\"的干扰，尊重独立推演的结论。芒格总结为两步：\"找到简单的基本道理，然后严格按它行事。\"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":533,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"The Empire State Building: 410 days from start to finish. The Pentagon: construction ran from September 1941 to January 1943. Apollo 8: NASA committed to the lunar mission in August 1968 and launched in December.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":534,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"Git: self-hosting achieved within four days of April 3, 2005 commencement. JavaScript: Brendan Eich prototyped the language in 10 days in May 1995.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":535,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"Van Ness Bus Lane: 7,600 days. San Francisco's proposed 2001 bus lane opened in 2022, costing approximately $110,000 per meter — versus $793 per meter for the Alaska Highway.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":536,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"Progress is the combination of economic, technological, scientific, cultural, and organizational advancement that has transformed our lives and raised standards of living over the past couple of centuries.","cite":"","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":537,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"These communities don't attend the same conferences, publish in the same journals, or work together — yet understanding progress requires insights from all of them.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":538,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"About 99% of the time, the right time is right now.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":539,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"Cultivate 12 people who love you, because they are worth more than 12 million people who like you.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":540,"type":"quote","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"zh":"","en":"Three things you need: The ability to not give up something till it works, the ability to give up something that does not work, and the trust in other people to help you distinguish between the two.","cite":"","category":"认知与思维","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":541,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"1. 人类曾经能以惊人速度完成伟大工程","body":"帝国大厦 410 天建成、五角大楼 491 天、迪士尼乐园 366 天、P-80 喷气战斗机 143 天、圣路易斯精神号飞机 60 天。这些不是粗制滥造，而是当时最顶尖的工程成就。Collison 用大量事实证明：速度和质量不是对立的。","category":"创业与行动","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":542,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"2. 软件领域同样有\"闪电\"案例","body":"JavaScript 10 天原型、Unix 3 周、Git 自我托管仅 4 天、iPod 从立项到发布约 290 天、Amazon Prime 从启动到上线仅 6 周。Xerox Alto（第一台 GUI 电脑）3 个月。这些项目后来定义了各自的行业。","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":543,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"3. 现代工程速度在急剧下降","body":"旧金山 Van Ness 公交专用道从提出到完工花了 7600 天（21年），造价每米 11 万美元。而 1942 年的阿拉斯加公路 1700 英里仅用 234 天，换算后每米仅 793 美元。加州高铁预计 37 年完工，而法国 TGV 仅用约 5 年。","category":"创业与行动","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":544,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"4. 1970 年是分水岭——\"否决权政治\"的兴起","body":"大多数快速完成的项目发生在 1970 年之前。学者指出美国治理体系在 1960 年代发生了结构性变化，福山称之为\"vetocracy\"（否决权政治）——任何人都能否决但无人能推动。监管复杂性的增加是工程速度下降的系统性原因。","category":"决策与判断","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":545,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"5. Moderna 疫苗案例是反例中的亮点","body":"新冠基因组 2020 年 1 月 10 日公布，Moderna 3 天后确定 mRNA 序列，2 月 7 日造出首批疫苗，2 月 24 日送 NIH 做临床——从基因组到临床试验仅 45 天。这证明在紧迫性和意志力具备时，现代组织依然能极快行动。","category":"管理与领导","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":546,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"1. \"进步\"本身被严重低估和研究不足","body":"Collison 和 Cowen 将\"进步\"定义为\"经济、技术、科学、文化和组织进步的综合体，在过去几个世纪改变了我们的生活和提高了生活水平\"。他们指出一个惊人的事实：尽管进步如此重要，却没有一个系统化的学科专门研究它、理解它、加速它。","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":547,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"2. 相关知识分散在割裂的学科中","body":"理解如何识别和培养人才涉及心理测量学、社会学、人类学、教育学等多个领域，但这些领域的学者\"不参加同一个会议、不在同一个期刊发表、不一起合作\"。关于进步的知识被学科壁垒碎片化了。","category":"人性与心理","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":548,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"3. 提出建立\"进步研究\"(Progress Studies) 这一新学科","body":"他们呼吁建立一个整合性的研究领域，跨越经济学、科学史、组织理论、教育学、文化研究等边界，专注于实践性问题：什么条件促进进步？什么制度阻碍进步？如何系统化地加速进步？","category":"团队与文化","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":549,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"4. 创新经济学应该在经济学中占据更重要的位置","body":"他们特别强调\"The economics of innovation is a critical topic and should assume a much larger place within economics\"。当前经济学对创新的研究严重不足，考虑到创新是人类福祉增长的最大驱动力，这是一个令人费解的缺口。","category":"学习与阅读","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":550,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"1. 99%的时候，正确的时间就是现在","body":"\"About 99% of the time, the right time is right now.\" 凯利在 70 岁时回顾人生得出的第一条建议就是——别等。大多数人因为\"时机不对\"错过了大多数事。这和 Collison 的 Fast 页面形成呼应：伟大的事可以很快开始。","category":"长期主义","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":551,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"2. 培养 12 个爱你的人，胜过 1200 万个喜欢你的人","body":"\"Cultivate 12 people who love you, because they are worth more than 12 million people who like you.\" 这是对流量时代最好的反思。深度关系 > 广度触达。对个人如此，对品牌亦然。","category":"品牌与传播","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":552,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"3. 效率被高估了，\"浪费时间\"被低估了","body":"\"Efficiency is highly overrated; Goofing off is highly underrated. Regularly scheduled sabbaths, sabbaticals, vacations, breaks, aimless walks and time off are essential for top performance.\" 定期的无目的休息是高绩效的必要条件，不是奢侈品。","category":"AI与技术","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":553,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"4. 习惯比灵感可靠得多","body":"\"Habit is far more dependable than inspiration. Make progress by making habits. Don't focus on getting into shape. Focus on becoming the kind of person who never misses a workout.\" 不要关注\"变健康\"这个结果，关注\"成为不会错过锻炼的人\"这个身份。","category":"成长与修炼","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":554,"type":"point","person":"Patrick Collison","person_en":"Patrick Collison","person_tagline":"Stripe CEO·快速行动·阅读与好奇心","person_order":26,"title":"5. 三件最需要的东西","body":"\"The ability to not give up something till it works, the ability to give up something that does not work, and the trust in other people to help you distinguish between the two.\" 坚持的能力 + 放弃的能力 + 找到帮你区分两者的人。简洁到极致的人生框架。","category":"长期主义","source_file":"工具_报告_安德森马斯克Collison等深度总结_20260329.html"},{"id":555,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"没有人能独自完成伟大的事情。你需要一支愿意为共同目标奋斗的团队。","en":"No one can do great things alone. You need a team willing to fight for a shared mission.","cite":"NVIDIA GTC 2024","category":"团队与文化","source_file":""},{"id":556,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"AI 是我们这个时代最强大的技术力量。每一个行业、每一家公司都将被它重新定义。","en":"AI is the most powerful technology force of our time. Every industry, every company will be redefined by it.","cite":"CES 2024 Keynote","category":"AI与技术","source_file":""},{"id":557,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"加速计算不是一个选项，而是唯一的前进道路。通用计算已经触及能耗的天花板。","en":"Accelerated computing is not an option — it is the only path forward. General-purpose computing has hit the energy ceiling.","cite":"GTC 2024","category":"AI与技术","source_file":""},{"id":558,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"我希望你们都能经历足够的痛苦和磨难。伟大不是来自智商，而是来自性格，而性格是在逆境中锻造的。","en":"I wish upon you ample doses of pain and suffering. Greatness comes not from intelligence but from character, and character is forged in adversity.","cite":"斯坦福大学毕业演讲 2024","category":"成长与修炼","source_file":""},{"id":559,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"如果我能回到30年前，我不确定自己还有勇气再创办NVIDIA。因为我低估了这段旅程的艰难。","en":"If I could go back 30 years, I'm not sure I'd have the courage to start NVIDIA again. I underestimated how hard the journey would be.","cite":"Acquired Podcast 2023","category":"创业与行动","source_file":""},{"id":560,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"你的工作不是找到机会，而是找到你独一无二的方式去创造价值。市场不会等你。","en":"Your job is not to find opportunity but to find your unique way to create value. The market won't wait for you.","cite":"NVIDIA 内部讲话","category":"认知与思维","source_file":""},{"id":561,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"保持紧迫感。不是因为恐惧，而是因为机会窗口转瞬即逝。我每天都像公司快要倒闭一样工作。","en":"Maintain a sense of urgency. Not from fear, but because windows of opportunity are fleeting. I work every day as if the company is about to go out of business.","cite":"Stripe Sessions 2024","category":"创业与行动","source_file":""},{"id":562,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"软件正在吞噬世界，但 AI 正在吞噬软件。未来每一行代码都将由 AI 参与编写。","en":"Software is eating the world, but AI is eating software. In the future, every line of code will be written with AI involvement.","cite":"GTC 2024","category":"AI与技术","source_file":""},{"id":563,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"NVIDIA 的核心竞争力不是芯片，而是我们构建的整个计算栈。从硬件到软件到生态系统，这才是真正的护城河。","en":"NVIDIA's core competency isn't chips — it's the entire computing stack we've built. From hardware to software to ecosystem, that's the real moat.","cite":"Acquired Podcast 2023","category":"商业与竞争","source_file":""},{"id":564,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"我们在 CUDA 上投入了 10 年时间，没有任何回报。所有人都说我疯了。但正是这个决定让 NVIDIA 成为了 AI 时代的基础设施。","en":"We invested 10 years in CUDA with no return. Everyone said I was crazy. But that decision made NVIDIA the infrastructure of the AI era.","cite":"GTC 2023","category":"长期主义","source_file":""},{"id":565,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"最好的领导者不是最聪明的人，而是最能激发他人潜力的人。","en":"The best leaders aren't the smartest people — they're the ones who can best unlock the potential of others.","cite":"NVIDIA Leadership Summit","category":"管理与领导","source_file":""},{"id":566,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"当你把标准定得极高，团队会觉得不可能完成。但当他们真正做到时，那种自豪感是无可替代的。","en":"When you set the bar incredibly high, the team thinks it's impossible. But when they actually achieve it, that pride is irreplaceable.","cite":"","category":"管理与领导","source_file":""},{"id":567,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"未来的工厂不会生产汽车或手机，而是生产智能。AI 工厂将成为新的基础设施。","en":"Future factories won't produce cars or phones — they'll produce intelligence. AI factories will become the new infrastructure.","cite":"GTC 2024 Keynote","category":"AI与技术","source_file":""},{"id":568,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"我不相信平衡工作和生活这回事。我相信的是找到你真正热爱的事情，然后全力以赴。","en":"I don't believe in work-life balance. I believe in finding what you truly love and going all in.","cite":"","category":"成长与修炼","source_file":""},{"id":569,"type":"quote","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"每一次技术革命都会淘汰一批公司，同时创造出一批新的巨头。AI 革命也不例外。你要确保自己站在创造者这一边。","en":"Every technology revolution eliminates a batch of companies while creating new giants. The AI revolution is no exception. Make sure you're on the creator's side.","cite":"CES 2024","category":"商业与竞争","source_file":""},{"id":570,"type":"point","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"","en":"","cite":"","category":"认知与思维","source_file":"","title":"第一性原理驱动产品设计","body":"黄仁勋坚持从物理定律和计算本质出发设计产品，而不是跟随市场上已有的解决方案。CUDA 的诞生就是这种思维的产物——他看到了GPU通用计算的可能性，而不是仅仅把GPU当作图形处理器。"},{"id":571,"type":"point","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"","en":"","cite":"Acquired Podcast 2023","category":"团队与文化","source_file":"","title":"「光速执行」文化","body":"NVIDIA 内部有一个理念叫「light speed」——任何项目的第一个问题是：如果没有任何阻碍，这件事最快能多快完成？然后倒推哪些阻碍可以消除。不是问「需要多久」，而是问「最快多快」。"},{"id":572,"type":"point","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"","en":"","cite":"Acquired Podcast 2023","category":"管理与领导","source_file":"","title":"扁平化信息架构","body":"黄仁勋直接管理约60位直接下属，不设传统的层级汇报结构。他认为信息层级越多，失真越严重。他要求每个人都能直接和他沟通最重要的事情，压缩决策链路。"},{"id":573,"type":"point","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"","en":"","cite":"World Government Summit 2024","category":"AI与技术","source_file":"","title":"AI 时代的编程民主化","body":"黄仁勋认为未来每个人都是程序员，因为编程语言将变成人类自然语言。AI让技术从精英工具变成大众工具，这将释放巨大的生产力。"},{"id":574,"type":"point","person":"黄仁勋","person_en":"Jensen Huang","person_tagline":"NVIDIA创始人·AI教父·皮衣刀客","person_order":28,"zh":"","en":"","cite":"","category":"长期主义","source_file":"","title":"战略耐心与长期押注","body":"CUDA生态用了近十年才开始产生回报。黄仁勋多次在董事会压力下坚持投入，因为他看到了通用GPU计算的长期价值。这种战略耐心是NVIDIA从显卡公司转型为AI基础设施公司的关键。"}];

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderQuoteItem(item, showPerson) {
  const isQuote = item.type === 'quote';
  let html = '<div class="quote-item" data-id="' + item.id + '">';

  if (isQuote) {
    // 引用类型
    const mainText = item.zh || item.en;
    html += '<div class="quote-text">' + escapeHtml(mainText) + '</div>';
    if (item.en && item.zh) {
      html += '<div class="quote-en">' + escapeHtml(item.en) + '</div>';
    }
  } else {
    // 观点类型
    html += '<div class="point-text">';
    if (item.title) {
      html += '<span class="point-title-text">' + escapeHtml(item.title) + '</span>';
    }
    if (item.body) {
      html += '<div class="point-body-text">' + escapeHtml(item.body) + '</div>';
    }
    html += '</div>';
  }

  // 元信息行
  html += '<div class="quote-meta">';
  if (showPerson) {
    html += '<span class="quote-person">' + escapeHtml(item.person) + '</span>';
  }
  if (item.cite) {
    html += '<span class="quote-cite">' + escapeHtml(item.cite) + '</span>';
  }
  html += '<span class="tag tag-' + item.category + '">' + escapeHtml(item.category) + '</span>';
  if (!isQuote && item.body) {
    html += '<button class="detail-toggle" onclick="toggleDetail(this)">展开</button>';
  }
  html += '</div>';

  html += '</div>';
  return html;
}

function renderPersonPanel(filter) {
  const panel = document.getElementById('panelPerson');
  let html = '';
  const lf = (filter || '').toLowerCase();

  for (const p of PERSONS) {
    // 过滤该人物的items
    let items = ALL_ITEMS.filter(i => i.person === p.name);
    if (lf) {
      items = items.filter(i => {
        const text = (i.zh || '') + (i.en || '') + (i.title || '') + (i.body || '') + (i.cite || '') + i.person + i.category;
        return text.toLowerCase().includes(lf);
      });
    }
    if (lf && items.length === 0) continue;

    const count = items.length;
    const initial = p.name.charAt(0);

    html += '<div class="person-card" data-person="' + escapeHtml(p.name) + '">';
    html += '<div class="person-header" onclick="toggleCard(this.parentElement)">';
    html += '<div class="person-avatar">' + initial + '</div>';
    html += '<div class="person-info">';
    html += '<div class="person-name">' + escapeHtml(p.name) + '<span class="en">' + escapeHtml(p.en) + '</span></div>';
    html += '<div class="person-tagline">' + escapeHtml(p.tagline) + '</div>';
    html += '</div>';
    html += '<span class="person-count">' + count + '</span>';
    html += '<svg class="person-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
    html += '</div>';

    // Body (预渲染但隐藏)
    html += '<div class="person-body">';

    // 核心观点概要（取前5个point）
    const points = items.filter(i => i.type === 'point').slice(0, 5);
    if (points.length > 0) {
      html += '<div class="person-summary"><h4>核心观点</h4>';
      for (const pt of points) {
        html += '<div class="point-item">';
        if (pt.title) html += '<strong>' + escapeHtml(pt.title) + '</strong> ';
        html += '</div>';
      }
      html += '</div>';
    }

    // 所有金句（按类型分组）
    const byCategory = {};
    for (const item of items) {
      if (!byCategory[item.category]) byCategory[item.category] = [];
      byCategory[item.category].push(item);
    }
    for (const [cat, catItems] of Object.entries(byCategory)) {
      html += '<div style="margin-top:12px"><span class="tag tag-' + cat + '" style="margin-bottom:8px;display:inline-block">' + escapeHtml(cat) + ' (' + catItems.length + ')</span></div>';
      for (const item of catItems) {
        html += renderQuoteItem(item, false);
      }
    }

    // 推荐阅读
    if (p.articles && p.articles.length > 0) {
      html += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border-light)">';
      html += '<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">推荐阅读</div>';
      for (const a of p.articles) {
        if (a.link) {
          html += '<div style="font-size:13px;margin-bottom:4px"><a href="' + escapeHtml(a.link) + '" target="_blank" style="color:var(--accent);text-decoration:none">' + escapeHtml(a.title) + '</a></div>';
        } else if (a.title) {
          html += '<div style="font-size:13px;margin-bottom:4px;color:var(--text-secondary)">' + escapeHtml(a.title) + '</div>';
        }
      }
      html += '</div>';
    }

    html += '</div></div>';
  }

  if (!html) {
    html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>未找到匹配的内容</p></div>';
  }

  panel.innerHTML = html;
}

function renderCategoryPanel(filter) {
  const panel = document.getElementById('panelCategory');
  let html = '';
  const lf = (filter || '').toLowerCase();

  for (const cat of CATEGORIES) {
    let items = ALL_ITEMS.filter(i => i.category === cat);
    if (lf) {
      items = items.filter(i => {
        const text = (i.zh || '') + (i.en || '') + (i.title || '') + (i.body || '') + (i.cite || '') + i.person + i.category;
        return text.toLowerCase().includes(lf);
      });
    }
    if (lf && items.length === 0) continue;

    const color = CAT_COLORS[cat] || '#666';
    html += '<div class="category-card" data-category="' + escapeHtml(cat) + '">';
    html += '<div class="category-header" onclick="toggleCard(this.parentElement)">';
    html += '<div class="category-dot" style="background:' + color + '"></div>';
    html += '<div class="category-name">' + escapeHtml(cat) + '</div>';
    html += '<span class="category-count">' + items.length + '条</span>';
    html += '<svg class="category-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
    html += '</div>';

    html += '<div class="category-body">';

    // 按人物分组显示
    const byPerson = {};
    for (const item of items) {
      if (!byPerson[item.person]) byPerson[item.person] = [];
      byPerson[item.person].push(item);
    }
    // 按数量排序
    const sortedPersons = Object.entries(byPerson).sort((a,b) => b[1].length - a[1].length);
    for (const [person, personItems] of sortedPersons) {
      html += '<div style="margin-top:10px;font-size:13px;font-weight:600;color:var(--text-secondary)">' + escapeHtml(person) + ' (' + personItems.length + ')</div>';
      for (const item of personItems) {
        html += renderQuoteItem(item, false);
      }
    }

    html += '</div></div>';
  }

  if (!html) {
    html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>未找到匹配的内容</p></div>';
  }

  panel.innerHTML = html;
}

let currentTab = 'person';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel' + tab.charAt(0).toUpperCase() + tab.slice(1)));
  applyFilter();
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

function toggleDetail(btn) {
  const item = btn.closest('.quote-item');
  const isOpen = item.classList.toggle('detail-open');
  btn.textContent = isOpen ? '收起' : '展开';
}

// 搜索
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchCount = document.getElementById('searchCount');
let searchTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 200);
  searchClear.style.display = searchInput.value ? 'block' : 'none';
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  searchCount.style.display = 'none';
  applyFilter();
});

function applyFilter() {
  const filter = searchInput.value.trim();
  renderPersonPanel(filter);
  renderCategoryPanel(filter);

  if (filter) {
    const lf = filter.toLowerCase();
    const matchCount = ALL_ITEMS.filter(i => {
      const text = (i.zh || '') + (i.en || '') + (i.title || '') + (i.body || '') + (i.cite || '') + i.person + i.category;
      return text.toLowerCase().includes(lf);
    }).length;
    searchCount.textContent = '找到 ' + matchCount + ' 条匹配';
    searchCount.style.display = 'block';
  } else {
    searchCount.style.display = 'none';
  }
}

  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
